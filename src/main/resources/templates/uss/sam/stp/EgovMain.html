<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{terms.stplat.manage}">이용약관 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{terms.stplat.title}">이용약관</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-file-text"></i> <span th:text="#{terms.stplat.manage}">이용약관 관리</span></h1>
        <p class="text-muted mb-4" th:text="#{terms.stplat.manage.intro}">서비스 이용약관을 조회하고 관리합니다.</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-list-ul"></i> <span th:text="#{terms.stplat.list.label}">약관 목록</span></h5>
                        <p class="text-muted" th:text="#{terms.stplat.list.intro}">등록된 이용약관을 조회합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/sam/stp/StplatListInqire.do}" th:text="#{terms.stplat.list.view}">약관 보기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-plus-square"></i> <span th:text="#{terms.stplat.regist.btn}">약관 등록</span></h5>
                        <p class="text-muted" th:text="#{terms.stplat.regist.intro}">새로운 이용약관을 등록합니다. (관리자)</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/sam/stp/StplatCnRegistView.do}" th:text="#{terms.stplat.regist.btn}">약관 등록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
