<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>접근 제한</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">접근 제한</li>
        </ol></nav>
        <div class="card border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-shield-lock text-danger" style="font-size:3rem;"></i>
                <h1 class="h4 mt-3">접근이 거부되었습니다</h1>
                <p class="text-muted mb-1">요청하신 페이지에 접근할 권한이 없습니다.</p>
                <p class="text-muted" th:if="${exception != null}" th:text="${exception.message}"></p>
                <div class="mt-4">
                    <a class="btn btn-primary btn-sm" th:href="@{/}"><i class="bi bi-house"></i> 홈으로</a>
                    <a class="btn btn-outline-secondary btn-sm" href="javascript:history.back();"><i class="bi bi-arrow-left"></i> 이전 페이지</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
