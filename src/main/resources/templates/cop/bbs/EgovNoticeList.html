<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '게시판'}">게시판</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item active" th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '게시판'}">게시판</li>
            </ol>
        </nav>

        <h1 class="h4 mb-3" th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '게시판'}">게시판</h1>

        <!-- 검색 영역 (KRDS 폼) — 심플과 통일 -->
        <form th:action="@{/cop/bbs/selectBoardList.do}" method="get" class="search-bar krds-search mb-3">
            <input type="hidden" name="bbsId" th:value="${boardVO != null ? boardVO.bbsId : (brdMstrVO != null ? brdMstrVO.bbsId : '')}"/>
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchCnd">검색구분</label></div>
                        <div class="form-conts">
                            <select id="searchCnd" name="searchCnd" class="krds-form-select" title="검색구분 선택">
                                <option value="0" th:selected="${boardVO != null and boardVO.searchCnd == '0'}">제목</option>
                                <option value="1" th:selected="${boardVO != null and boardVO.searchCnd == '1'}">내용</option>
                                <option value="2" th:selected="${boardVO != null and boardVO.searchCnd == '2'}">작성자</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchWrd">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchWrd" name="searchWrd" class="krds-input"
                                   th:value="${boardVO != null ? boardVO.searchWrd : ''}" placeholder="검색어를 입력하세요" maxlength="100"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> 검색</button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 (심플과 동일하게 표 위 좌측) -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted">전체 <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : (resultCnt ?: 0)}">0</strong>건</span>
        </div>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:80px;">번호</th>
                <th scope="col">제목</th>
                <th scope="col" style="width:120px;">작성자</th>
                <th scope="col" style="width:120px;">등록일</th>
                <th scope="col" style="width:80px;">조회</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, stat : ${resultList}">
                <!-- 번호: 전체 건수 기준 내림차순 일련번호(페이지 오프셋 반영). 답글은 번호 대신 마커 표시 -->
                <td class="text-center">
                    <span th:if="${item.replyAt != 'Y'}"
                          th:text="${(paginationInfo != null ? paginationInfo.totalRecordCount : #lists.size(resultList))
                                     - (boardVO != null ? (boardVO.pageIndex - 1) * boardVO.recordCountPerPage : 0)
                                     - stat.index}">1</span>
                    <span th:if="${item.replyAt == 'Y'}" class="text-muted"><i class="bi bi-arrow-return-right"></i></span>
                </td>
                <td>
                    <!-- 답글은 답장위치(ANSWER_LC) 깊이만큼 들여쓰기하여 스레드 표시 -->
                    <span th:if="${item.replyAt == 'Y'}"
                          th:style="'display:inline-block;width:' + ${(item.replyLc != null ? item.replyLc : '1')} + 'em;'"></span>
                    <i th:if="${item.replyAt == 'Y'}" class="bi bi-reply text-muted me-1"></i>
                    <a class="text-decoration-none"
                       th:href="@{/cop/bbs/selectBoardArticle.do(bbsId=${item.bbsId},nttId=${item.nttId})}"
                       th:text="${item.nttSj}">제목</a>
                </td>
                <td class="text-center" th:text="${item.frstRegisterNm ?: (item.ntcrNm ?: '관리자')}">작성자</td>
                <td class="text-center" th:text="${item.frstRegisterPnttm}">등록일</td>
                <td class="text-center" th:text="${item.inqireCo ?: 0}">0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4">등록된 게시물이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <div th:replace="~{fragments/pagination :: paginationBbs(paginationInfo=${paginationInfo}, baseUrl='/cop/bbs/selectBoardList.do', bbsId=${boardVO != null ? boardVO.bbsId : (brdMstrVO != null ? brdMstrVO.bbsId : '')}, searchCnd=${boardVO != null ? boardVO.searchCnd : ''}, searchWrd=${boardVO != null ? boardVO.searchWrd : ''})}"></div>

        <!-- 공지/갤러리/자료실은 관리자 게시 콘텐츠 → 글쓰기는 관리자(ROLE_ADMIN)만 노출 -->
        <div class="text-end" sec:authorize="hasRole('ADMIN')">
            <a class="krds-btn primary small"
               th:href="@{/cop/bbs/addBoardArticle.do(bbsId=${boardVO != null ? boardVO.bbsId : ''})}">
                <i class="bi bi-pencil-square"></i> 글쓰기
            </a>
        </div>
    </div>
</main>
</body>
</html>
