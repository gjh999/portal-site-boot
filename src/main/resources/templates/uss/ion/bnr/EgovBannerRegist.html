<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>배너 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/ion/bnr/selectBannerList.do}">배너관리</a></li>
            <li class="breadcrumb-item active">배너 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-image"></i> 배너 등록</h1>
        <form th:action="@{/uss/ion/bnr/addBanner.do}" th:object="${banner}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">배너 유형 <span class="text-danger">*</span></label>
                <select class="krds-form-select" th:field="*{bannerTy}" id="bannerTy" onchange="togglePopupFields()">
                    <option value="MAIN">메인 배너</option>
                    <option value="POPUP">팝업 배너</option>
                    <option value="FOOTER">푸터 배너</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">배너명 <span class="text-danger">*</span></label>
                <input class="krds-input" type="text" th:field="*{bannerNm}" maxlength="30" required autofocus/>
                <div class="text-danger small" th:if="${#fields.hasErrors('bannerNm')}" th:errors="*{bannerNm}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">링크 URL</label>
                <input class="krds-input" type="text" th:field="*{linkUrl}" maxlength="255" placeholder="선택사항 — 비우면 링크 없이 표시"/>
                <div class="text-danger small" th:if="${#fields.hasErrors('linkUrl')}" th:errors="*{linkUrl}"></div>
            </div>
            <!-- 팝업 유형 전용: 좌표/크기/묶음 -->
            <fieldset id="popupFields" class="mb-3" style="display:none; border:1px solid var(--krds-gray-10,#E7E8EA); border-radius:12px; padding:14px 16px;">
                <legend class="form-label" style="font-size:14px; font-weight:700;">팝업 옵션</legend>
                <div class="mb-2">
                    <label class="form-label">묶음 표출</label>
                    <select class="krds-form-select" th:field="*{popupGroupAt}">
                        <option value="N">각각 별도 팝업으로 표출</option>
                        <option value="Y">여러 팝업을 한 팝업 안에서 슬라이드(묶음)</option>
                    </select>
                </div>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">좌표 X(left, px)</label>
                        <input class="krds-input" type="number" th:field="*{popupLeft}" min="0" placeholder="중앙정렬은 비움"/></div>
                    <div class="col-6"><label class="form-label">좌표 Y(top, px)</label>
                        <input class="krds-input" type="number" th:field="*{popupTop}" min="0" placeholder="중앙정렬은 비움"/></div>
                    <div class="col-6"><label class="form-label">너비(width, px)</label>
                        <input class="krds-input" type="number" th:field="*{popupWidth}" min="0" placeholder="기본 420"/></div>
                    <div class="col-6"><label class="form-label">높이(height, px)</label>
                        <input class="krds-input" type="number" th:field="*{popupHeight}" min="0" placeholder="자동"/></div>
                </div>
            </fieldset>
            <div class="mb-3">
                <label class="form-label">배너 이미지</label>
                <input class="krds-input" type="file" name="file_1"/>
            </div>
            <div class="mb-3">
                <label class="form-label">배너 설명</label>
                <input class="krds-input" type="text" th:field="*{bannerDc}" maxlength="100"/>
            </div>
            <div class="mb-3">
                <label class="form-label">정렬순서 <span class="text-danger">*</span></label>
                <input class="krds-input" type="number" th:field="*{sortOrdr}" min="0" value="1" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('sortOrdr')}" th:errors="*{sortOrdr}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">노출여부</label>
                <select class="krds-form-select" th:field="*{reflctAt}">
                    <option value="Y">노출</option>
                    <option value="N">비노출</option>
                </select>
                <div class="form-text">'노출'이어도 아래 게시기간이 설정된 경우 기간 내에만 표시됩니다.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">게시기간 (노출 시작일 ~ 종료일)</label>
                <div class="d-flex align-items-center gap-2">
                    <input class="krds-input" type="date" th:field="*{expsrBgnde}"/>
                    <span>~</span>
                    <input class="krds-input" type="date" th:field="*{expsrEndde}"/>
                </div>
                <div class="form-text">미설정(비움) 시 상시 노출됩니다.</div>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/ion/bnr/selectBannerList.do}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
<th:block layout:fragment="body-js">
<script>
    function togglePopupFields() {
        var ty = document.getElementById('bannerTy');
        var box = document.getElementById('popupFields');
        if (ty && box) box.style.display = (ty.value === 'POPUP') ? 'block' : 'none';
    }
    document.addEventListener('DOMContentLoaded', togglePopupFields);
</script>
</th:block>
</body>
</html>
