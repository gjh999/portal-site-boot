<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.manage.list}">Q&amp;A 관리목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.manage}">Q&amp;A 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-dots"></i> <span th:text="#{qna.manage.list}">Q&amp;A 관리목록</span></h1>
        <p class="text-muted"><span th:text="#{list.total}">총</span> <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></p>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/qna/admin/QnaListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" th:title="#{bbs.search.cnd.select}">
                    <option value="" th:text="#{bbs.select.action}">선택</option>
                    <option value="qestnSj" th:selected="${searchVO.searchCondition == 'qestnSj'}" th:text="#{qna.search.cnd.qestnSj}">질문제목</option>
                    <option value="wrterNm" th:selected="${searchVO.searchCondition == 'wrterNm'}" th:text="#{common.writer}">작성자</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" th:title="#{search.keyword}"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;" th:text="#{qna.col.status}">상태</th>
                <th scope="col" th:text="#{qna.col.qestnSj}">제목</th>
                <th scope="col" style="width:120px;" th:text="#{common.writer}">작성자</th>
                <th scope="col" style="width:130px;" th:text="#{qna.col.writngDe}">작성일</th>
                <th scope="col" style="width:80px;" th:text="#{qna.detail.inqire}">조회</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td class="text-center">
                    <span class="krds-badge"
                          th:classappend="${item['qnaProcessSttusCode'] == '3'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item['qnaProcessSttusCodeNm'] ?: #messages.msg('qna.status.receipt')}">상태</span>
                </td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/olh/qna/admin/QnaInqireCoUpdt.do(qaId=${item['qaId']},passwordConfirmAt='Y')}"
                       th:text="${item['qestnSj']}">제목</a>
                </td>
                <td class="text-center" th:text="${item['wrterNm']}">작성자</td>
                <td class="text-center" th:text="${item['frstRegistPnttm']}">작성일</td>
                <td class="text-center" th:text="${item['inqireco'] ?: 0}">0</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4" th:text="#{qna.empty}">등록된 질문이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/qna/admin/QnaListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end">
            <a class="krds-btn tertiary small" th:href="@{/uss/olh/qnm/admin/QnaAnswerListInqire.do}">
                <i class="bi bi-chat-square-text"></i> <span th:text="#{qna.answer.manage}">답변 관리</span>
            </a>
            <a class="krds-btn primary small" th:href="@{/uss/olh/qna/admin/QnaCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> <span th:text="#{qna.regist}">질문 등록</span>
            </a>
        </div>
    </div>
</main>
</body>
</html>
