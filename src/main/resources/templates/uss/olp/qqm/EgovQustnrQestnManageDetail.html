<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qqm.detail.title}">설문문항 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qqm/EgovQustnrQestnManageList.do}" th:text="#{survey.crumb.qqm}">설문문항</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.detail}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-list-ol"></i> <span th:text="#{survey.qqm.detail.heading}">설문문항 상세</span></h1>
        <div class="text-muted" th:if="${r == null}" th:text="#{survey.empty.detail}">상세 데이터가 없습니다.</div>
        <div class="krds-table-wrap" th:if="${r != null}"><table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{survey.col.qestnrSj}">설문제목</th><td th:text="${r.qestnrSj}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.qestnsn}">질문순번</th><td th:text="${r.qestnsn}"></td></tr>
            <tr><th scope="row" th:text="#{survey.col.qestnTy}">질문유형</th>
                <td><span th:each="c : ${cmmCode018}" th:if="${c.code == r.qestntycode}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th scope="row" th:text="#{survey.field.mxmmChoiseCo}">최대선택건수</th><td th:text="${r.mxmmchoiseco}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.qestnCn}">질문내용</th><td style="white-space:pre-line;" th:text="${r.qestncn}"></td></tr>
            </tbody>
        </table></div>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/qqm/EgovQustnrQestnManageList.do}" th:text="#{survey.btn.list}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qqm/EgovQustnrQestnManageModify.do}" method="post">
                    <input type="hidden" name="qestnrQesitmId" th:value="${r.qestnrqesitmid}"/>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-pencil"></i> <span th:text="#{survey.btn.modify}">수정</span></button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qqm/EgovQustnrQestnManageDetail.do}" method="post"
                      th:onsubmit="'return confirm(\'' + #{survey.confirm.delete} + '\');'">
                    <input type="hidden" name="qestnrQesitmId" th:value="${r.qestnrqesitmid}"/>
                    <input type="hidden" name="qestnrId" th:value="${r.qestnrId}"/>
                    <input type="hidden" name="qestnrTmplatId" th:value="${r.qestnrtmplatid}"/>
                    <input type="hidden" name="searchMode" value="Y"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{survey.btn.delete}">삭제</span></button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
