<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>Q&amp;A 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/QnaListInqire.do}">Q&amp;A</a></li>
            <li class="breadcrumb-item active">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 질문 등록</h1>
        <form th:action="@{/uss/olh/qna/QnaCnRegist.do}" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">작성자 <span class="text-muted small">(최대 4자)</span></label>
                    <input class="krds-input" type="text" name="wrterNm" maxlength="4" th:value="${result?.wrterNm}" required/></div>
                <div class="col-md-6"><label class="form-label">이메일</label>
                    <input class="krds-input" type="email" name="emailAdres" th:value="${result?.emailAdres}"/></div>
                <div class="col-12"><label class="form-label">제목</label>
                    <input class="krds-input" type="text" name="qestnSj" maxlength="250" required/></div>
                <div class="col-12"><label class="form-label">질문 내용</label>
                    <textarea class="krds-input" rows="6" name="qestnCn" required></textarea></div>
                <div class="col-md-6"><label class="form-label">비밀번호(수정/삭제용)</label>
                    <input class="krds-input" type="password" name="writngPassword" maxlength="20" required/></div>
                <!-- answerCn 은 @EgovNullCheck 대상: 등록 시 답변 없음 → 검증통과용 공백 -->
                <input type="hidden" name="answerCn" value=" "/>
                <input type="hidden" name="emailAnswerAt" value="N"/>
                <input type="hidden" name="qnaProcessSttusCode" value="1"/>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <a class="krds-btn tertiary" th:href="@{/uss/olh/qna/QnaListInqire.do}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 등록</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
