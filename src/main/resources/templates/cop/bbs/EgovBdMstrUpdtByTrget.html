<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.updtByTrget}">게시판 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:860px;"
         th:with="trgetId=${result != null ? result.trgetId : (searchVO != null ? searchVO.trgetId : '')}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/cop/bbs/selectBdMstrListByTrget.do(trgetId=${trgetId})}" th:text="#{bbs.bbsList}">게시판목록</a>
            </li>
            <li class="breadcrumb-item active" th:text="#{bbs.updtByTrget}">게시판 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{bbs.updtByTrget}">게시판 수정</span></h1>
        <form th:action="@{/cop/bbs/UpdateBBSMasterInfByTrget.do}" method="post">
            <input type="hidden" name="trgetId" th:value="${trgetId}"/>
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <input type="hidden" name="bbsId" th:value="${result != null ? result.bbsId : ''}"/>
            <input type="hidden" name="bbsTyCode" th:value="${result != null ? result.bbsTyCode : ''}"/>
            <input type="hidden" name="bbsAttrbCode" th:value="${result != null ? result.bbsAttrbCode : ''}"/>
            <input type="hidden" name="tmplatId" th:value="${result != null and result.tmplatId != null and !#strings.isEmpty(result.tmplatId) ? result.tmplatId : 'TMPLAT_BOARD_DEFAULT'}"/>

            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;" th:text="#{bbs.bbsId}">게시판 ID</th>
                    <td><span th:text="${result != null ? result.bbsId : ''}">bbsId</span></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.bbsNm.label}">게시판 명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" name="bbsNm" maxlength="120"
                               th:value="${result != null ? result.bbsNm : ''}" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.bbsIntrcn}">게시판 소개</span> <span class="text-danger">*</span></th>
                    <td><textarea class="krds-input" rows="4" maxlength="2000" name="bbsIntrcn" required
                                  th:text="${result != null ? result.bbsIntrcn : ''}"></textarea></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.bbsTy.label}">게시판 유형</th>
                    <td><span
                              th:text="${result != null and result.bbsTyCodeNm != null and !#strings.isEmpty(result.bbsTyCodeNm) ? result.bbsTyCodeNm : (result != null ? result.bbsTyCode : '')}">유형</span></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.bbsAttrb.label}">게시판 속성</th>
                    <td><span
                              th:text="${result != null and result.bbsAttrbCodeNm != null and !#strings.isEmpty(result.bbsAttrbCodeNm) ? result.bbsAttrbCodeNm : (result != null ? result.bbsAttrbCode : '')}">속성</span></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.replyPosblAt}">답장가능여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_y" name="replyPosblAt" value="Y"
                                   th:checked="${result != null and result.replyPosblAt == 'Y'}"/>
                            <label class="form-check-label" for="rp_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_n" name="replyPosblAt" value="N"
                                   th:checked="${result != null and result.replyPosblAt == 'N'}"/>
                            <label class="form-check-label" for="rp_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.fileAtchPosblAt}">파일첨부가능여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_y" name="fileAtchPosblAt" value="Y"
                                   th:checked="${result != null and result.fileAtchPosblAt == 'Y'}"/>
                            <label class="form-check-label" for="fa_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_n" name="fileAtchPosblAt" value="N"
                                   th:checked="${result != null and result.fileAtchPosblAt == 'N'}"/>
                            <label class="form-check-label" for="fa_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.posblAtchFileNumber}">첨부가능파일 숫자</th>
                    <td>
                        <select class="krds-form-select" name="posblAtchFileNumber">
                            <option value="0" th:selected="${result == null or result.posblAtchFileNumber == 0}" th:text="#{bbs.select}">선택하세요</option>
                            <option value="1" th:selected="${result != null and result.posblAtchFileNumber == 1}" th:text="#{bbs.fileCount.1}">1개</option>
                            <option value="2" th:selected="${result != null and result.posblAtchFileNumber == 2}" th:text="#{bbs.fileCount.2}">2개</option>
                            <option value="3" th:selected="${result != null and result.posblAtchFileNumber == 3}" th:text="#{bbs.fileCount.3}">3개</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.tmplatInfo}">템플릿 정보</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" name="tmplatNm" readonly
                               th:value="${result != null and result.tmplatNm != null and !#strings.isEmpty(result.tmplatNm) ? result.tmplatNm : #messages.msg('bbs.tmplat.default')}"/></td>
                </tr>
                </tbody>
            </table>
            </div>

            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary"
                   th:href="@{/cop/bbs/selectBdMstrListByTrget.do(trgetId=${trgetId})}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
            </div>
        </form>
        <form th:action="@{/cop/bbs/DeleteBBSMasterInfByTrget.do}" method="post" class="mt-2 text-end"
              th:onsubmit="'return confirm(\'' + #{bbs.confirm.delete} + '\');'" onsubmit="return confirm('삭제하시겠습니까?');">
            <input type="hidden" name="trgetId" th:value="${trgetId}"/>
            <input type="hidden" name="bbsId" th:value="${result != null ? result.bbsId : ''}"/>
            <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
        </form>
    </div>
</main>
</body>
</html>
