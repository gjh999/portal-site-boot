<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qri.regist.title}">응답결과 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qri/EgovQustnrRespondInfoList.do}" th:text="#{survey.crumb.qri}">응답결과</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.regist}">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-data"></i> <span th:text="#{survey.qri.regist.heading}">응답결과 등록</span></h1>
        <form th:action="@{/uss/olp/qri/EgovQustnrRespondInfoRegist.do}" th:object="${qustnrRespondInfoVO}" method="post">
            <input type="hidden" name="cmd" value="save"/>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label" th:text="#{survey.field.qestnrId}">설문지 ID</label>
                    <input class="krds-input" type="text" th:field="*{qestnrId}"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{survey.field.qestnrTmplatId}">설문템플릿 ID</label>
                    <input class="krds-input" type="text" th:field="*{qestnrTmplatId}"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{survey.field.qestnrQesitmId}">설문문항 ID</label>
                    <input class="krds-input" type="text" th:field="*{qestnrQesitmId}"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{survey.field.qestnrItemId}">설문항목 ID</label>
                    <input class="krds-input" type="text" th:field="*{qustnrIemId}"/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.field.respondNm}">응답자명</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" th:field="*{respondNm}" maxlength="50" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('respondNm')}" th:errors="*{respondNm}"></div></div>
                <div class="col-12"><label class="form-label" th:text="#{survey.field.respondAnswerCn}">응답자답변내용</label>
                    <textarea class="krds-input" rows="3" th:field="*{respondAnswerCn}"></textarea></div>
                <div class="col-12"><label class="form-label" th:text="#{survey.field.etcAnswerCn}">기타답변내용</label>
                    <textarea class="krds-input" rows="2" th:field="*{etcAnswerCn}"></textarea></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/olp/qri/EgovQustnrRespondInfoList.do}" th:text="#{survey.btn.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{survey.btn.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
