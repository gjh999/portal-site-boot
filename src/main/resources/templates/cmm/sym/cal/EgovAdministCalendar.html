<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>행정달력</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">행정달력</li>
        </ol></nav>

        <div class="d-flex align-items-center justify-content-between mb-3" th:if="${restde != null}"
             th:with="im=${#conversions.convert(restde.month, 'java.lang.Integer')}">
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cmm/EgovselectAdministCalendar.do(year=${restde.year}, month=${im - 1})}">
                <i class="bi bi-chevron-left"></i> 이전달</a>
            <h1 class="h4 mb-0"><i class="bi bi-calendar3"></i>
                <span th:text="${restde.year}">2026</span>년 <span th:text="${restde.month}">6</span>월 행정달력</h1>
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cmm/EgovselectAdministCalendar.do(year=${restde.year}, month=${im + 1})}">
                다음달 <i class="bi bi-chevron-right"></i></a>
        </div>

        <table class="tbl text-center align-middle" style="table-layout:fixed;" th:if="${restde != null}">
            <thead>
            <tr><th scope="col" class="text-danger">일</th><th scope="col">월</th><th scope="col">화</th><th scope="col">수</th><th scope="col">목</th><th scope="col">금</th><th scope="col" class="text-primary">토</th></tr>
            </thead>
            <tbody>
            <tr th:each="r : ${#numbers.sequence(0, 5)}">
                <td th:each="c : ${#numbers.sequence(0, 6)}"
                    th:with="dd=${r * 7 + c + 2 - restde.startWeekMonth}, dstr=${(dd lt 10 ? '0' : '') + dd}"
                    th:classappend="${c == 0} ? ' text-danger' : (${c == 6} ? ' text-primary' : '')"
                    style="height:72px; vertical-align:top;">
                    <th:block th:if="${dd ge 1 and dd le restde.lastDayMonth}">
                        <span th:text="${dd}"></span>
                        <span class="krds-badge bg-danger d-inline-block mt-1" style="max-width:100%;"
                              th:each="rd : ${resultList}" th:if="${rd.day == dstr}"
                              th:text="${rd.restdeNm}"></span>
                    </th:block>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${restde == null}" class="alert alert-secondary">표시할 달력 데이터가 없습니다.</div>
    </div>
</main>
</body>
</html>
