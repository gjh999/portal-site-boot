<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.authorRole.title}">권한별 롤 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sec/ram/EgovAuthorListView.do}" th:text="#{sec.author.title}">권한관리</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.authorRole.title}">권한별 롤 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-lock"></i> <span th:text="#{sec.authorRole.title}">권한별 롤 관리</span></h1>

        <form id="searchForm" th:action="@{/sec/ram/EgovAuthorRoleList.do}" method="post" class="row g-2 mb-3">
            <div class="col-auto">
                <label class="col-form-label" th:text="#{sec.author.code}">권한코드</label>
            </div>
            <div class="col-auto">
                <input type="text" class="krds-input" name="searchKeyword"
                       th:value="${authorRoleManageVO != null ? authorRoleManageVO.searchKeyword : ''}" th:placeholder="#{sec.author.code.placeholder}" placeholder="권한코드 입력"/>
            </div>
            <div class="col-auto">
                <button type="submit" class="krds-btn secondary small"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <form id="roleForm" th:action="@{/sec/ram/EgovAuthorRoleInsert.do}" method="post">
            <input type="hidden" name="authorCode" id="authorCode"
                   th:value="${authorRoleManageVO != null ? authorRoleManageVO.searchKeyword : ''}"/>
            <input type="hidden" name="roleCodes" id="roleCodes"/>
            <input type="hidden" name="regYns" id="regYns"/>

            <div class="krds-table-wrap">
            <table class="tbl">
                <thead><tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll"/></th>
                    <th scope="col" th:text="#{sec.role.id}">롤ID</th><th scope="col" th:text="#{sec.role.name}">롤명</th><th scope="col" th:text="#{sec.role.type}">롤타입</th><th scope="col" th:text="#{sec.role.sort}">롤Sort</th><th scope="col" th:text="#{sec.role.desc}">롤 설명</th><th scope="col" style="width:120px;" th:text="#{sec.col.regDate}">등록일자</th><th scope="col" style="width:120px;" th:text="#{sec.col.regYn}">등록여부</th>
                </tr></thead>
                <tbody>
                <tr th:each="item : ${authorRoleList}">
                    <td><input type="checkbox" class="rowChk" th:attr="data-rolecode=${item.roleCode}"/></td>
                    <td th:text="${item.roleCode}">코드</td>
                    <td th:text="${item.roleNm}">롤명</td>
                    <td th:text="${item.roleTyp}">타입</td>
                    <td th:text="${item.roleSort}">Sort</td>
                    <td th:text="${item.roleDc}">설명</td>
                    <td class="text-center" th:text="${item.creatDt}">등록일자</td>
                    <td>
                        <select class="krds-form-select rowReg">
                            <option value="Y" th:selected="${item.regYn == 'Y'}" th:text="#{sec.regYn.registered}">등록</option>
                            <option value="N" th:selected="${item.regYn == 'N'}" th:text="#{sec.regYn.unregistered}">미등록</option>
                        </select>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(authorRoleList)}"><td colspan="8" class="text-center text-muted py-4" th:text="#{sec.authorRole.empty}">조회된 롤이 없습니다. 권한코드로 조회하세요.</td></tr>
                </tbody>
            </table>
            </div>
            <div class="text-end">
                <button type="button" class="krds-btn primary small" onclick="submitAuthorRole()"><i class="bi bi-save"></i> <span th:text="#{sec.authorRole.save}">권한별 롤정보 저장</span></button>
            </div>
        </form>
    </div>
    <script th:inline="javascript">
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function submitAuthorRole() {
            var rows = document.querySelectorAll('#roleForm tbody tr');
            var codes = [], regs = [];
            rows.forEach(function (tr) {
                var chk = tr.querySelector('.rowChk');
                if (chk && chk.checked) {
                    codes.push(chk.getAttribute('data-rolecode'));
                    regs.push(tr.querySelector('.rowReg').value);
                }
            });
            if (codes.length === 0) { alert(/*[[#{sec.authorRole.alert.noRole}]]*/ '선택된 롤이 없습니다.'); return; }
            if (!confirm(/*[[#{sec.confirm.save}]]*/ '저장하시겠습니까?')) return;
            document.getElementById('roleCodes').value = codes.join(';');
            document.getElementById('regYns').value = regs.join(';');
            document.getElementById('roleForm').submit();
        }
    </script>
</main>
</body>
</html>
