<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>FAQ 수정 (관리자)</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/faq/admin/FaqListInqire.do}">FAQ 관리</a></li>
            <li class="breadcrumb-item active">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> FAQ 수정</h1>
        <form th:action="@{/uss/olh/faq/admin/FaqCnUpdt.do}" method="post" th:object="${faqManageVO}"
              enctype="multipart/form-data">
            <input type="hidden" th:field="*{faqId}"/>
            <input type="hidden" th:field="*{atchFileId}"/>
            <input type="hidden" name="atchFileAt" th:value="${faqManageVO.atchFileId != null and !faqManageVO.atchFileId.isEmpty()} ? 'Y' : 'N'"/>
            <div class="mb-3"><label class="form-label">질문 제목</label>
                <input class="form-control" type="text" th:field="*{qestnSj}" required/></div>
            <div class="mb-3"><label class="form-label">질문 내용</label>
                <textarea class="form-control" rows="4" th:field="*{qestnCn}" required></textarea></div>
            <div class="mb-3"><label class="form-label">답변 내용</label>
                <textarea class="form-control" rows="6" th:field="*{answerCn}" required></textarea></div>
            <div class="mb-3"><label class="form-label">첨부파일 추가</label>
                <input class="form-control" type="file" name="file_1"/></div>
            <div class="d-flex justify-content-between">
                <a class="btn btn-outline-secondary" th:href="@{/uss/olh/faq/admin/FaqListDetailInqire.do(faqId=*{faqId})}">취소</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
