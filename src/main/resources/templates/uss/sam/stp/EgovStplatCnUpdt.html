<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{terms.stplat.updt.heading}">이용약관 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/sam/terms/list.do(termsType='stplat')}" th:text="#{terms.stplat.title}">이용약관</a></li>
            <li class="breadcrumb-item active" th:text="#{terms.stplat.updt.crumb}">약관 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{terms.stplat.updt.heading}">이용약관 수정</span></h1>
        <form th:action="@{/uss/sam/stp/StplatCnUpdt.do}" th:object="${stplatManageVO}" method="post">
            <input type="hidden" th:field="*{useStplatId}"/>
            <div class="mb-3">
                <label class="form-label" th:text="#{terms.type}">유형</label>
                <input class="krds-input" type="text" th:value="#{terms.stplat}" value="이용약관" readonly disabled/>
            </div>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{terms.stplat.col.nm}">이용약관명</span> <span class="text-danger">*</span></label>
                <input class="krds-input" type="text" th:field="*{useStplatNm}" maxlength="100" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('useStplatNm')}" th:errors="*{useStplatNm}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{terms.stplat.col.cn}">이용약관내용</span> <span class="text-danger">*</span></label>
                <textarea class="krds-input" rows="10" th:field="*{useStplatCn}" required></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('useStplatCn')}" th:errors="*{useStplatCn}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{terms.infoProvdAgreCn}">정보제공동의내용</span> <span class="text-danger">*</span></label>
                <textarea class="krds-input" rows="8" th:field="*{infoProvdAgreCn}" required></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('infoProvdAgreCn')}" th:errors="*{infoProvdAgreCn}"></div>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/sam/terms/list.do(termsType='stplat')}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
