<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>업무사용자 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/umt/mber/EgovMberManage.do}">회원관리</a></li>
            <li class="breadcrumb-item active">업무사용자 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-badge"></i> 업무사용자 수정</h1>

        <form th:action="@{/uss/umt/mber/EgovEmplyrSelectUpdt.do}" method="post" th:object="${mberManageVO}">
            <input type="hidden" th:field="*{uniqId}"/>

            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title">기본 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label">아이디</label>
                        <input class="krds-input" type="text" th:field="*{mberId}" maxlength="20" readonly/></div>
                    <div class="col-md-6 form-group"><label class="form-label">회원상태</label>
                        <select class="krds-form-select" th:field="*{mberSttus}" title="회원상태 선택">
                            <option value="A">신청중</option>
                            <option value="P">가입승인</option>
                            <option value="D">가입삭제</option>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label">이름</label>
                        <input class="krds-input" type="text" th:field="*{mberNm}" maxlength="60" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label">이메일</label>
                        <input class="krds-input" type="email" th:field="*{mberEmailAdres}" maxlength="50"/></div>
                </div>
            </fieldset>

            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title">연락처·주소</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label">사무실전화</label>
                        <input class="krds-input" type="text" th:field="*{telno}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label">휴대전화</label>
                        <input class="krds-input" type="text" th:field="*{moblphonNo}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label">팩스번호</label>
                        <input class="krds-input" type="text" th:field="*{mberFxnum}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label">우편번호</label>
                        <input class="krds-input" type="text" th:field="*{zip}" maxlength="6"/></div>
                    <div class="col-12 form-group"><label class="form-label">주소</label>
                        <input class="krds-input" type="text" th:field="*{adres}" maxlength="100"/></div>
                    <div class="col-12 form-group"><label class="form-label">상세주소</label>
                        <input class="krds-input" type="text" th:field="*{detailAdres}" maxlength="100"/></div>
                </div>
            </fieldset>

            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/umt/mber/EgovMberManage.do}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
