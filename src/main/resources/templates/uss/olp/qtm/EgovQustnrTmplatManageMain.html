<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qtm.mainPage.title}">설문템플릿 메인</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.qtm.mainPage.title}">설문템플릿 메인</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-layout-text-window"></i> <span th:text="#{survey.qtm.list.heading}">설문템플릿 관리</span></h1>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-list-ul"></i> <span th:text="#{survey.qtm.mainPage.listCard}">설문템플릿 목록</span></h5>
                        <p class="text-muted" th:text="#{survey.qtm.mainPage.listCard.desc}">등록된 설문템플릿을 조회하고 관리합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}" th:text="#{survey.qtm.mainPage.goList}">목록 바로가기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="krds-panel h-100">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-plus-square"></i> <span th:text="#{survey.qtm.mainPage.registCard}">설문템플릿 등록</span></h5>
                        <p class="text-muted" th:text="#{survey.qtm.mainPage.registCard.desc}">새로운 설문템플릿을 등록합니다.</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageRegist.do}" th:text="#{survey.qtm.mainPage.goRegist}">등록 바로가기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
