<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.role.modify}">롤 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sec/rmt/EgovRoleListView.do}" th:text="#{sec.role.title}">롤관리</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.role.modify}">롤 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> <span th:text="#{sec.role.modifyFull}">롤(Role) 수정</span></h1>

        <form th:action="@{/sec/rmt/EgovRoleUpdate.do}" method="post">
            <input type="hidden" name="roleCode" th:value="${roleManage?.roleCode}"/>
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <label class="form-label" for="roleCode" th:text="#{sec.role.code}">롤 코드</label>
                        <input type="text" class="krds-input" id="roleCode" readonly th:value="${roleManage?.roleCode}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleNm"><span th:text="#{sec.role.name}">롤 명</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="roleNm" name="roleNm" maxlength="50" required th:value="${roleManage?.roleNm}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rolePtn"><span th:text="#{sec.role.pattern}">롤 패턴</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="rolePtn" name="rolePtn" maxlength="50" required th:value="${roleManage?.rolePtn}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleDc" th:text="#{sec.role.desc}">설명</label>
                        <input type="text" class="krds-input" id="roleDc" name="roleDc" maxlength="50" th:value="${roleManage?.roleDc}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleTyp"><span th:text="#{sec.role.type}">롤 타입</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" id="roleTyp" name="roleTyp">
                            <option th:each="c : ${cmmCodeDetailList}" th:value="${c.code}" th:text="${c.codeNm}"
                                    th:selected="${roleManage != null and c.code == roleManage.roleTyp}">타입</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleSort"><span th:text="#{sec.role.sort}">롤 Sort</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="roleSort" name="roleSort" maxlength="50" required th:value="${roleManage?.roleSort}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleCreatDe" th:text="#{sec.col.regDate}">등록일자</label>
                        <input type="text" class="krds-input" id="roleCreatDe" readonly th:value="${roleManage?.roleCreatDe}"/>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="krds-btn danger small"
                        th:formaction="@{/sec/rmt/EgovRoleDelete.do}"
                        th:onclick="'return confirm(\'' + #{sec.confirm.delete} + '\');'"
                        onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sec/rmt/EgovRoleListView.do}" th:text="#{button.list}">목록</a>
                    <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
