<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.title}">Q&amp;A</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.title}">Q&amp;A</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-dots"></i> <span th:text="#{qna.heading.full}">묻고 답하기 (Q&amp;A)</span></h1>
        <p class="text-muted mb-4" th:text="#{qna.intro}">궁금한 점을 질문하고 답변을 받아보세요.</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-list-ul"></i> <span th:text="#{qna.list}">Q&amp;A 목록</span></h5>
                        <p class="text-muted" th:text="#{qna.list.intro}">등록된 질문과 답변을 조회합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/olh/qna/QnaListInqire.do}" th:text="#{qna.list.view}">Q&amp;A 보기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-pencil-square"></i> <span th:text="#{qna.regist}">질문 등록</span></h5>
                        <p class="text-muted" th:text="#{qna.regist.intro}">새로운 질문을 등록합니다.</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/olh/qna/QnaCnRegistView.do}" th:text="#{qna.regist}">질문 등록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
