<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{mber.update.title}">회원정보 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{common.memberManage}">회원관리</a></li>
            <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-gear"></i> <span th:text="#{mber.update.title}">회원정보 수정</span></h1>
        <form th:action="@{/uss/umt/mber/EgovMberSelectUpdt.do}" method="post" th:object="${mberManageVO}">
            <!-- 검증오류 안내: POST 검증실패 시에만 표시(GET 렌더 시 BindingResult 부재로 인한 #fields 500 방지) -->
            <div class="alert alert-danger py-2" th:if="${hasErrors}" th:text="#{mber.form.validateError}">
                입력값을 확인하세요. (필수 항목 누락)
            </div>
            <input type="hidden" th:field="*{uniqId}"/>
            <input type="hidden" th:field="*{password}"/>
            <input type="hidden" th:field="*{ihidnum}"/>
            <input type="hidden" th:field="*{sbscrbDe}"/>

            <!-- ── 섹션: 계정 정보 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{entrprs.sec.account}">계정 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.id}">아이디</label>
                        <input class="krds-input" type="text" th:field="*{mberId}" readonly/></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password.hint}">비밀번호 힌트</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" th:field="*{passwordHint}">
                            <th:block th:if="${not #lists.isEmpty(passwordHint_result)}">
                                <option th:each="c : ${passwordHint_result}" th:value="${c.code}" th:text="${c.codeNm}">힌트</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(passwordHint_result)}">
                                <option value="P01" th:text="#{mber.pwdHint.p01}">가장 기억에 남는 장소는?</option>
                                <option value="P02" th:text="#{mber.pwdHint.p02}">나의 좌우명은?</option>
                                <option value="P03" th:text="#{mber.pwdHint.p03}">나의 보물 제1호는?</option>
                                <option value="P04" th:text="#{mber.pwdHint.p04}">가장 기억에 남는 선생님 성함은?</option>
                                <option value="P05" th:text="#{mber.pwdHint.p05}">다른 사람은 모르는 나만의 신체비밀은?</option>
                            </th:block>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password.cnsr}">비밀번호 정답</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="text" th:field="*{passwordCnsr}" maxlength="100" required/></div>
                </div>
            </fieldset>

            <!-- ── 섹션: 기본 정보 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{mber.sec.basic}">기본 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.name}">이름</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="text" th:field="*{mberNm}" maxlength="50" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.sexdstn}">성별</label>
                        <select class="krds-form-select" th:field="*{sexdstnCode}">
                            <option value="" th:text="#{mber.select}">선택</option>
                            <th:block th:if="${not #lists.isEmpty(sexdstnCode_result)}">
                                <option th:each="c : ${sexdstnCode_result}" th:value="${c.code}" th:text="${c.codeNm}">성별</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(sexdstnCode_result)}">
                                <option value="M" th:text="#{mber.sex.male}">남자</option>
                                <option value="F" th:text="#{mber.sex.female}">여자</option>
                            </th:block>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.occpTy}">직업유형</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" th:field="*{occpTy}" required>
                            <option value="" th:text="#{mber.select}">선택</option>
                            <option th:each="c : ${occpTy_result}" th:if="${c.code != '00'}"
                                    th:value="${c.code}" th:text="${c.codeNm}">직업</option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('occpTy')}" th:errors="*{occpTy}"></div></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.sttus}">회원상태</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" th:field="*{mberSttus}">
                            <th:block th:if="${not #lists.isEmpty(mberSttus_result)}">
                                <option th:each="c : ${mberSttus_result}" th:value="${c.code}" th:text="${c.codeNm}">상태</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(mberSttus_result)}">
                                <option value="A" th:text="#{mber.sttus.pending}">신청중</option>
                                <option value="P" th:text="#{mber.sttus.approvedShort}">승인</option>
                                <option value="D" th:text="#{mber.sttus.deleted}">가입삭제</option>
                            </th:block>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.group}">소속그룹</span> <span class="text-danger">*</span></label>
                        <!-- 일반회원(USR01)은 ROLE_ADMIN(GROUP_00000000000000) 선택 불가. 업무사용자만 ROLE_ADMIN 선택 가능 -->
                        <select class="krds-form-select" th:field="*{groupId}">
                            <th:block th:if="${not #lists.isEmpty(groupId_result)}">
                                <option th:each="c : ${groupId_result}"
                                        th:if="${(userTyForGroup == 'USR') or (c.code != 'GROUP_00000000000000')}"
                                        th:value="${c.code}" th:text="${c.codeNm}"
                                        th:selected="${c.code == mberManageVO.groupId}">그룹</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(groupId_result)}">
                                <option value="GROUP_00000000000001" th:selected="${mberManageVO.groupId == 'GROUP_00000000000001'}">ROLE_USER</option>
                                <option th:if="${userTyForGroup == 'USR'}" value="GROUP_00000000000000"
                                        th:selected="${mberManageVO.groupId == 'GROUP_00000000000000'}">ROLE_ADMIN</option>
                            </th:block>
                        </select></div>
                </div>
            </fieldset>

            <!-- ── 섹션: 연락처 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{mber.sec.contact}">연락처</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.moblphon}">휴대전화</label>
                        <input class="krds-input" type="text" th:field="*{moblphonNo}" maxlength="13"
                               data-phone-format="mobile" inputmode="numeric" placeholder="010-1234-5678"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{entrprs.telno}">전화번호</label>
                        <input class="krds-input" type="text" th:field="*{telno}" maxlength="13"
                               data-phone-format="tel" inputmode="numeric" placeholder="02-123-4567"/></div>
                    <div class="col-md-12 form-group"><label class="form-label" th:text="#{mber.col.email}">이메일</label>
                        <input class="krds-input" type="email" th:field="*{mberEmailAdres}" maxlength="50"/></div>
                </div>
            </fieldset>

            <!-- ── 섹션: 주소 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{mber.sec.address}">주소</legend>
                <div class="row g-3">
                    <div class="col-md-4 form-group"><label class="form-label" th:text="#{entrprs.zip}">우편번호</label>
                        <div class="input-group">
                            <input class="krds-input" type="text" th:field="*{zip}" maxlength="8"/>
                            <button class="krds-btn tertiary" type="button" onclick="fn_egov_ZipSearch()" th:title="#{mber.zip.search}" title="우편번호 검색">
                                <i class="bi bi-search"></i></button>
                        </div></div>
                    <div class="col-md-8 form-group"><label class="form-label" th:text="#{entrprs.adres}">주소</label>
                        <input class="krds-input" type="text" th:field="*{adres}" maxlength="100"/></div>
                    <div class="col-12 form-group"><label class="form-label" th:text="#{entrprs.detailAdres}">상세주소</label>
                        <input class="krds-input" type="text" th:field="*{detailAdres}" maxlength="100"/></div>
                </div>
            </fieldset>

            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{button.cancel}">취소</a>
                <div class="d-flex gap-2">
                    <a class="krds-btn secondary"
                       th:href="@{/uss/umt/mber/EgovMberPasswordUpdtView.do(userTyForPassword='USR01',mberId=*{mberId},uniqId=*{uniqId})}">
                        <i class="bi bi-key"></i> <span th:text="#{mber.pwd.update.title}">비밀번호 변경</span></a>
                    <a class="krds-btn danger"
                       th:href="@{/uss/umt/mber/EgovMberDelete.do(checkedIdForDel='USR01:' + *{uniqId})}"
                       th:onclick="'return confirm(\'' + #{mber.confirmDeleteOne} + '\');'"
                       onclick="return confirm('이 회원을 삭제하시겠습니까?');">
                        <i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></a>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
                </div>
            </div>
        </form>
    </div>
    <script th:inline="javascript">
        function fn_egov_ZipSearch() {
            window.open([[@{/cmm/sym/zip/EgovCcmZipSearchPopup.do}]], 'zipSearch', 'width=560,height=620,scrollbars=yes');
        }
        /* 우편번호 팝업 콜백 (JSP fn_egov_returnValue 동일 시그니처, ZIP 컬럼 VARCHAR(6)라 sZip 사용) */
        function fn_egov_returnValue(retVal) {
            if (retVal) {
                document.getElementById('zip').value = retVal.sZip || retVal.vZip;
                document.getElementById('adres').value = retVal.sAddr;
            }
        }
    </script>
</main>
</body>
</html>
