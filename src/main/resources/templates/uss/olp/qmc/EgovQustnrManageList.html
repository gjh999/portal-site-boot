<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qmc.pageTitle}">설문관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.qmc.pageTitle}">설문관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-check"></i> <span th:text="#{survey.qmc.pageTitle}">설문관리</span></h1>
        <div class="krds-table-wrap"><table class="tbl">
            <thead><tr>
                <th scope="col" style="width:60px;" th:text="#{survey.label.no}">번호</th>
                <th scope="col" th:text="#{survey.col.qestnrSj}">설문제목</th>
                <th scope="col" style="width:140px;" th:text="#{survey.label.regdate}">등록일</th>
                <th scope="col" style="width:170px;" th:text="#{survey.stats.title}">결과·집계</th>
            </tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td><a th:href="@{/uss/olp/qmc/EgovQustnrManageDetail.do(qestnrId=${item.qestnrid})}" th:text="${item.qestnrsj}">설문제목</a></td>
                <td class="text-center" th:text="${item.frstRegistPnttm}">등록일</td>
                <td class="text-center">
                    <a class="krds-btn tertiary small"
                       th:href="@{/uss/olp/qnn/EgovQustnrRespondInfoManageStatistics.do(qestnrId=${item.qestnrid},qestnrTmplatId=${item.qestnrtmplatid})}">
                        <i class="bi bi-bar-chart-line"></i> <span th:text="#{survey.btn.viewStats}">집계 보기</span>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="4" class="text-center text-muted py-4" th:text="#{survey.empty.list}">등록된 설문이 없습니다.</td></tr>
            </tbody>
        </table></div>
        <div class="text-end"><a class="krds-btn primary small" th:href="@{/uss/olp/qmc/EgovQustnrManageRegist.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{survey.btn.registSurvey}">설문 등록</span></a></div>
    </div>
</main>
</body>
</html>
