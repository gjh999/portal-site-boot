<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>게시판 생성</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:860px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cop/bbs/SelectBBSMasterInfs.do}">게시판생성관리</a></li>
            <li class="breadcrumb-item active">게시판 생성</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-plus"></i> 게시판 생성</h1>
        <form th:action="@{/cop/bbs/insertBBSMasterInf.do}" th:object="${boardMaster}" method="post">
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <!-- @EgovNullCheck(tmplatId) : 빈값이면 검증 실패하므로 기본 템플릿 ID를 보장한다 -->
            <input type="hidden" id="tmplatId" name="tmplatId"
                   th:value="${boardMaster != null and boardMaster.tmplatId != null and !#strings.isEmpty(boardMaster.tmplatId) ? boardMaster.tmplatId : 'TMPLAT_BOARD_DEFAULT'}"/>

            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;">게시판 명 <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" maxlength="120" th:field="*{bbsNm}" required/></td>
                </tr>
                <tr>
                    <th scope="row">게시판 소개 <span class="text-danger">*</span></th>
                    <td><textarea class="krds-input" rows="4" maxlength="2000" th:field="*{bbsIntrcn}" required></textarea></td>
                </tr>
                <tr>
                    <th scope="row">게시판 유형 <span class="text-danger">*</span></th>
                    <td>
                        <select class="krds-form-select" th:field="*{bbsTyCode}" required>
                            <option value="">선택하세요</option>
                            <option th:each="c : ${typeList}" th:value="${c.code}" th:text="${c.codeNm}">유형</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row">게시판 속성 <span class="text-danger">*</span></th>
                    <td>
                        <select class="krds-form-select" th:field="*{bbsAttrbCode}" required>
                            <option value="">선택하세요</option>
                            <option th:each="c : ${attrbList}" th:value="${c.code}" th:text="${c.codeNm}">속성</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row">답장가능여부 <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_y" th:field="*{replyPosblAt}" value="Y"/>
                            <label class="form-check-label" for="rp_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_n" th:field="*{replyPosblAt}" value="N"/>
                            <label class="form-check-label" for="rp_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row">파일첨부가능여부 <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_y" th:field="*{fileAtchPosblAt}" value="Y"/>
                            <label class="form-check-label" for="fa_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_n" th:field="*{fileAtchPosblAt}" value="N"/>
                            <label class="form-check-label" for="fa_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row">첨부가능파일 숫자</th>
                    <td>
                        <select class="krds-form-select" th:field="*{posblAtchFileNumber}">
                            <option value="0">선택하세요</option>
                            <option value="1">1개</option>
                            <option value="2">2개</option>
                            <option value="3">3개</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row">템플릿 정보 <span class="text-danger">*</span></th>
                    <td>
                        <div class="input-group">
                            <input class="krds-input" type="text" id="tmplatNm" name="tmplatNm" readonly
                                   th:value="${boardMaster != null and boardMaster.tmplatNm != null and !#strings.isEmpty(boardMaster.tmplatNm) ? boardMaster.tmplatNm : '게시판 기본템플릿'}"/>
                            <button class="krds-btn tertiary" type="button" onclick="fnOpenTmplatPopup();">
                                <i class="bi bi-search"></i> 조회
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${addedOptions == 'true'}">
                    <th scope="row">추가 선택사항</th>
                    <td>
                        <select class="krds-form-select" th:field="*{option}">
                            <option value="">미선택</option>
                            <option value="comment">댓글</option>
                            <option value="stsfdg">만족도조사</option>
                        </select>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>

            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/cop/bbs/SelectBBSMasterInfs.do}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
<th:block layout:fragment="body-js">
    <script th:inline="javascript">
        var tmplatPopupUrl = /*[[@{/cop/com/selectTemplateInfsPop.do}]]*/ '/cop/com/selectTemplateInfsPop.do';

        /* 템플릿 선택 팝업 (iframe 모달) */
        function fnOpenTmplatPopup() {
            fn_egov_modal_remove();
            var pan = document.createElement('div');
            pan.id = 'modalPan';
            pan.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1050;display:flex;align-items:center;justify-content:center;';
            pan.innerHTML = '<div style="background:#fff;border-radius:.5rem;width:min(900px,95vw);height:min(600px,90vh);overflow:hidden;">'
                + '<iframe src="' + tmplatPopupUrl + '" style="border:0;width:100%;height:100%;" title="템플릿 목록"></iframe></div>';
            pan.addEventListener('click', function (e) { if (e.target === pan) fn_egov_modal_remove(); });
            document.body.appendChild(pan);
        }

        /* 팝업(iframe)에서 호출하는 콜백: "tmplatId|tmplatNm" */
        function showModalDialogCallback(retVal) {
            if (retVal != null) {
                var tmp = retVal.split('|');
                document.getElementById('tmplatId').value = tmp[0];
                document.getElementById('tmplatNm').value = tmp[1];
            }
            fn_egov_modal_remove();
        }

        function fn_egov_modal_remove() {
            var pan = document.getElementById('modalPan');
            if (pan) { pan.remove(); }
        }

        /* 파일첨부가능여부 N 선택 시 첨부가능파일 숫자 비활성화 */
        document.addEventListener('DOMContentLoaded', function () {
            var sel = document.getElementById('posblAtchFileNumber') || document.querySelector('select[name="posblAtchFileNumber"]');
            document.querySelectorAll('input[name="fileAtchPosblAt"]').forEach(function (r) {
                r.addEventListener('change', function () { if (sel) { sel.disabled = (this.value === 'N'); } });
                if (r.checked && r.value === 'N' && sel) { sel.disabled = true; }
            });
        });
    </script>
</th:block>
</body>
</html>
