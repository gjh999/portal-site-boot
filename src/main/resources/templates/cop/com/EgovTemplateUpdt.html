<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.tmplat.updt}">템플릿 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;" th:with="t=${TemplateInfVO}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cop/com/selectTemplateInfs.do}" th:text="#{bbs.tmplat.mng}">템플릿관리</a></li>
            <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{bbs.tmplat.updt}">게시판 템플릿 수정</span></h1>
        <form th:action="@{/cop/com/updateTemplateInf.do}" method="post">
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <input type="hidden" name="tmplatId" th:value="${t != null ? t.tmplatId : ''}"/>
            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;" th:text="#{bbs.tmplat.id}">템플릿 ID</th>
                    <td><span th:text="${t != null ? t.tmplatId : ''}">id</span></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.tmplat.nm.label}">템플릿 명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" maxlength="120" name="tmplatNm"
                               th:value="${t != null ? t.tmplatNm : ''}" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.tmplat.se.label}">템플릿 구분</span> <span class="text-danger">*</span></th>
                    <td>
                        <select class="krds-form-select" name="tmplatSeCode" required>
                            <option value="" th:text="#{bbs.select}">선택하세요</option>
                            <option th:each="c : ${resultList}" th:value="${c.code}" th:text="${c.codeNm}"
                                    th:selected="${t != null and c.code == t.tmplatSeCode}">구분</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.tmplat.cours.label}">템플릿 경로</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" maxlength="2000" name="tmplatCours"
                               th:value="${t != null ? t.tmplatCours : ''}" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.useAt}">사용여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_y" name="useAt" value="Y"
                                   th:checked="${t == null or t.useAt == 'Y'}"/>
                            <label class="form-check-label" for="ua_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_n" name="useAt" value="N"
                                   th:checked="${t != null and t.useAt == 'N'}"/>
                            <label class="form-check-label" for="ua_n">N</label>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/cop/com/selectTemplateInfs.do}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
            </div>
        </form>
        <form th:action="@{/cop/bbs/deleteTemplateInf.do}" method="post" class="mt-2 text-end"
              th:onsubmit="'return confirm(\'' + #{bbs.confirm.delete} + '\');'" onsubmit="return confirm('삭제하시겠습니까?');">
            <input type="hidden" name="tmplatId" th:value="${t != null ? t.tmplatId : ''}"/>
            <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
        </form>
    </div>
</main>
</body>
</html>
