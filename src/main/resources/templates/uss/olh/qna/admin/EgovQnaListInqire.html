<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>Q&amp;A 관리목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">Q&amp;A 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-dots"></i> Q&amp;A 관리목록</h1>
        <p class="text-muted">총 <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</p>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/qna/admin/QnaListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="조회조건 선택">
                    <option value="">선택</option>
                    <option value="qestnSj" th:selected="${searchVO.searchCondition == 'qestnSj'}">질문제목</option>
                    <option value="wrterNm" th:selected="${searchVO.searchCondition == 'wrterNm'}">작성자</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;">상태</th>
                <th scope="col">제목</th>
                <th scope="col" style="width:120px;">작성자</th>
                <th scope="col" style="width:130px;">작성일</th>
                <th scope="col" style="width:80px;">조회</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td class="text-center">
                    <span class="krds-badge"
                          th:classappend="${item['qnaProcessSttusCode'] == '3'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item['qnaProcessSttusCodeNm'] ?: '접수'}">상태</span>
                </td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/olh/qna/admin/QnaInqireCoUpdt.do(qaId=${item['qaId']},passwordConfirmAt='Y')}"
                       th:text="${item['qestnSj']}">제목</a>
                </td>
                <td class="text-center" th:text="${item['wrterNm']}">작성자</td>
                <td class="text-center" th:text="${item['frstRegistPnttm']}">작성일</td>
                <td class="text-center" th:text="${item['inqireco'] ?: 0}">0</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4">등록된 질문이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/qna/admin/QnaListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end">
            <a class="krds-btn tertiary small" th:href="@{/uss/olh/qnm/admin/QnaAnswerListInqire.do}">
                <i class="bi bi-chat-square-text"></i> 답변 관리
            </a>
            <a class="krds-btn primary small" th:href="@{/uss/olh/qna/admin/QnaCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> 질문 등록
            </a>
        </div>
    </div>
</main>
</body>
</html>
