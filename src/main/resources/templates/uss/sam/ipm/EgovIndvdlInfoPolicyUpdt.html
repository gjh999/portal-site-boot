<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>개인정보처리방침 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}">개인정보처리방침</a></li>
            <li class="breadcrumb-item active">방침 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 개인정보처리방침 수정</h1>
        <form th:action="@{/uss/sam/ipm/updtIndvdlInfoPolicy.do}" th:object="${indvdlInfoPolicy}" method="post">
            <!-- 저장 분기(cmd=save) 진입용 hidden + PK -->
            <input type="hidden" name="cmd" value="save"/>
            <input type="hidden" th:field="*{indvdlInfoId}"/>
            <div class="mb-3">
                <label class="form-label">유형</label>
                <input class="krds-input" type="text" value="개인정보처리방침" readonly disabled/>
            </div>
            <div class="mb-3">
                <label class="form-label">개인정보보호정책 명 <span class="text-danger">*</span></label>
                <input class="krds-input" type="text" th:field="*{indvdlInfoNm}" maxlength="255" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoNm')}" th:errors="*{indvdlInfoNm}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">동의여부 <span class="text-danger">*</span></label>
                <select class="krds-form-select" th:field="*{indvdlInfoYn}" required>
                    <option value="">선택</option>
                    <option value="Y">예</option>
                    <option value="N">아니오</option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoYn')}" th:errors="*{indvdlInfoYn}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">개인정보보호정책 내용 <span class="text-danger">*</span></label>
                <textarea class="krds-input" rows="10" th:field="*{indvdlInfoDc}" maxlength="2500" required></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoDc')}" th:errors="*{indvdlInfoDc}"></div>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
