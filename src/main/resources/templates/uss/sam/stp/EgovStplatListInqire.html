<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>이용약관</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">이용약관</li>
        </ol></nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-file-text"></i> 이용약관</h1>
            <span class="text-muted small">총 <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</span>
        </div>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/sam/stp/StplatListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="검색조건 선택">
                    <option value="">선택</option>
                    <option value="useStplatNm" th:selected="${searchVO.searchCondition == 'useStplatNm'}">이용약관명</option>
                    <option value="useStplatCn" th:selected="${searchVO.searchCondition == 'useStplatCn'}">이용약관내용</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <caption class="visually-hidden">약관목록</caption>
            <thead>
            <tr>
                <th scope="col" style="width:70px;" class="text-center">순번</th>
                <th scope="col" style="width:220px;">이용약관명</th>
                <th scope="col">이용약관내용</th>
                <th scope="col" style="width:120px;" class="text-center">등록일자</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${paginationInfo.firstRecordIndex + st.count}">1</td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/sam/stp/StplatDetailInqire.do(useStplatId=${item.useStplatId},pageIndex=${searchVO.pageIndex})}"
                       th:text="${item.useStplatNm}">약관명</a>
                </td>
                <td>
                    <a class="text-decoration-none text-body"
                       th:href="@{/uss/sam/stp/StplatDetailInqire.do(useStplatId=${item.useStplatId},pageIndex=${searchVO.pageIndex})}"
                       th:text="${#strings.abbreviate(item.useStplatCn, 40)}">약관내용</a>
                </td>
                <td class="text-center" th:text="${item.lastUpdtPnttm}">일자</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="4" class="text-center text-muted py-4">등록된 약관이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/sam/stp/StplatListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end mt-3" sec:authorize="hasRole('ADMIN')">
            <a class="krds-btn primary small" th:href="@{/uss/sam/stp/StplatCnRegistView.do}"><i class="bi bi-plus-lg"></i> 약관 등록</a>
        </div>
    </div>
</main>
</body>
</html>
