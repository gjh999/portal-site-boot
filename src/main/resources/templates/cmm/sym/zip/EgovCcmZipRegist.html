<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{zip.regist}">우편번호 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{zip.manage}">우편번호 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{zip.crumb.regist}">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> <span th:text="#{zip.regist}">우편번호 등록</span></h1>

        <form th:action="@{/sym/ccm/zip/EgovCcmZipRegist.do}" method="post" th:object="${zip}">
            <div class="krds-table-wrap"><table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:160px;"><span th:text="#{zip.col.zip}">우편번호</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{zip}" maxlength="6" required th:placeholder="#{zip.placeholder.zip}" placeholder="예: 12345"/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.label.ctprvn}">시도명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{ctprvnNm}" maxlength="20" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.label.signgu}">시군구명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{signguNm}" maxlength="20" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.label.emd}">읍면동명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{emdNm}" maxlength="30" required/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{zip.label.buld}">리/건물명</th>
                    <td><input class="krds-input" type="text" th:field="*{liBuldNm}" maxlength="60"/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{zip.label.lnbr}">번지/동호</th>
                    <td><input class="krds-input" type="text" th:field="*{lnbrDongHo}" maxlength="20"/></td>
                </tr>
                </tbody>
            </table></div>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.register}">등록</span></button>
                <a class="krds-btn tertiary" th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{button.cancel}">취소</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
