<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.useInf.list}">게시판 사용정보 목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{bbs.useInf.list}">게시판 사용정보 목록</li>
        </ol></nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-clipboard-check"></i> <span th:text="#{bbs.useInf.list}">게시판 사용정보 목록</span></h1>
            <span class="text-muted small"><span th:text="#{common.total}">총</span> <strong th:text="${resultCnt}">0</strong> <span th:text="#{common.unit.case}">건</span></span>
        </div>

        <form class="row g-2 mb-3" th:action="@{/cop/com/selectBBSUseInfs.do}" method="get">
            <input type="hidden" name="searchCnd" value="0"/>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchWrd" maxlength="35" th:title="#{bbs.bbsNm.search.ph}" title="게시판명 검색어"
                       th:value="${searchVO != null ? searchVO.searchWrd : ''}" th:placeholder="#{bbs.bbsNm.search.ph}" placeholder="게시판명"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn secondary" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;" th:text="#{common.no}">번호</th>
                <th scope="col" th:text="#{bbs.bbsNm}">게시판명</th>
                <th scope="col" style="width:160px;" th:text="#{bbs.registSe}">등록구분</th>
                <th scope="col" style="width:80px;" th:text="#{bbs.use}">사용</th>
                <th scope="col" style="width:130px;" th:text="#{common.regdate}">등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center"
                    th:text="${searchVO != null ? (searchVO.pageIndex - 1) * searchVO.pageSize + st.count : st.count}">1</td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/cop/com/selectBBSUseInf.do(bbsId=${item.bbsId},trgetId=${item.trgetId})}"
                       th:text="${item.bbsNm}">게시판명</a>
                </td>
                <td th:text="${item.registSeCodeNm}">등록구분</td>
                <td class="text-center">
                    <span class="krds-badge" th:classappend="${item.useAt == 'Y'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item.useAt == 'Y'} ? #{bbs.use} : #{bbs.unuse}">사용</span>
                </td>
                <td class="text-center" th:text="${item.frstRegisterPnttm}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4" th:text="#{bbs.useInf.empty}">등록된 게시판 사용정보가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <div th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl='/cop/com/selectBBSUseInfs.do', searchCnd=${searchVO != null ? searchVO.searchCnd : ''}, searchWrd=${searchVO != null ? searchVO.searchWrd : ''})}"></div>

        <div class="text-end" sec:authorize="isAuthenticated()">
            <a class="krds-btn primary small" th:href="@{/cop/com/addBBSUseInf.do}">
                <i class="bi bi-plus-lg"></i> <span th:text="#{button.register}">등록</span>
            </a>
        </div>
    </div>
</main>
</body>
</html>
