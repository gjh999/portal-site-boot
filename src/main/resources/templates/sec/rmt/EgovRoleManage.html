<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.role.title}">롤관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.role.titleFull}">롤(Role)관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> <span th:text="#{sec.role.titleFull}">롤(Role) 관리</span></h1>

        <!-- 검색 영역 (게시판 목록 표준) — 롤명 (searchCondition=1 고정) -->
        <form th:action="@{/sec/rmt/EgovRoleList.do}" method="get" class="search-bar krds-search mb-3">
            <input type="hidden" name="searchCondition" value="1"/>
            <div class="row g-2 align-items-end">
                <div class="col-md-9">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchKeyword" th:text="#{sec.role.name}">롤명</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                                   th:value="${roleManageVO != null ? roleManageVO.searchKeyword : ''}"
                                   th:placeholder="#{search.keyword.placeholder}" placeholder="검색어를 입력하세요" maxlength="35"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 + 등록 버튼(우측) -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted"><span th:text="#{common.total}">전체</span> <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong><span th:text="#{common.unit.case}">건</span></span>
            <a class="krds-btn primary small" th:href="@{/sec/rmt/EgovRoleInsertView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{sec.role.register}">롤 등록</span></a>
        </div>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead><tr><th scope="col" th:text="#{sec.role.code}">롤코드</th><th scope="col" th:text="#{sec.role.name}">롤명</th><th scope="col" th:text="#{sec.role.desc}">설명</th><th scope="col" style="width:120px;" th:text="#{sec.role.type}">유형</th><th scope="col" style="width:120px;"></th></tr></thead>
            <tbody>
            <tr th:each="item : ${roleList}">
                <td th:text="${item.roleCode}">코드</td>
                <td th:text="${item.roleNm}">롤명</td>
                <td th:text="${item.roleDc}">설명</td>
                <td class="text-center" th:text="${item.roleTyp}">유형</td>
                <td class="text-end">
                    <a class="krds-btn tertiary small" th:href="@{/sec/rmt/EgovRole.do(roleCode=${item.roleCode})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(roleList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{sec.role.empty}">등록된 롤이 없습니다.</td></tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 (KRDS) -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sec/rmt/EgovRoleList.do', searchCondition=${roleManageVO != null ? roleManageVO.searchCondition : ''}, searchKeyword=${roleManageVO != null ? roleManageVO.searchKeyword : ''})}"></div>
    </div>
</main>
</body>
</html>
