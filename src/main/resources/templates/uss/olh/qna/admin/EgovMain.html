<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.manage}">Q&amp;A 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.manage}">Q&amp;A 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-square-text"></i> <span th:text="#{qna.manage.heading}">묻고 답하기 관리</span></h1>
        <p class="text-muted mb-4" th:text="#{qna.manage.intro}">질문을 관리하고 답변을 등록합니다. (관리자)</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-list-ul"></i> <span th:text="#{qna.manage.list}">Q&amp;A 관리목록</span></h5>
                        <p class="text-muted" th:text="#{qna.manage.list.intro}">등록된 질문을 조회하고 관리합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{qna.manage.list.view}">관리목록 보기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-chat-left-text"></i> <span th:text="#{qna.answer.manage}">답변 관리</span></h5>
                        <p class="text-muted" th:text="#{qna.answer.manage.intro}">질문에 대한 답변을 등록·수정합니다.</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/olh/qnm/admin/QnaAnswerListInqire.do}" th:text="#{qna.answer.manage}">답변 관리</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
