<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>우편번호 검색</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">우편번호 검색</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> 우편번호 검색</h1>
        <form class="row g-2 mb-3" th:action="@{/sym/cmm/EgovCcmZipSearchList.do}" method="get">
            <div class="col-auto">
                <select class="form-select" name="searchCondition">
                    <option value="2" th:selected="${searchVO.searchCondition == '2'}">시도명</option>
                    <option value="3" th:selected="${searchVO.searchCondition == '3'}">시군구명</option>
                    <option value="4" th:selected="${searchVO.searchCondition == '4'}">읍면동명</option>
                    <option value="1" th:selected="${searchVO.searchCondition == '1'}">우편번호</option>
                </select>
            </div>
            <div class="col-auto"><input class="form-control" name="searchKeyword" th:value="${searchVO.searchKeyword}" placeholder="검색어"/></div>
            <div class="col-auto"><button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> 검색</button></div>
        </form>
        <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th style="width:90px;">우편번호</th><th>시도</th><th>시군구</th><th>읍면동</th><th>건물/지번</th><th style="width:70px;">선택</th></tr></thead>
            <tbody>
            <tr th:each="item : ${resultList}"
                th:with="addr=${item.ctprvnNm + ' ' + item.signguNm + ' ' + item.emdNm
                              + (item.liBuldNm != null and item.liBuldNm != '' ? ' ' + item.liBuldNm : '')}">
                <td th:text="${item.zip}">우편번호</td>
                <td th:text="${item.ctprvnNm}">시도</td>
                <td th:text="${item.signguNm}">시군구</td>
                <td th:text="${item.emdNm}">읍면동</td>
                <td th:text="${item.liBuldNm}">건물</td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-primary"
                            th:attr="data-zip=${item.zip},data-addr=${addr}"
                            onclick="fn_egov_select_Zip(this);">선택</button>
                </td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="6" class="text-center text-muted py-4">검색 결과가 없습니다.</td></tr>
            </tbody>
        </table>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sym/cmm/EgovCcmZipSearchList.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>
    </div>
    <script>
        /* window.open 으로 띄운 부모창(회원 등록/수정 등)에 선택값을 반환한다.
         * JSP 원본과 동일한 fn_egov_returnValue({sZip, vZip, sAddr}) 콜백을 우선 사용한다. */
        function fn_egov_select_Zip(btn) {
            var zip = btn.getAttribute('data-zip');
            var addr = btn.getAttribute('data-addr');
            var retVal = {
                sZip: zip,
                vZip: (zip && zip.length === 6) ? zip.substring(0, 3) + '-' + zip.substring(3, 6) : zip,
                sAddr: addr
            };
            try {
                if (window.opener && !window.opener.closed) {
                    if (typeof window.opener.fn_egov_returnValue === 'function') {
                        window.opener.fn_egov_returnValue(retVal);
                    } else if (typeof window.opener.fnZipReturn === 'function') {
                        window.opener.fnZipReturn(zip, addr);
                    }
                    window.close();
                    return;
                }
            } catch (e) { /* opener 접근 불가 시 무시 */ }
            alert('선택 기능은 우편번호 찾기 팝업에서 사용할 수 있습니다.');
        }
    </script>
</main>
</body>
</html>
