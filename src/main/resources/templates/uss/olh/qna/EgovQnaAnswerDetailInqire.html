<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.answer.manage} + ' ' + #{bbs.detail.short}">Q&amp;A 답변 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qnm/QnaAnswerListInqire.do}" th:text="#{qna.answer.manage}">Q&amp;A 답변 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{bbs.detail.short}">상세</li>
        </ol></nav>
        <div class="krds-panel">
            <div class="krds-panel-head d-flex justify-content-between">
                <strong th:text="${result.qestnSj}">제목</strong>
                <span class="krds-badge bg-gray" th:text="${result.qnaProcessSttusCodeNm ?: #messages.msg('qna.status.receipt')}">상태</span>
            </div>
            <div class="krds-panel-body">
                <div class="text-muted small mb-2">
                    <span th:text="#{common.writer}">작성자</span> <span th:text="${result.wrterNm}">작성자</span>
                    · <span th:text="${result.writngDe}">작성일</span>
                    · <span th:text="#{qna.detail.inqire}">조회</span> <span th:text="${result.inqireCo ?: 0}">0</span>
                </div>
                <p th:text="${result.qestnCn}">질문 내용</p>
                <div class="alert alert-light border mt-3" th:if="${result.answerCn != null and !#strings.isEmpty(result.answerCn)}">
                    <strong class="text-success" th:text="#{qna.answer.label}">[답변]</strong>
                    <div th:utext="${result.answerCn}">답변</div>
                </div>
                <div class="text-muted mt-3" th:if="${result.answerCn == null or #strings.isEmpty(result.answerCn)}" th:text="#{qna.answer.empty}">
                    아직 답변이 등록되지 않았습니다.
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <a class="krds-btn tertiary small" th:href="@{/uss/olh/qnm/QnaAnswerListInqire.do}"><i class="bi bi-list"></i> <span th:text="#{button.list}">목록</span></a>
            <a sec:authorize="hasRole('ADMIN')" class="krds-btn primary small"
               th:href="@{/uss/olh/qnm/QnaCnAnswerUpdtView.do(qaId=${result.qaId})}"><i class="bi bi-reply"></i> <span th:text="#{qna.answer.registUpdt}">답변 등록/수정</span></a>
        </div>
    </div>
</main>
</body>
</html>
