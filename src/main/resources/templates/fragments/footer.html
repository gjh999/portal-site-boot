<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<footer th:fragment="footer" class="pub-foot">
    <div class="container">
        <!-- 푸터 배너 슬라이드(캐러셀) -->
        <div class="mb-3" th:if="${footerBannerList != null and !#lists.isEmpty(footerBannerList)}">
            <div th:replace="~{fragments/banner :: carousel(${footerBannerList}, ${bannerInterval}, 'bnr-foot')}"></div>
        </div>

        <!-- 전자정부표준프레임워크 공식 홈페이지 배너 -->
        <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener"
           class="egov-official-banner" th:title="#{footer.official.title}">
            <span class="ban-txt">
                <strong><i class="bi bi-hexagon-fill"></i> <span th:text="#{footer.official.title}">전자정부표준프레임워크 공식 홈페이지</span></strong>
                <small th:text="#{footer.official.desc}">가이드·다운로드·커뮤니티 — egovframe.go.kr</small>
            </span>
            <span class="ban-go"><span th:text="#{footer.official.go}">바로가기</span> <i class="bi bi-box-arrow-up-right"></i></span>
        </a>

        <div class="pub-foot-top">
            <div>
                <a th:href="@{/}" class="pub-brand">
                    <img class="mark" th:src="@{/images/logo.svg}" alt="eGovFrame"/>
                    <span>전자정부 표준프레임워크 포털</span>
                </a>
                <p class="desc">Spring Boot + Thymeleaf 기반 표준 포털 — 게시판·민원·설문·회원·권한 등 공공 서비스 공통 기능을 KRDS 디자인으로 제공합니다.</p>
            </div>
            <div class="pub-foot-cols">
                <div class="pub-foot-col">
                    <h4>바로가기</h4>
                    <a th:href="@{/EgovPageLink.do(linkIndex=3)}">소개</a>
                    <a th:href="@{/cop/bbs/selectBoardList.do(bbsId='BBSMSTR_AAAAAAAAAAAA')}">공지사항</a>
                    <a th:href="@{/uss/olh/faq/FaqListInqire.do}">FAQ</a>
                </div>
                <div class="pub-foot-col">
                    <h4>서비스</h4>
                    <a th:href="@{/uss/olh/qna/QnaListInqire.do}">Q&amp;A</a>
                    <a th:href="@{/uss/olp/qnn/EgovQustnrRespondInfoManageList.do}">설문참여</a>
                    <a th:href="@{/uss/sam/stp/StplatListInqire.do}">이용약관</a>
                    <a th:href="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}">개인정보처리방침</a>
                </div>
                <div class="pub-foot-col">
                    <h4>지원</h4>
                    <a th:href="@{/uat/uia/egovLoginUsr.do}">로그인</a>
                    <a th:href="@{/cmm/krds/EgovKrdsSample.do}">KRDS 예시</a>
                    <a href="/swagger-ui/index.html" target="_blank">API 문서</a>
                </div>
            </div>
        </div>

        <div class="pub-foot-bottom">
            <span>© <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> 전자정부 표준프레임워크 포털. All rights reserved.</span>
            <span class="soc">
                <a th:href="@{/}" title="포털 홈" aria-label="포털 홈"><i class="bi bi-house"></i></a>
                <a href="https://github.com/gjh999/portal-site-boot" target="_blank" rel="noopener" title="GitHub 저장소" aria-label="GitHub 저장소"><i class="bi bi-github"></i></a>
                <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener" title="전자정부표준프레임워크 공식 홈페이지" aria-label="전자정부표준프레임워크 공식 홈페이지"><i class="bi bi-globe"></i></a>
                <a href="https://www.youtube.com/channel/UC_ZpWtFSV_e_Y5iWjPsGbxQ" target="_blank" rel="noopener" title="전자정부표준프레임워크 유튜브" aria-label="전자정부표준프레임워크 유튜브"><i class="bi bi-youtube"></i></a>
            </span>
        </div>
    </div>
</footer>
</body>
</html>
