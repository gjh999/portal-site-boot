<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>Q&amp;A 작성 본인확인</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:560px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/QnaListInqire.do}">Q&amp;A</a></li>
            <li class="breadcrumb-item active">본인확인</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-badge"></i> 질문 작성 본인확인</h1>
        <p class="text-muted">질문을 작성하려면 로그인하거나 실명확인이 필요합니다.</p>
        <div class="d-grid gap-2">
            <a class="krds-btn primary" th:href="@{/uat/uia/egovLoginUsr.do}">
                <i class="bi bi-box-arrow-in-right"></i> 로그인 후 작성</a>
            <a class="krds-btn secondary" th:href="@{/uss/olh/qna/QnaCnRegistView.do}">
                <i class="bi bi-pencil"></i> 질문 작성으로 이동</a>
            <a class="krds-btn tertiary" th:href="@{/uss/olh/qna/QnaListInqire.do}">취소</a>
        </div>
    </div>
</main>
</body>
</html>
