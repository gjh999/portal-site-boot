<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>이용약관</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">이용약관</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-file-text"></i> 이용약관</h1>

        <!-- 검색 영역 (게시판 목록 표준) — 검색구분 + 검색어 -->
        <form th:action="@{/uss/sam/stp/StplatListInqire.do}" method="get" class="search-bar krds-search mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchCondition">검색구분</label></div>
                        <div class="form-conts">
                            <select id="searchCondition" name="searchCondition" class="krds-form-select" title="검색구분 선택">
                                <option value="">선택</option>
                                <option value="useStplatNm" th:selected="${searchVO.searchCondition == 'useStplatNm'}">이용약관명</option>
                                <option value="useStplatCn" th:selected="${searchVO.searchCondition == 'useStplatCn'}">이용약관내용</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchKeyword">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                                   th:value="${searchVO.searchKeyword}" placeholder="검색어를 입력하세요" maxlength="35"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> 검색</button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 + 등록 버튼(우측) -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted">전체 <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>건</span>
            <a class="krds-btn primary small" sec:authorize="hasRole('ADMIN')" th:href="@{/uss/sam/terms/registView.do(termsType='stplat')}">
                <i class="bi bi-plus-lg"></i> 약관 등록</a>
        </div>

        <div class="krds-table-wrap">
        <table class="tbl">
            <caption class="visually-hidden">약관목록</caption>
            <thead>
            <tr>
                <th scope="col" style="width:70px;" class="text-center">순번</th>
                <th scope="col" style="width:220px;">이용약관명</th>
                <th scope="col">이용약관내용</th>
                <th scope="col" style="width:120px;" class="text-center">등록일자</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${paginationInfo.firstRecordIndex + st.count}">1</td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/sam/stp/StplatDetailInqire.do(useStplatId=${item.useStplatId},pageIndex=${searchVO.pageIndex})}"
                       th:text="${item.useStplatNm}">약관명</a>
                </td>
                <td>
                    <a class="text-decoration-none text-body"
                       th:href="@{/uss/sam/stp/StplatDetailInqire.do(useStplatId=${item.useStplatId},pageIndex=${searchVO.pageIndex})}"
                       th:text="${#strings.abbreviate(item.useStplatCn, 40)}">약관내용</a>
                </td>
                <td class="text-center" th:text="${item.lastUpdtPnttm}">일자</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="4" class="text-center text-muted py-4">등록된 약관이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/sam/stp/StplatListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>
    </div>
</main>
</body>
</html>
