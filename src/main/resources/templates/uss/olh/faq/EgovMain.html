<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{faq.title}">FAQ</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{faq.title}">FAQ</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-question-circle"></i> <span th:text="#{faq.heading.full}">자주 묻는 질문 (FAQ)</span></h1>
        <p class="text-muted mb-4" th:text="#{faq.intro}">자주 묻는 질문과 답변을 확인하세요.</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-list-ul"></i> <span th:text="#{faq.list}">FAQ 목록</span></h5>
                        <p class="text-muted" th:text="#{faq.list.intro}">등록된 자주 묻는 질문을 조회합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/olh/faq/FaqListInqire.do}" th:text="#{faq.list.view}">FAQ 보기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-gear"></i> <span th:text="#{faq.manage}">FAQ 관리</span></h5>
                        <p class="text-muted" th:text="#{faq.manage.intro}">FAQ를 등록·수정·삭제합니다. (관리자)</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/olh/faq/admin/FaqListInqire.do}" th:text="#{faq.manage}">FAQ 관리</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
