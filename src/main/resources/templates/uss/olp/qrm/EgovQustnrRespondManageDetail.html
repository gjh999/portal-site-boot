<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>응답자정보 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}">응답자관리</a></li>
            <li class="breadcrumb-item active">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-lines-fill"></i> 응답자정보 상세</h1>
        <div class="text-muted" th:if="${r == null}">상세 데이터가 없습니다.</div>
        <table class="table" th:if="${r != null}">
            <tbody>
            <tr><th class="table-light" style="width:160px;">설문제목</th><td th:text="${r.qestnrSj}"></td></tr>
            <tr><th class="table-light">성별</th><td><span th:each="c : ${comCode014}" th:if="${c.code == r.sexdstnCode}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th class="table-light">직업</th><td><span th:each="c : ${comCode034}" th:if="${c.code == r.occpTyCode}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th class="table-light">생년월일</th><td th:text="${r.brthdy}"></td></tr>
            <tr><th class="table-light">응답자명</th><td th:text="${r.respondNm}"></td></tr>
            <tr><th class="table-light">전화번호</th><td><span th:text="${r.areaNo}"></span>-<span th:text="${r.middleTelno}"></span>-<span th:text="${r.endTelno}"></span></td></tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="btn btn-outline-secondary" th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qrm/EgovQustnrRespondManageModify.do}" method="post">
                    <input type="hidden" name="qestnrRespondId" th:value="${r.qestnrrespondid}"/>
                    <button class="btn btn-primary" type="submit"><i class="bi bi-pencil"></i> 수정</button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qrm/EgovQustnrRespondManageDetail.do}" method="post"
                      onsubmit="return confirm('삭제하시겠습니까?');">
                    <input type="hidden" name="qestnrRespondId" th:value="${r.qestnrrespondid}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="btn btn-outline-danger" type="submit"><i class="bi bi-trash"></i> 삭제</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
