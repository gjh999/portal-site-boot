<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>휴일 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/cal/EgovRestdeList.do}">휴일 관리</a></li>
            <li class="breadcrumb-item active">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-calendar-x"></i> 휴일 수정</h1>

        <div th:if="${restde == null}" class="alert alert-warning">수정할 데이터가 없습니다.
            <a class="alert-link" th:href="@{/sym/cal/EgovRestdeList.do}">목록으로</a></div>

        <form th:if="${restde != null}" th:action="@{/sym/cal/EgovRestdeModify.do}" method="post" th:object="${restde}">
            <input type="hidden" name="cmd" value="Modify"/>
            <input type="hidden" th:field="*{restdeNo}"/>
            <div class="krds-table-wrap">
            <table class="tbl col">
                <caption>휴일 수정</caption>
                <tbody>
                <tr>
                    <th scope="row" style="width:160px;">휴일번호</th>
                    <td><input class="krds-input" type="text" th:value="*{restdeNo}" readonly/></td>
                </tr>
                <tr>
                    <th scope="row">휴일일자</th>
                    <td><input class="krds-input" type="text" th:field="*{restdeDe}" maxlength="8" placeholder="YYYYMMDD"/></td>
                </tr>
                <tr>
                    <th scope="row">휴일명</th>
                    <td><input class="krds-input" type="text" th:field="*{restdeNm}" maxlength="60"/></td>
                </tr>
                <tr>
                    <th scope="row">휴일구분</th>
                    <td>
                        <select class="krds-form-select" th:field="*{restdeSeCode}">
                            <option value="">선택</option>
                            <option th:each="code : ${restdeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row">휴일설명</th>
                    <td><textarea class="krds-input" th:field="*{restdeDc}" rows="3"></textarea></td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
                <a class="krds-btn tertiary" th:href="@{/sym/cal/EgovRestdeList.do}">취소</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
