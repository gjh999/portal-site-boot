<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.manage.menu}">Q&amp;A 관리 메뉴</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:360px;">
        <h2 class="h5 mb-3"><i class="bi bi-question-circle"></i> <span th:text="#{qna.manage}">Q&amp;A 관리</span></h2>
        <div class="list-group">
            <a class="list-group-item list-group-item-action" th:href="@{/uss/olh/qna/admin/QnaListInqire.do}">
                <i class="bi bi-list-ul"></i> <span th:text="#{qna.list}">Q&amp;A 목록</span></a>
            <a class="list-group-item list-group-item-action" th:href="@{/uss/olh/qna/admin/QnaCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> <span th:text="#{qna.regist}">질문 등록</span></a>
            <a class="list-group-item list-group-item-action" th:href="@{/uss/olh/qnm/admin/QnaAnswerListInqire.do}">
                <i class="bi bi-reply"></i> <span th:text="#{qna.answer.manage}">답변 관리</span></a>
        </div>
    </div>
</main>
</body>
</html>
