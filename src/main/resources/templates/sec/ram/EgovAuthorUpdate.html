<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.author.modify}">권한 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sec/ram/EgovAuthorListView.do}" th:text="#{sec.author.title}">권한관리</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.author.modify}">권한 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-check"></i> <span th:text="#{sec.author.modify}">권한 수정</span></h1>

        <form th:action="@{/sec/ram/EgovAuthorUpdate.do}" method="post">
            <input type="hidden" name="authorCode" th:value="${authorManage?.authorCode}"/>
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <label class="form-label" for="authorCode" th:text="#{sec.author.code}">권한 코드</label>
                        <input type="text" class="krds-input" id="authorCode" readonly th:value="${authorManage?.authorCode}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="authorNm"><span th:text="#{sec.author.name}">권한 명</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="authorNm" name="authorNm" maxlength="50" required
                               th:value="${authorManage?.authorNm}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="authorDc" th:text="#{sec.author.desc}">설명</label>
                        <input type="text" class="krds-input" id="authorDc" name="authorDc" maxlength="50"
                               th:value="${authorManage?.authorDc}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="authorCreatDe" th:text="#{sec.col.regDate}">등록일자</label>
                        <input type="text" class="krds-input" id="authorCreatDe" readonly th:value="${authorManage?.authorCreatDe}"/>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="krds-btn danger small"
                        th:formaction="@{/sec/ram/EgovAuthorDelete.do}"
                        th:onclick="'return confirm(\'' + #{sec.confirm.delete} + '\');'"
                        onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sec/ram/EgovAuthorListView.do}" th:text="#{button.list}">목록</a>
                    <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
