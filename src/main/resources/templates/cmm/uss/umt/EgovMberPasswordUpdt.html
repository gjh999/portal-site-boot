<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{mber.pwd.update.title}">비밀번호 변경</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:520px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{common.memberManage}">회원관리</a></li>
            <li class="breadcrumb-item active" th:text="#{mber.pwd.update.title}">비밀번호 변경</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> <span th:text="#{mber.pwd.update.title}">비밀번호 변경</span></h1>

        <div class="alert alert-success" th:if="${resultMsg == 'success.common.update'}" th:text="#{mypage.msg.pwd.success}">비밀번호가 변경되었습니다.</div>
        <div class="alert alert-danger" th:if="${resultMsg == 'fail.user.passwordUpdate1'}" th:text="#{mypage.msg.pwd.fail.old}">현재 비밀번호가 일치하지 않습니다.</div>
        <div class="alert alert-danger" th:if="${resultMsg == 'fail.user.passwordUpdate2'}" th:text="#{mypage.msg.pwd.fail.confirm}">새 비밀번호와 확인이 일치하지 않습니다.</div>

        <form th:action="@{/uss/umt/mber/EgovMberPasswordUpdt.do}" method="post">
            <input type="hidden" name="mberId" th:value="${mberManageVO?.mberId}"/>
            <input type="hidden" name="uniqId" th:value="${mberManageVO?.uniqId}"/>
            <div class="mb-3"><label class="form-label" th:text="#{mypage.password.old}">현재 비밀번호</label>
                <input class="krds-input" type="password" name="oldPassword" required autofocus/></div>
            <div class="mb-3"><label class="form-label" th:text="#{mypage.password.new}">새 비밀번호</label>
                <input class="krds-input" type="password" name="newPassword" required/></div>
            <div class="mb-3"><label class="form-label" th:text="#{mypage.password.new2}">새 비밀번호 확인</label>
                <input class="krds-input" type="password" name="newPassword2" required/></div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{button.cancel}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{mypage.btn.change}">변경</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
