<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.regByTrget}">게시판 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:860px;"
         th:with="trgetId=${searchVO != null ? searchVO.trgetId : ''}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/cop/bbs/selectBdMstrListByTrget.do(trgetId=${trgetId})}" th:text="#{bbs.bbsList}">게시판목록</a>
            </li>
            <li class="breadcrumb-item active" th:text="#{bbs.regByTrget}">게시판 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-plus"></i> <span th:text="#{bbs.regByTrget}">게시판 등록</span></h1>
        <form th:action="@{/cop/bbs/insertBdMstrByTrget.do}" th:object="${boardMaster}" method="post">
            <input type="hidden" name="trgetId" th:value="${trgetId}"/>
            <input type="hidden" th:field="*{trgetId}" th:if="${trgetId == null or #strings.isEmpty(trgetId)}"/>
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <input type="hidden" th:field="*{tmplatId}" value="TMPLAT_BOARD_DEFAULT"/>

            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;"><span th:text="#{bbs.bbsNm.label}">게시판 명</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" maxlength="120" th:field="*{bbsNm}" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.bbsIntrcn}">게시판 소개</span> <span class="text-danger">*</span></th>
                    <td><textarea class="krds-input" rows="4" maxlength="2000" th:field="*{bbsIntrcn}" required></textarea></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.bbsTy.label}">게시판 유형</span> <span class="text-danger">*</span></th>
                    <td>
                        <select class="krds-form-select" th:field="*{bbsTyCode}" required>
                            <option value="" th:text="#{bbs.select}">선택하세요</option>
                            <option th:each="c : ${typeList}" th:value="${c.code}" th:text="${c.codeNm}">유형</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.bbsAttrb.label}">게시판 속성</span> <span class="text-danger">*</span></th>
                    <td>
                        <select class="krds-form-select" th:field="*{bbsAttrbCode}" required>
                            <option value="" th:text="#{bbs.select}">선택하세요</option>
                            <option th:each="c : ${attrbList}" th:value="${c.code}" th:text="${c.codeNm}">속성</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.replyPosblAt}">답장가능여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_y" th:field="*{replyPosblAt}" value="Y"/>
                            <label class="form-check-label" for="rp_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="rp_n" th:field="*{replyPosblAt}" value="N"/>
                            <label class="form-check-label" for="rp_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.fileAtchPosblAt}">파일첨부가능여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_y" th:field="*{fileAtchPosblAt}" value="Y"/>
                            <label class="form-check-label" for="fa_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="fa_n" th:field="*{fileAtchPosblAt}" value="N"/>
                            <label class="form-check-label" for="fa_n">N</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.posblAtchFileNumber}">첨부가능파일 숫자</th>
                    <td>
                        <select class="krds-form-select" th:field="*{posblAtchFileNumber}">
                            <option value="0" th:text="#{bbs.select}">선택하세요</option>
                            <option value="1" th:text="#{bbs.fileCount.1}">1개</option>
                            <option value="2" th:text="#{bbs.fileCount.2}">2개</option>
                            <option value="3" th:text="#{bbs.fileCount.3}">3개</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.tmplatInfo}">템플릿 정보</span> <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{tmplatNm}" th:placeholder="#{bbs.tmplat.default}" readonly/></td>
                </tr>
                </tbody>
            </table>
            </div>

            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary"
                   th:href="@{/cop/bbs/selectBdMstrListByTrget.do(trgetId=${trgetId})}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
