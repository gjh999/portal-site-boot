<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문템플릿 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}">설문템플릿</a></li>
            <li class="breadcrumb-item active">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-images"></i> 설문템플릿 등록</h1>
        <form th:action="@{/uss/olp/qtm/EgovQustnrTmplatManageRegistActor.do}" th:object="${qustnrTmplatManageVO}" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-12"><label class="form-label">템플릿유형 <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" th:field="*{qestnrTmplatTy}" maxlength="100" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatTy')}" th:errors="*{qestnrTmplatTy}"></div></div>
                <div class="col-12"><label class="form-label">템플릿유형 이미지(JPEG, 65x50)</label>
                    <input class="form-control" type="file" name="qestnrTmplatImage" accept="image/*"/></div>
                <div class="col-12"><label class="form-label">템플릿 설명 <span class="text-danger">*</span></label>
                    <textarea class="form-control" rows="4" th:field="*{qestnrTmplatCn}" required></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatCn')}" th:errors="*{qestnrTmplatCn}"></div></div>
                <div class="col-12"><label class="form-label">템플릿파일(경로) <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" th:field="*{qestnrTmplatCours}" maxlength="100" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatCours')}" th:errors="*{qestnrTmplatCours}"></div></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="btn btn-outline-secondary" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}">목록</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
