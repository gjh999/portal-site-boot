<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>응답자정보 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}">응답자관리</a></li>
            <li class="breadcrumb-item active">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 응답자정보 수정</h1>
        <form th:action="@{/uss/olp/qrm/EgovQustnrRespondManageModify.do}" method="post">
            <input type="hidden" name="cmd" value="save"/>
            <input type="hidden" name="qestnrRespondId" th:value="${r != null ? r.qestnrrespondid : ''}"/>
            <input type="hidden" name="qestnrId" th:value="${r != null ? r.qestnrId : ''}"/>
            <input type="hidden" name="qestnrTmplatId" th:value="${r != null ? r.qestnrtmplatid : ''}"/>
            <input type="hidden" name="brth" th:value="${r != null ? r.brthdy : ''}"/>
            <div class="row g-3">
                <div class="col-12"><label class="form-label">설문제목</label>
                    <input class="form-control-plaintext" type="text" readonly th:value="${r != null ? r.qestnrSj : ''}"/></div>
                <div class="col-md-6"><label class="form-label">성별 <span class="text-danger">*</span></label>
                    <select class="krds-form-select" name="sexdstnCode" required>
                        <option value="">선택</option>
                        <option th:each="c : ${comCode014}" th:value="${c.code}" th:text="${c.codeNm}" th:selected="${r != null and c.code == r.sexdstnCode}"></option>
                    </select></div>
                <div class="col-md-6"><label class="form-label">직업 <span class="text-danger">*</span></label>
                    <select class="krds-form-select" name="occpTyCode" required>
                        <option value="">선택</option>
                        <option th:each="c : ${comCode034}" th:value="${c.code}" th:text="${c.codeNm}" th:selected="${r != null and c.code == r.occpTyCode}"></option>
                    </select></div>
                <div class="col-12"><label class="form-label">응답자명 <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" name="respondNm" th:value="${r != null ? r.respondNm : ''}" maxlength="50" required/></div>
                <div class="col-12"><label class="form-label">전화번호 <span class="text-danger">*</span></label>
                    <div class="d-flex gap-2 align-items-center" style="max-width:380px;">
                        <input class="krds-input" type="text" name="areaNo" th:value="${r != null ? r.areaNo : ''}" maxlength="4" required/> -
                        <input class="krds-input" type="text" name="middleTelno" th:value="${r != null ? r.middleTelno : ''}" maxlength="4" required/> -
                        <input class="krds-input" type="text" name="endTelno" th:value="${r != null ? r.endTelno : ''}" maxlength="4" required/>
                    </div></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
