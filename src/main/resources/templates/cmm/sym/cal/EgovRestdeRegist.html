<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>휴일 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/cal/EgovRestdeList.do}">휴일 관리</a></li>
            <li class="breadcrumb-item active">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-calendar-plus"></i> 휴일 등록</h1>

        <div class="alert alert-danger" th:if="${message != null and message != ''}" th:text="${message}">오류 메시지</div>

        <form th:action="@{/sym/cal/EgovRestdeRegist.do}" method="post" th:object="${restde}">
            <input type="hidden" name="cmd" value="Regist"/>
            <div class="krds-table-wrap">
            <table class="tbl col align-middle">
                <caption>휴일 등록</caption>
                <tbody>
                <tr>
                    <th scope="row" style="width:160px;">휴일일자 <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{restdeDe}" maxlength="8"
                               placeholder="YYYYMMDD" pattern="\d{8}" required/></td>
                </tr>
                <tr>
                    <th scope="row">휴일명 <span class="text-danger">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{restdeNm}" maxlength="60" required/></td>
                </tr>
                <tr>
                    <th scope="row">휴일구분</th>
                    <td>
                        <select class="krds-form-select" th:field="*{restdeSeCode}">
                            <option value="">선택</option>
                            <option th:each="code : ${restdeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row">휴일설명</th>
                    <td><textarea class="krds-input" th:field="*{restdeDc}" rows="3"></textarea></td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 등록</button>
                <a class="krds-btn tertiary" th:href="@{/sym/cal/EgovRestdeList.do}">취소</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
