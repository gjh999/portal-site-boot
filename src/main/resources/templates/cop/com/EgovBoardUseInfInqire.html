<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.useInf.detail}">게시판 사용정보 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="u=${bdUseVO}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cop/com/selectBBSUseInfs.do}" th:text="#{bbs.useInf}">게시판사용정보</a></li>
            <li class="breadcrumb-item active" th:text="#{bbs.detail.short}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-info-circle"></i> <span th:text="#{bbs.useInf.detail}">게시판 사용정보 상세</span></h1>

        <form th:action="@{/cop/com/updateBBSUseInf.do}" method="post">
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;" th:text="#{bbs.bbsNm.label}">게시판 명</th>
                    <td th:text="${u != null ? u.bbsNm : ''}">게시판명</td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.bbsId}">게시판 ID</th>
                    <td>
                        <span th:text="${u != null ? u.bbsId : ''}">bbsId</span>
                        <input type="hidden" name="bbsId" th:value="${u != null ? u.bbsId : ''}"/>
                    </td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.trgetSysId}">대상시스템 ID</th>
                    <td>
                        <span th:text="${u != null ? u.trgetId : ''}">trgetId</span>
                        <input type="hidden" name="trgetId" th:value="${u != null ? u.trgetId : ''}"/>
                    </td>
                </tr>
                <tr th:if="${u != null and u.provdUrl != null and !#strings.isEmpty(u.provdUrl)}">
                    <th scope="row" th:text="#{bbs.provdUrl}">제공 URL</th>
                    <td><a th:href="@{${u.provdUrl}}" th:text="${u.provdUrl}" target="_blank">url</a></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{bbs.registSe}">등록구분</th>
                    <td th:text="${u != null ? u.registSeCodeNm : ''}">구분</td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{bbs.useAt}">사용여부</span> <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_y" name="useAt" value="Y"
                                   th:checked="${u == null or u.useAt == 'Y'}"/>
                            <label class="form-check-label" for="ua_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_n" name="useAt" value="N"
                                   th:checked="${u != null and u.useAt == 'N'}"/>
                            <label class="form-check-label" for="ua_n">N</label>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/cop/com/selectBBSUseInfs.do}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
            </div>
        </form>
        <form th:action="@{/cop/com/deleteBBSUseInf.do}" method="post" class="mt-2 text-end"
              th:onsubmit="'return confirm(\'' + #{bbs.confirm.delete} + '\');'" onsubmit="return confirm('삭제하시겠습니까?');">
            <input type="hidden" name="bbsId" th:value="${u != null ? u.bbsId : ''}"/>
            <input type="hidden" name="trgetId" th:value="${u != null ? u.trgetId : ''}"/>
            <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
        </form>
    </div>
</main>
</body>
</html>
