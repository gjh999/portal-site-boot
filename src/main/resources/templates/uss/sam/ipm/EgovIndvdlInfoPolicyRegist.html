<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{policy.regist.heading}">개인정보처리방침 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}" th:text="#{policy.title}">개인정보처리방침</a></li>
            <li class="breadcrumb-item active" th:text="#{policy.regist.crumb}">방침 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-plus"></i> <span th:text="#{policy.regist.heading}">개인정보처리방침 등록</span></h1>
        <form th:action="@{/uss/sam/ipm/registIndvdlInfoPolicy.do}" th:object="${indvdlInfoPolicy}" method="post">
            <!-- 저장 분기(cmd=save) 진입용 hidden -->
            <input type="hidden" name="cmd" value="save"/>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{policy.detail.nm}">개인정보보호정책 명</span> <span class="text-danger">*</span></label>
                <input class="krds-input" type="text" th:field="*{indvdlInfoNm}" maxlength="255" required autofocus/>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoNm')}" th:errors="*{indvdlInfoNm}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{policy.col.indvdlInfoYn}">동의여부</span> <span class="text-danger">*</span></label>
                <select class="krds-form-select" th:field="*{indvdlInfoYn}" required>
                    <option value="" th:text="#{bbs.select.action}">선택</option>
                    <option value="Y" th:text="#{policy.yes}">예</option>
                    <option value="N" th:text="#{policy.no}">아니오</option>
                </select>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoYn')}" th:errors="*{indvdlInfoYn}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label"><span th:text="#{policy.detail.cn}">개인정보보호정책 내용</span> <span class="text-danger">*</span></label>
                <textarea class="krds-input" rows="10" th:field="*{indvdlInfoDc}" maxlength="2500" required></textarea>
                <div class="text-danger small" th:if="${#fields.hasErrors('indvdlInfoDc')}" th:errors="*{indvdlInfoDc}"></div>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
