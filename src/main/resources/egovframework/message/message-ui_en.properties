# Landing - About
landing.about.title=Elevating public service quality with a standardized development environment
landing.about.sub=eGovFrame is the standard development and operation environment applied to public-sector IT projects. It pursues open standards free from vendor lock-in, improving the standardization, quality, and reusability of application software.
landing.about.li1.t=Open Standards
landing.about.li1.d=Built on proven open source without vendor lock-in
landing.about.li2.t=High Reusability
landing.about.li2.d=Maximize productivity by reusing common components
landing.about.li3.t=Proven Stability
landing.about.li3.d=Reliability proven across many government IT projects
# Landing - Services
landing.svc.title=5 Service Groups, 34 Core Services
landing.svc.sub=The runtime provides every area needed for application development as standard services, from presentation to foundation.
landing.svc.1.t=Presentation
landing.svc.1.d=Handles UI composition and input validation. Supports MVC, Ajax, i18n, and security as standard.
landing.svc.2.t=Business Logic
landing.svc.2.d=Provides core business features such as flow control, transaction management, and exception handling.
landing.svc.3.t=Data Access
landing.svc.3.d=Standardizes the data access layer including persistence, data sources, ORM, and cache.
landing.svc.4.t=Integration
landing.svc.4.d=Supports integration across heterogeneous systems, ensuring smooth interoperability.
landing.svc.5.t=Foundation
landing.svc.5.d=Provides foundation services used across all areas: AOP, IoC, logging, security, encryption, and file handling.
landing.svc.more.t=219+ Common Components
landing.svc.more.d=Shorten development with ready-to-use, proven components like boards, schedules, and member management.
