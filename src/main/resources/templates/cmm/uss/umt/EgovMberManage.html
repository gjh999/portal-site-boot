<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>회원관리</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item active">회원관리</li>
            </ol>
        </nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-people"></i> 회원관리</h1>
            <span class="text-muted small">총 <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</span>
        </div>

        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.insert'}">등록되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.update'}">수정되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.delete'}">삭제되었습니다.</div>

        <!-- 검색조건 (JSP: 상태 sbscrbSttus / 조건 searchCondition 0=아이디·1=이름 / 키워드) -->
        <form class="row g-2 mb-3" th:action="@{/uss/umt/mber/EgovMberManage.do}" method="get"
              th:with="sttusList=${entrprsMberSttus_result}">
            <div class="col-auto">
                <select class="krds-form-select" name="sbscrbSttus" title="회원상태 선택"
                        th:with="ss=${userSearchVO.sbscrbSttus}">
                    <option value="0" th:selected="${ss == '0'}">상태 전체</option>
                    <th:block th:if="${not #lists.isEmpty(sttusList)}">
                        <option th:each="c : ${sttusList}" th:value="${c.code}" th:text="${c.codeNm}"
                                th:selected="${ss == c.code}">상태</option>
                    </th:block>
                    <th:block th:if="${#lists.isEmpty(sttusList)}">
                        <option value="A" th:selected="${ss == 'A'}">가입신청</option>
                        <option value="P" th:selected="${ss == 'P'}">가입승인</option>
                        <option value="D" th:selected="${ss == 'D'}">가입삭제</option>
                    </th:block>
                </select>
            </div>
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="검색조건 선택"
                        th:with="sc=${userSearchVO.searchCondition}">
                    <option value="" th:selected="${sc == ''}">선택</option>
                    <option value="0" th:selected="${sc == '0'}">아이디</option>
                    <option value="1" th:selected="${sc == '1'}">이름</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${userSearchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <form id="listForm" th:action="@{/uss/umt/mber/EgovMberDelete.do}" method="post">
            <input type="hidden" name="checkedIdForDel" id="checkedIdForDel"/>
            <div class="krds-table-wrap"><table class="tbl">
                <thead>
                <tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll" title="전체선택"/></th>
                    <th scope="col">아이디</th>
                    <th scope="col">이름</th>
                    <th scope="col">이메일</th>
                    <th scope="col" style="width:100px;">상태</th>
                    <th scope="col" style="width:130px;">가입일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${resultList}">
                    <td>
                        <input type="checkbox" class="rowChk"
                               th:attr="data-delid='USR01:' + ${item.uniqid}" title="선택"/>
                    </td>
                    <td>
                        <a class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovMberSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                    </td>
                    <td th:text="${item.usernm}">이름</td>
                    <td th:text="${item.emailadres}">이메일</td>
                    <td class="text-center">
                        <span class="krds-badge"
                              th:classappend="${item.sttus == 'P'} ? 'bg-success' : (${item.sttus == 'D'} ? 'bg-danger' : 'bg-gray')"
                              th:text="${item.sttus == 'A'} ? '신청' : (${item.sttus == 'P'} ? '승인' : (${item.sttus == 'D'} ? '삭제' : ${item.sttus}))">상태</span>
                    </td>
                    <td class="text-center" th:text="${item.sbscrbde}">가입일</td>
                </tr>
                <tr th:if="${#lists.isEmpty(resultList)}">
                    <td colspan="6" class="text-center text-muted py-4">등록된 회원이 없습니다.</td>
                </tr>
                </tbody>
            </table></div>

            <div class="d-flex justify-content-between">
                <button type="button" class="krds-btn danger small" onclick="deleteChecked()">
                    <i class="bi bi-trash"></i> 선택 삭제
                </button>
                <a class="krds-btn primary small" th:href="@{/uss/umt/mber/EgovMberInsertView.do}">
                    <i class="bi bi-person-plus"></i> 회원 등록
                </a>
            </div>
        </form>

        <!-- 페이징 (검색조건 유지: sbscrbSttus/searchCondition/searchKeyword) -->
        <nav aria-label="페이지 네비게이션" class="mt-3"
             th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${paginationInfo.firstPageNoOnPageList == 1} ? 'disabled' : ''">
                    <a class="page-link" aria-label="이전"
                       th:href="${paginationInfo.firstPageNoOnPageList > 1}
                                ? @{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.firstPageNoOnPageList - 1},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}
                                : '#'"><span aria-hidden="true">&laquo;</span></a>
                </li>
                <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                    <li class="page-item" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''">
                        <a class="page-link"
                           th:href="@{/uss/umt/mber/EgovMberManage.do(pageIndex=${pageNo},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}"
                           th:text="${pageNo}">1</a>
                    </li>
                </th:block>
                <li class="page-item"
                    th:classappend="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount} ? 'disabled' : ''">
                    <a class="page-link" aria-label="다음"
                       th:href="${paginationInfo.lastPageNoOnPageList < paginationInfo.totalPageCount}
                                ? @{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.lastPageNoOnPageList + 1},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}
                                : '#'"><span aria-hidden="true">&raquo;</span></a>
                </li>
            </ul>
        </nav>
    </div>
    <script>
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function deleteChecked() {
            var ids = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                ids.push(c.getAttribute('data-delid'));
            });
            if (ids.length === 0) { alert('삭제할 회원을 선택하세요.'); return; }
            if (!confirm('선택한 ' + ids.length + '명의 회원을 삭제하시겠습니까?')) return;
            document.getElementById('checkedIdForDel').value = ids.join(',');
            document.getElementById('listForm').submit();
        }
    </script>
</main>
</body>
</html>
