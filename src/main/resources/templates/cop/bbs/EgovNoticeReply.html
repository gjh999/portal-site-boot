<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>답글 작성</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/cop/bbs/selectBoardList.do(bbsId=${bdMstr != null ? bdMstr.bbsId : ''})}"
                   th:text="${bdMstr != null ? bdMstr.bbsNm : '게시판'}">게시판</a>
            </li>
            <li class="breadcrumb-item active">답글쓰기</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-reply"></i> 답글 작성</h1>
        <form th:action="@{/cop/bbs/replyBoardArticle.do}" method="post" enctype="multipart/form-data">
            <!-- 검색조건/페이지 유지 -->
            <input type="hidden" name="searchCnd"  th:value="${result != null ? result.searchCnd : ''}"/>
            <input type="hidden" name="searchWrd"  th:value="${result != null ? result.searchWrd : ''}"/>
            <input type="hidden" name="pageIndex"  th:value="${result != null ? result.pageIndex : '1'}"/>
            <!-- 부모글 컨텍스트(답글 위치 계산용) -->
            <input type="hidden" name="bbsId"    th:value="${result != null ? result.bbsId : (bdMstr != null ? bdMstr.bbsId : '')}"/>
            <input type="hidden" name="nttId"    th:value="${result != null ? result.nttId : ''}"/>
            <input type="hidden" name="sortOrdr" th:value="${result != null ? result.sortOrdr : '0'}"/>
            <input type="hidden" name="replyLc"  th:value="${result != null ? result.replyLc : '0'}"/>
            <!-- 인증 사용자(비익명) validator(@EgovNullCheck) 처리를 위한 dummy 값 -->
            <input type="hidden" name="ntcrNm" value="dummy"/>
            <input type="hidden" name="password" value="dummy"/>
            <!-- 답글은 게시기간을 무기한으로 -->
            <input type="hidden" name="ntceBgnde" value="10000101"/>
            <input type="hidden" name="ntceEndde" value="99991231"/>

            <div class="mb-3"><label class="form-label">제목</label>
                <input class="form-control" type="text" name="nttSj" maxlength="120"
                       th:value="${result != null and result.nttSj != null and !#strings.isEmpty(result.nttSj) ? 'RE: ' + result.nttSj : ''}" required/></div>
            <div class="mb-3"><label class="form-label">내용</label>
                <textarea class="form-control" rows="10" name="nttCn" required></textarea></div>
            <div class="mb-3" th:if="${bdMstr == null or bdMstr.fileAtchPosblAt == 'Y'}">
                <label class="form-label">첨부파일</label>
                <div th:replace="~{cmm/fms/EgovFileUploader ::
                     uploader(${bdMstr != null ? bdMstr.posblAtchFileNumber : null}, 0)}"></div>
            </div>

            <div class="d-flex justify-content-between">
                <a class="btn btn-outline-secondary"
                   th:href="@{/cop/bbs/selectBoardArticle.do(bbsId=${result != null ? result.bbsId : ''},nttId=${result != null ? result.nttId : ''})}">취소</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> 답글 등록</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
