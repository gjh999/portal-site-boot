<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!--
  배너 슬라이드(캐러셀) 공통 프래그먼트.
  파라미터: bannerList(목록), interval(ms), extraClass(bnr-main|bnr-foot)
  이미지는 /images/banner/{bannerImage} 경로에서 서빙.
-->
<th:block th:fragment="carousel(bannerList, interval, extraClass)">
    <div th:if="${bannerList != null and !#lists.isEmpty(bannerList)}"
         class="bnr-carousel" th:classappend="${extraClass}" th:attr="data-interval=${interval}">
        <div class="bnr-track">
            <div class="bnr-slide" th:each="b : ${bannerList}">
                <!-- 링크 URL 이 있으면 a 로 감싸고, 없으면 링크 없이 이미지/캡션만 표시 -->
                <a th:if="${b.linkUrl != null and b.linkUrl != ''}" th:href="${b.linkUrl}" target="_blank" rel="noopener">
                    <img th:src="@{'/images/banner/' + ${b.bannerImage}}" th:alt="${b.bannerNm}"
                         onerror="this.src='/images/intro/main_visual.png';"/>
                    <span class="bnr-cap" th:if="${b.bannerNm != null}">
                        <span th:text="${b.bannerNm}">배너명</span>
                        <small th:if="${b.bannerDc != null and b.bannerDc != ''}" th:text="${b.bannerDc}">설명</small>
                    </span>
                </a>
                <th:block th:unless="${b.linkUrl != null and b.linkUrl != ''}">
                    <img th:src="@{'/images/banner/' + ${b.bannerImage}}" th:alt="${b.bannerNm}"
                         onerror="this.src='/images/intro/main_visual.png';"/>
                    <span class="bnr-cap" th:if="${b.bannerNm != null}">
                        <span th:text="${b.bannerNm}">배너명</span>
                        <small th:if="${b.bannerDc != null and b.bannerDc != ''}" th:text="${b.bannerDc}">설명</small>
                    </span>
                </th:block>
            </div>
        </div>
        <button type="button" class="bnr-nav bnr-prev" aria-label="이전 배너">&#10094;</button>
        <button type="button" class="bnr-nav bnr-next" aria-label="다음 배너">&#10095;</button>
        <div class="bnr-dots">
            <button type="button" class="bnr-dot" th:each="b,st : ${bannerList}"
                    th:classappend="${st.index == 0} ? 'active'" th:attr="aria-label='배너 ' + ${st.count}"></button>
        </div>
    </div>
</th:block>

<!--
  팝업 한 건의 내부 본문(이미지+제목+설명). 링크 URL 은 선택사항.
-->
<th:block th:fragment="popupItem(b)">
    <a th:if="${b.linkUrl != null and b.linkUrl != ''}" th:href="${b.linkUrl}" target="_blank" rel="noopener">
        <img th:src="@{'/images/banner/' + ${b.bannerImage}}" th:alt="${b.bannerNm}"
             onerror="this.src='/images/intro/main_visual.png';"/>
    </a>
    <img th:unless="${b.linkUrl != null and b.linkUrl != ''}" th:src="@{'/images/banner/' + ${b.bannerImage}}"
         th:alt="${b.bannerNm}" onerror="this.src='/images/intro/main_visual.png';"/>
    <div class="bnr-popup-title" th:if="${b.bannerNm != null}" th:text="${b.bannerNm}">팝업 제목</div>
    <div class="bnr-popup-desc" th:if="${b.bannerDc != null and b.bannerDc != ''}" th:text="${b.bannerDc}">팝업 설명</div>
</th:block>

<!--
  팝업 배너 프래그먼트. "오늘 하루 보지 않기"(쿠키 24h).
  - POPUP_GROUP_AT='Y' 인 배너들은 하나의 팝업 안에서 캐러셀로 슬라이드.
  - POPUP_GROUP_AT!='Y'(개별) 인 배너는 각각 별도 팝업으로 표출.
  - 좌표(POPUP_LEFT/TOP)·크기(POPUP_WIDTH/HEIGHT) 가 있으면 위치/크기 지정.
  파라미터: bannerList(POPUP 목록), interval(ms)
-->
<th:block th:fragment="popup(bannerList, interval)">
    <th:block th:if="${bannerList != null and !#lists.isEmpty(bannerList)}">
        <!-- 묶음 팝업(POPUP_GROUP_AT='Y') : 한 오버레이에 캐러셀 -->
        <th:block th:with="grouped=${#lists.toList(bannerList).?[popupGroupAt == 'Y']}">
            <div th:if="${!#lists.isEmpty(grouped)}" th:with="g=${grouped[0]}"
                 class="bnr-popup-overlay"
                 th:attr="data-cookie-key='bnrPopupHide_group',
                          data-left=${g.popupLeft}, data-top=${g.popupTop},
                          data-width=${g.popupWidth}, data-height=${g.popupHeight}">
                <div class="bnr-popup" role="dialog" aria-modal="true" aria-label="팝업 배너">
                    <div class="bnr-popup-body">
                        <div class="bnr-carousel" th:attr="data-interval=${interval}">
                            <div class="bnr-track">
                                <div class="bnr-slide" th:each="b : ${grouped}">
                                    <div th:replace="~{fragments/banner :: popupItem(${b})}"></div>
                                </div>
                            </div>
                            <button type="button" class="bnr-nav bnr-prev" aria-label="이전 팝업">&#10094;</button>
                            <button type="button" class="bnr-nav bnr-next" aria-label="다음 팝업">&#10095;</button>
                            <div class="bnr-dots">
                                <button type="button" class="bnr-dot" th:each="b,st : ${grouped}"
                                        th:classappend="${st.index == 0} ? 'active'"
                                        th:attr="aria-label='팝업 ' + ${st.count}"></button>
                            </div>
                        </div>
                    </div>
                    <div class="bnr-popup-foot">
                        <label>
                            <input type="checkbox" class="bnr-popup-today"/> 오늘 하루 보지 않기
                        </label>
                        <button type="button" class="bnr-popup-close">닫기 &times;</button>
                    </div>
                </div>
            </div>
        </th:block>

        <!-- 개별 팝업(POPUP_GROUP_AT!='Y') : 각각 별도 오버레이 -->
        <th:block th:each="b : ${bannerList}" th:if="${b.popupGroupAt == null or b.popupGroupAt != 'Y'}">
            <div class="bnr-popup-overlay"
                 th:attr="data-cookie-key='bnrPopupHide_' + ${b.bannerId},
                          data-left=${b.popupLeft}, data-top=${b.popupTop},
                          data-width=${b.popupWidth}, data-height=${b.popupHeight}">
                <div class="bnr-popup" role="dialog" aria-modal="true" aria-label="팝업 배너">
                    <div class="bnr-popup-body">
                        <div th:replace="~{fragments/banner :: popupItem(${b})}"></div>
                    </div>
                    <div class="bnr-popup-foot">
                        <label>
                            <input type="checkbox" class="bnr-popup-today"/> 오늘 하루 보지 않기
                        </label>
                        <button type="button" class="bnr-popup-close">닫기 &times;</button>
                    </div>
                </div>
            </div>
        </th:block>
    </th:block>
</th:block>

</body>
</html>
