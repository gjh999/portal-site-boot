<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{error.accessDenied.title}">접근 거부</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container text-center py-5">
        <h1 class="display-6 mb-3"><i class="bi bi-shield-lock text-danger"></i> Error</h1>
        <p class="lead mb-4" th:text="#{error.sessionExpired}">세션이 만료되었습니다.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back();" class="krds-btn primary" th:text="#{error.prevPage}">이전페이지</a>
            <a th:href="@{/uat/uia/egovLoginUsr.do}" class="krds-btn tertiary" th:text="#{common.login}">로그인</a>
        </div>
    </div>
</main>
</body>
</html>
