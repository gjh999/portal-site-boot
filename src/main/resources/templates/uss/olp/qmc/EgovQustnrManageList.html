<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">설문관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-check"></i> 설문관리</h1>
        <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th style="width:60px;">번호</th><th>설문제목</th><th style="width:140px;">등록일</th></tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td><a th:href="@{/uss/olp/qmc/EgovQustnrManageDetail.do(qestnrId=${item.qestnrid})}" th:text="${item.qestnrsj}">설문제목</a></td>
                <td class="text-center" th:text="${item.frstRegistPnttm}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="3" class="text-center text-muted py-4">등록된 설문이 없습니다.</td></tr>
            </tbody>
        </table>
        <div class="text-end"><a class="btn btn-primary btn-sm" th:href="@{/uss/olp/qmc/EgovQustnrManageRegist.do}"><i class="bi bi-plus-lg"></i> 설문 등록</a></div>
    </div>
</main>
</body>
</html>
