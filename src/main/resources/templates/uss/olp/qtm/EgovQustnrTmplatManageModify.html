<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qtm.modify.title}">설문템플릿 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}" th:text="#{survey.qtm.crumb}">설문템플릿</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.modify}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{survey.qtm.modify.heading}">설문템플릿 수정</span></h1>
        <form th:action="@{/uss/olp/qtm/EgovQustnrTmplatManageModifyActor.do}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="qestnrTmplatId" th:value="${r != null ? r.qestnrtmplatid : ''}"/>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatType}">템플릿유형</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" name="qestnrTmplatTy" th:value="${r != null ? r.qestnrtmplatty : ''}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label" th:text="#{survey.qtm.field.currentImage}">현재 이미지</label><br/>
                    <img style="max-height:60px;" th:if="${r != null}"
                         th:src="@{/uss/olp/qtm/EgovQustnrTmplatManageImg.do(qestnrTmplatId=${r.qestnrtmplatid})}" th:alt="#{survey.qtm.img.alt}" alt="템플릿 이미지"/></div>
                <div class="col-12"><label class="form-label" th:text="#{survey.qtm.field.changeImage}">템플릿유형 이미지 변경(JPEG)</label>
                    <input class="krds-input" type="file" name="qestnrTmplatImage" accept="image/*"/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatCn}">템플릿 설명</span> <span class="text-danger">*</span></label>
                    <textarea class="krds-input" rows="4" name="qestnrTmplatCn" required th:text="${r != null ? r.qestnrtmplatcn : ''}"></textarea></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatPath}">템플릿파일(경로)</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" name="qestnrTmplatCours" th:value="${r != null ? r.qestnrtmplatcours : ''}" maxlength="100" required/></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}" th:text="#{survey.btn.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{survey.btn.modify}">수정</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
