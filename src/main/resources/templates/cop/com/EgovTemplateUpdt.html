<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>템플릿 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;" th:with="t=${TemplateInfVO}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cop/com/selectTemplateInfs.do}">템플릿관리</a></li>
            <li class="breadcrumb-item active">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 게시판 템플릿 수정</h1>
        <form th:action="@{/cop/com/updateTemplateInf.do}" method="post">
            <input type="hidden" name="pageIndex" th:value="${searchVO != null ? searchVO.pageIndex : '1'}"/>
            <input type="hidden" name="tmplatId" th:value="${t != null ? t.tmplatId : ''}"/>
            <table class="table">
                <tbody>
                <tr>
                    <th style="width:190px;">템플릿 ID</th>
                    <td><span class="form-control-plaintext" th:text="${t != null ? t.tmplatId : ''}">id</span></td>
                </tr>
                <tr>
                    <th>템플릿 명 <span class="text-danger">*</span></th>
                    <td><input class="form-control" type="text" maxlength="120" name="tmplatNm"
                               th:value="${t != null ? t.tmplatNm : ''}" required/></td>
                </tr>
                <tr>
                    <th>템플릿 구분 <span class="text-danger">*</span></th>
                    <td>
                        <select class="form-select" name="tmplatSeCode" required>
                            <option value="">선택하세요</option>
                            <option th:each="c : ${resultList}" th:value="${c.code}" th:text="${c.codeNm}"
                                    th:selected="${t != null and c.code == t.tmplatSeCode}">구분</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>템플릿 경로 <span class="text-danger">*</span></th>
                    <td><input class="form-control" type="text" maxlength="2000" name="tmplatCours"
                               th:value="${t != null ? t.tmplatCours : ''}" required/></td>
                </tr>
                <tr>
                    <th>사용여부 <span class="text-danger">*</span></th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_y" name="useAt" value="Y"
                                   th:checked="${t == null or t.useAt == 'Y'}"/>
                            <label class="form-check-label" for="ua_y">Y</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="ua_n" name="useAt" value="N"
                                   th:checked="${t != null and t.useAt == 'N'}"/>
                            <label class="form-check-label" for="ua_n">N</label>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-between">
                <a class="btn btn-outline-secondary" th:href="@{/cop/com/selectTemplateInfs.do}">목록</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
            </div>
        </form>
        <form th:action="@{/cop/bbs/deleteTemplateInf.do}" method="post" class="mt-2 text-end"
              onsubmit="return confirm('삭제하시겠습니까?');">
            <input type="hidden" name="tmplatId" th:value="${t != null ? t.tmplatId : ''}"/>
            <button class="btn btn-outline-danger" type="submit"><i class="bi bi-trash"></i> 삭제</button>
        </form>
    </div>
</main>
</body>
</html>
