<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qim.modify.title}">설문항목 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qim/EgovQustnrItemManageList.do}" th:text="#{survey.crumb.qim}">설문항목</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.modify}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{survey.qim.modify.heading}">설문항목 수정</span></h1>
        <form th:action="@{/uss/olp/qim/EgovQustnrItemManageModify.do}" method="post">
            <input type="hidden" name="cmd" value="save"/>
            <input type="hidden" name="qustnrIemId" th:value="${r != null ? r.qustnrIemId : ''}"/>
            <input type="hidden" name="qestnrQesitmId" th:value="${r != null ? r.qestnrqesitmid : ''}"/>
            <input type="hidden" name="qestnrId" th:value="${r != null ? r.qestnrId : ''}"/>
            <input type="hidden" name="qestnrTmplatId" th:value="${r != null ? r.qestnrtmplatid : ''}"/>
            <div class="row g-3">
                <div class="col-12"><label class="form-label" th:text="#{survey.field.qestnrSjLabel}">설문제목</label>
                    <input class="krds-input" type="text" readonly th:value="${r != null ? r.qestnrCn : ''}"/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{survey.field.iemSn}">항목순번</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" name="iemSn" th:value="${r != null ? r.iemSn : ''}" maxlength="5" required/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{survey.field.etcAnswerAt}">기타답변여부</label>
                    <select class="krds-form-select" name="etcAnswerAt">
                        <option value="N" th:selected="${r != null and r.etcAnswerAt == 'N'}">N</option>
                        <option value="Y" th:selected="${r != null and r.etcAnswerAt == 'Y'}">Y</option>
                    </select></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.field.iemCn}">항목내용</span> <span class="text-danger">*</span></label>
                    <textarea class="krds-input" rows="4" name="iemCn" required th:text="${r != null ? r.iemCn : ''}"></textarea></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/olp/qim/EgovQustnrItemManageList.do}" th:text="#{survey.btn.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{survey.btn.modify}">수정</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
