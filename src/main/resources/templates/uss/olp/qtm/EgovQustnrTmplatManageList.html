<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문템플릿 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">설문템플릿 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-layout-text-window"></i> 설문템플릿 관리</h1>
        <table class="table table-hover align-middle">
            <thead class="table-light"><tr>
                <th style="width:60px;">번호</th>
                <th>템플릿 설명</th>
                <th style="width:120px;">템플릿 유형</th>
                <th style="width:120px;">등록자</th>
                <th style="width:120px;">등록일</th>
            </tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageDetail.do(qestnrTmplatId=${item['qestnrtmplatid']})}" th:text="${item['qestnrtmplatcn']}">템플릿 설명</a></td>
                <td class="text-center" th:text="${item['qestnrtmplatty']}">유형</td>
                <td class="text-center" th:text="${item['frstregisternm']}">등록자</td>
                <td class="text-center" th:text="${item['frstregistpnttm']}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="5" class="text-center text-muted py-4">등록된 설문템플릿이 없습니다.</td></tr>
            </tbody>
        </table>
        <div class="text-end"><a class="btn btn-primary btn-sm" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageRegist.do}"><i class="bi bi-plus-lg"></i> 템플릿 등록</a></div>
    </div>
</main>
</body>
</html>
