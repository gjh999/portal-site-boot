<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{mber.sbscrb.title}">회원가입신청</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{mber.sbscrb.title}">회원가입신청</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-plus"></i> <span th:text="#{mber.sbscrb.title}">회원가입신청</span></h1>
        <form th:action="@{/uss/umt/cmm/EgovMberSbscrb.do}" method="post" th:object="${mberManageVO}">
            <!-- @EgovNullCheck 대상(groupId, mberSttus): 컨트롤러가 재설정하나 @Valid 통과용 hidden -->
            <input type="hidden" th:field="*{groupId}"/>
            <input type="hidden" th:field="*{mberSttus}"/>

            <div class="alert alert-danger py-2" th:if="${#fields.hasAnyErrors()}" th:text="#{mber.form.validateError}">
                입력값을 확인하세요. (필수 항목 누락)
            </div>

            <!-- ── 계정 정보 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{entrprs.sec.account}">계정 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.id}">아이디</span> <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input class="krds-input" type="text" th:field="*{mberId}" maxlength="20" required/>
                            <button class="krds-btn tertiary" type="button" id="btnIdCheck"><i class="bi bi-search"></i> <span th:text="#{entrprs.id.check}">중복확인</span></button>
                        </div>
                        <div class="form-text" th:text="#{mber.sbscrb.idCheckHint}">중복 아이디 검색</div></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.name}">이름</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="text" th:field="*{mberNm}"
                               th:value="${mberNm}" maxlength="50" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password}">비밀번호</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="password" th:field="*{password}" maxlength="20" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password.confirm}">비밀번호 확인</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="password" name="password2" id="password2" maxlength="20" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password.hint}">비밀번호 힌트</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" th:field="*{passwordHint}" required>
                            <option value="" th:text="#{mber.selectPlease}">선택하세요</option>
                            <th:block th:if="${not #lists.isEmpty(passwordHint_result)}">
                                <option th:each="c : ${passwordHint_result}" th:value="${c.code}" th:text="${c.codeNm}">힌트</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(passwordHint_result)}">
                                <option value="P01" th:text="#{mber.pwdHint.p01}">가장 기억에 남는 장소는?</option>
                                <option value="P02" th:text="#{mber.pwdHint.p02}">나의 좌우명은?</option>
                                <option value="P03" th:text="#{mber.pwdHint.p03}">나의 보물 제1호는?</option>
                                <option value="P04" th:text="#{mber.pwdHint.p04}">가장 기억에 남는 선생님 성함은?</option>
                                <option value="P05" th:text="#{mber.pwdHint.p05}">다른 사람은 모르는 나만의 신체비밀은?</option>
                            </th:block>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{entrprs.password.cnsr}">비밀번호 정답</span> <span class="text-danger">*</span></label>
                        <input class="krds-input" type="text" th:field="*{passwordCnsr}" maxlength="100" required/></div>
                </div>
            </fieldset>

            <!-- ── 기본 정보 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{mber.sec.basic}">기본 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.sexdstn}">성별</label>
                        <select class="krds-form-select" th:field="*{sexdstnCode}">
                            <option value="" th:text="#{mber.selectPlease}">선택하세요</option>
                            <th:block th:if="${not #lists.isEmpty(sexdstnCode_result)}">
                                <option th:each="c : ${sexdstnCode_result}" th:value="${c.code}" th:text="${c.codeNm}">성별</option>
                            </th:block>
                            <th:block th:if="${#lists.isEmpty(sexdstnCode_result)}">
                                <option value="M" th:text="#{mber.sex.male}">남자</option>
                                <option value="F" th:text="#{mber.sex.female}">여자</option>
                            </th:block>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label"><span th:text="#{mber.col.occpTy}">직업유형</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" th:field="*{occpTy}" required>
                            <option value="" th:text="#{mber.selectPlease}">선택하세요</option>
                            <option th:each="c : ${occpTy_result}" th:if="${c.code != '00'}"
                                    th:value="${c.code}" th:text="${c.codeNm}">직업</option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('occpTy')}" th:errors="*{occpTy}"></div></div>
                </div>
            </fieldset>

            <!-- ── 연락처·주소 ── -->
            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{entrprs.sec.contact}">연락처·주소</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.moblphonNo}">휴대폰번호</label>
                        <input class="krds-input" type="text" th:field="*{moblphonNo}" maxlength="13"
                               data-phone-format="mobile" inputmode="numeric" placeholder="010-1234-5678"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{entrprs.telno}">전화번호</label>
                        <input class="krds-input" type="text" th:field="*{telno}" maxlength="13"
                               data-phone-format="tel" inputmode="numeric" placeholder="02-123-4567"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{entrprs.fxnum}">팩스번호</label>
                        <input class="krds-input" type="text" th:field="*{mberFxnum}" maxlength="15"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.emailAdres}">이메일주소</label>
                        <input class="krds-input" type="email" th:field="*{mberEmailAdres}" maxlength="50"/></div>
                    <div class="col-md-4 form-group"><label class="form-label" th:text="#{entrprs.zip}">우편번호</label>
                        <div class="input-group">
                            <input class="krds-input" type="text" th:field="*{zip}" maxlength="8"/>
                            <button class="krds-btn tertiary" type="button" id="btnZipSearch">
                                <i class="bi bi-search"></i> <span th:text="#{mber.zip.find}">찾기</span></button>
                        </div></div>
                    <div class="col-md-8 form-group"><label class="form-label" th:text="#{entrprs.adres}">주소</label>
                        <input class="krds-input" type="text" th:field="*{adres}" maxlength="100"/></div>
                    <div class="col-12 form-group"><label class="form-label" th:text="#{entrprs.detailAdres}">상세주소</label>
                        <input class="krds-input" type="text" th:field="*{detailAdres}" maxlength="100"/></div>
                </div>
            </fieldset>

            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/}" th:text="#{button.cancel}">취소</a>
                <button class="krds-btn primary" type="submit" id="btnSbscrb"><i class="bi bi-check-lg"></i> <span th:text="#{entrprs.btn.submit}">가입신청</span></button>
            </div>
        </form>
    </div>
    <script th:inline="javascript">
        document.getElementById('btnIdCheck').addEventListener('click', function () {
            var id = document.getElementById('mberId').value;
            window.open([[@{/uss/umt/EgovIdDplctCnfirmView.do}]] + '?checkId=' + encodeURIComponent(id),
                'idCheck', 'width=600,height=450,scrollbars=yes');
        });
        document.getElementById('btnZipSearch').addEventListener('click', function () {
            window.open([[@{/cmm/sym/zip/EgovCcmZipSearchPopup.do}]],
                'zipSearch', 'width=560,height=620,scrollbars=yes');
        });
        /* 우편번호 검색 팝업 콜백 */
        window.fnZipReturn = function (zip, addr) {
            document.getElementById('zip').value = zip;
            document.getElementById('adres').value = addr;
        };
        document.getElementById('btnSbscrb').closest('form').addEventListener('submit', function (e) {
            var p1 = document.getElementById('password').value;
            var p2 = document.getElementById('password2').value;
            if (p1 !== p2) { e.preventDefault(); alert(/*[[#{entrprs.pwd.mismatch}]]*/ '비밀번호가 일치하지 않습니다.'); }
        });
    </script>
</main>
</body>
</html>
