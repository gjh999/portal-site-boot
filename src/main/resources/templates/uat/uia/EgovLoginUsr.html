<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{login.title}">로그인</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width: 460px;">
        <div class="krds-panel shadow-sm mt-4">
            <div class="krds-panel-body p-4">
                <h1 class="h4 text-center mb-4"><i class="bi bi-shield-lock"></i> <span th:text="#{login.title}">로그인</span></h1>

                <div class="alert alert-danger py-2" th:if="${message}" th:text="${message}">오류</div>

                <form th:action="@{/uat/uia/actionSecurityLogin.do}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="userSe" th:text="#{login.userSe}">사용자 구분</label>
                        <select class="krds-form-select" id="userSe" name="userSe">
                            <option value="USR" th:text="#{login.userSe.usr}">업무사용자(직원)</option>
                            <option value="GNR" th:text="#{login.userSe.gnr}">일반회원</option>
                            <option value="ENT" th:text="#{login.userSe.ent}">기업회원</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id" th:text="#{login.id}">아이디</label>
                        <input class="krds-input" id="id" name="id" type="text" required autofocus
                               th:placeholder="#{login.id}" placeholder="아이디"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password" th:text="#{login.pw}">비밀번호</label>
                        <input class="krds-input" id="password" name="password" type="password" required
                               th:placeholder="#{login.pw}" placeholder="비밀번호"/>
                    </div>
                    <button class="krds-btn primary w-100" type="submit">
                        <i class="bi bi-box-arrow-in-right"></i> <span th:text="#{login.title}">로그인</span>
                    </button>
                </form>

                <p class="text-center mt-3 mb-1">
                    <a class="krds-btn tertiary small" th:href="@{/uss/umt/cmm/EgovMberSbscrbSelect.do}">
                        <i class="bi bi-person-plus"></i> <span th:text="#{mber.sbscrb.select.title}">회원가입</span></a>
                </p>
                <p class="text-muted small text-center mt-2 mb-0">
                    <span th:text="#{login.hint.admin}">관리자</span>: <code>admin</code> / <code>1</code> &nbsp;·&nbsp; <span th:text="#{login.hint.user}">일반</span>: <code>user</code> / <code>1</code>
                </p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
