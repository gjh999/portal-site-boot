<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{policy.detail.heading}">개인정보처리방침 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/sam/terms/list.do(termsType='ipm')}" th:text="#{policy.title}">개인정보처리방침</a></li>
            <li class="breadcrumb-item active" th:text="#{policy.detail.crumb}">방침 상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-lock"></i> <span th:text="#{policy.detail.heading}">개인정보처리방침 상세</span></h1>
        <div class="text-muted text-center py-5" th:if="${indvdlInfoPolicy == null}" th:text="#{policy.detail.empty}">상세 데이터가 없습니다.</div>
        <div th:if="${indvdlInfoPolicy != null}">
            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;" th:text="#{policy.detail.nm}">개인정보보호정책 명</th>
                    <td th:text="${indvdlInfoPolicy.indvdlInfoNm}">정책명</td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{policy.col.indvdlInfoYn}">동의여부</th>
                    <td>
                        <span class="krds-badge"
                              th:classappend="${indvdlInfoPolicy.indvdlInfoYn == 'Y'} ? 'bg-success' : 'bg-gray'"
                              th:text="${indvdlInfoPolicy.indvdlInfoYn == 'Y'} ? #{policy.yes} : #{policy.no}">동의여부</span>
                    </td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{policy.detail.cn}">개인정보보호정책 내용</th>
                    <td><div style="white-space:pre-wrap;" th:text="${indvdlInfoPolicy.indvdlInfoDc}">내용</div></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{policy.col.regDe}">등록일자</th>
                    <td th:text="${indvdlInfoPolicy.frstRegisterPnttm}">일자</td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <form th:action="@{/uss/sam/ipm/detailIndvdlInfoPolicy.do}" method="post"
                      sec:authorize="hasRole('ROLE_ADMIN')"
                      th:onsubmit="|return confirm('[[#{bbs.confirm.delete}]]');|">
                    <input type="hidden" name="indvdlInfoId" th:value="${indvdlInfoPolicy.indvdlInfoId}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                </form>
                <div class="d-flex gap-2">
                    <a class="krds-btn primary" sec:authorize="hasRole('ROLE_ADMIN')"
                       th:href="@{/uss/sam/ipm/updtIndvdlInfoPolicy.do(indvdlInfoId=${indvdlInfoPolicy.indvdlInfoId})}">
                        <i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
                    <a class="krds-btn tertiary" th:href="@{/uss/sam/terms/list.do(termsType='ipm')}" th:text="#{button.list}">목록</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
