        <nav aria-label="breadcrumb">

            </ol>

        <h1 class="h4 mb-2"><i class="bi bi-building"></i> 사이트 소개</h1>
        <p class="text-muted">표준프레임워크 경량환경 포털사이트를 소개합니다.</p>

        <div class="krds-panel">
            <div class="krds-panel-head fw-bold">사이트 소개</div>
            <div class="krds-panel-body">
                <p class="mb-0">전자정부 표준 프레임워크는 응용SW의 구성기반이 되며 응용SW실행 시 필요한 기본 기능을 제공하는 환경이다.<br/>
                    전자정부 표준 프레임워크는 ‘전자정부 서비스의 품질향상 및 정보화 투자 효율성 향상’을 위해 개발 프레임워크
                    표준을 정립하고, 개발 프레임워크 표준 적용을 통한 응용 SW의 표준화 및 품질과 재사용성 향상을 목표로 한다.</p>
            </div>
        </div>
    </div>
