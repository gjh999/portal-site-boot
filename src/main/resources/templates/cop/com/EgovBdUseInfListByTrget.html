<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.useInf.list}">게시판 사용정보 목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{bbs.useInf.list}">게시판 사용정보 목록</li>
        </ol></nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-clipboard-check"></i> <span th:text="#{bbs.useInf.list}">게시판 사용정보 목록</span></h1>
            <span class="text-muted small"><span th:text="#{common.total}">총</span> <strong th:text="${resultCnt}">0</strong> <span th:text="#{common.unit.case}">건</span></span>
        </div>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;" th:text="#{common.no}">번호</th>
                <th scope="col" th:text="#{bbs.bbsNm}">게시판명</th>
                <th scope="col" style="width:140px;" th:text="#{bbs.register.user}">등록자</th>
                <th scope="col" style="width:160px;" th:text="#{bbs.registSe}">등록구분</th>
                <th scope="col" style="width:80px;" th:text="#{bbs.use}">사용</th>
                <th scope="col" style="width:130px;" th:text="#{common.regdate}">등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td class="text-center" th:text="${item.bbsId}">BBS_0001</td>
                <td th:text="${item.bbsNm}">게시판명</td>
                <td th:text="${item.userNm}">등록자</td>
                <td th:text="${item.registSeCodeNm}">등록구분</td>
                <td class="text-center">
                    <span class="krds-badge" th:classappend="${item.useAt == 'Y'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item.useAt == 'Y'} ? #{bbs.use} : #{bbs.unuse}">사용</span>
                </td>
                <td class="text-center" th:text="${item.frstRegisterPnttm}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="6" class="text-center text-muted py-4" th:text="#{bbs.useInf.empty}">등록된 게시판 사용정보가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</main>
</body>
</html>
