about.lead=전자정부 표준프레임워크 기반 공공 서비스 공통기능을 KRDS 디자인으로 제공하는 포털사이트입니다.
about.panel.title=사이트 소개
about.body=전자정부 표준 프레임워크는 응용SW의 구성기반이 되며 응용SW실행 시 필요한 기본 기능을 제공하는 환경이다. 전자정부 표준 프레임워크는 ‘전자정부 서비스의 품질향상 및 정보화 투자 효율성 향상’을 위해 개발 프레임워크 표준을 정립하고, 개발 프레임워크 표준 적용을 통한 응용 SW의 표준화 및 품질과 재사용성 향상을 목표로 한다.

