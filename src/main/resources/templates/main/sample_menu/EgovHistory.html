<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>연혁</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item"><a th:href="@{/EgovPageLink.do(linkIndex=3)}">사이트 소개</a></li>
                <li class="breadcrumb-item active">연혁</li>
            </ol>
        </nav>

        <div class="intro-hero">
            <img th:src="@{/images/intro/main_visual.png}" alt="" class="intro-hero-bg" aria-hidden="true"/>
            <div class="intro-hero-text">
                <span class="intro-hero-eyebrow"><i class="bi bi-clock-history"></i> 사이트 소개</span>
                <h1>연혁</h1>
                <p>전자정부 표준프레임워크 경량환경 포털의 주요 연혁을 소개합니다.</p>
            </div>
        </div>

        <div class="krds-panel">
            <div class="krds-panel-head fw-bold">연혁</div>
            <div class="krds-panel-body">
                <p class="mb-0">표준프레임워크 활성화 전담조직으로 한국정보화진흥원(NIA)에 2010년 11월 4일 「표준프레임워크센터」가
                    설립되었으며 정책지원, 글로벌 확산 등을 담당할 NIA 인력과 R&amp;D, 기술지원 등을 담당할 외부 민간 전문가로
                    구성되었습니다.</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
