<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문항목 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">설문항목 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-list-check"></i> 설문항목 관리</h1>
        <div class="krds-table-wrap"><table class="tbl">
            <thead><tr>
                <th scope="col" style="width:60px;">번호</th>
                <th scope="col" style="width:80px;">항목순서</th>
                <th scope="col">항목내용</th>
                <th scope="col" style="width:100px;">기타답변</th>
                <th scope="col" style="width:120px;">등록자</th>
                <th scope="col" style="width:120px;">등록일</th>
            </tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td class="text-center" th:text="${item['iemsn']}">1</td>
                <td><a th:href="@{/uss/olp/qim/EgovQustnrItemManageDetail.do(qustnrIemId=${item['qustnriemid']})}" th:text="${item['iemcn']}">항목내용</a></td>
                <td class="text-center" th:text="${item['etcanswerat']}">N</td>
                <td class="text-center" th:text="${item['frstregisternm']}">등록자</td>
                <td class="text-center" th:text="${item['frstregistpnttm']}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="6" class="text-center text-muted py-4">등록된 설문항목이 없습니다.</td></tr>
            </tbody>
        </table></div>
        <div class="text-end"><a class="krds-btn primary small" th:href="@{/uss/olp/qim/EgovQustnrItemManageRegist.do}"><i class="bi bi-plus-lg"></i> 항목 등록</a></div>
    </div>
</main>
</body>
</html>
