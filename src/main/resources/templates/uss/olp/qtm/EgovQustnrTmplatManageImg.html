<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>템플릿 이미지</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:600px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}">설문템플릿</a></li>
            <li class="breadcrumb-item active">이미지</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-image"></i> 템플릿 이미지</h1>
        <div class="krds-panel"><div class="krds-panel-body text-center">
            <img class="img-fluid" th:if="${qestnrTmplatId != null}"
                 th:src="@{/uss/olp/qtm/EgovQustnrTmplatManageImg.do(qestnrTmplatId=${qestnrTmplatId})}" alt="템플릿유형 이미지"/>
            <p class="text-muted mb-0" th:if="${qestnrTmplatId == null}">표시할 이미지가 없습니다.</p>
        </div></div>
    </div>
</main>
</body>
</html>
