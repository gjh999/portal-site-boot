<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>게시판 포틀릿 목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">게시판 목록</li>
        </ol></nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-window-stack"></i> 게시판 목록</h1>
            <span class="text-muted small">총 <strong th:text="${resultList != null ? #lists.size(resultList) : 0}">0</strong> 건</span>
        </div>

        <div class="list-group">
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
               th:each="item : ${resultList}"
               th:href="@{/cop/bbs/selectBoardList.do(bbsId=${item.bbsId})}">
                <span th:text="${item.bbsNm}">게시판명</span>
                <span class="krds-badge bg-gray" th:text="${item.bbsTyCode}">유형</span>
            </a>
            <div class="list-group-item text-center text-muted py-4"
                 th:if="${resultList == null or #lists.isEmpty(resultList)}">등록된 게시판이 없습니다.</div>
        </div>
    </div>
</main>
</body>
</html>
