<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{cal.restde.manage}">휴일 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{cal.restde.manage}">휴일 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-calendar-x"></i> <span th:text="#{cal.restde.manage}">휴일 관리</span></h1>

        <form class="row g-2 mb-3" th:action="@{/sym/cal/EgovRestdeList.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition">
                    <option value="restdeNm" th:selected="${searchVO.searchCondition == 'restdeNm'}" th:text="#{cal.restde.cond.nm}">휴일명</option>
                    <option value="restdeDe" th:selected="${searchVO.searchCondition == 'restdeDe'}" th:text="#{cal.restde.cond.de}">휴일일자</option>
                </select>
            </div>
            <div class="col-auto"><input class="krds-input" name="searchKeyword" th:value="${searchVO.searchKeyword}" th:placeholder="#{cal.restde.placeholder.keyword}" placeholder="검색어"/></div>
            <div class="col-auto"><button class="krds-btn primary" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button></div>
            <div class="col-auto ms-auto">
                <a class="krds-btn tertiary" th:href="@{/sym/cal/EgovNormalMonthCalendar.do}">
                    <i class="bi bi-calendar-month"></i> <span th:text="#{cal.monthlyCal}">월간달력</span></a>
                <a class="krds-btn primary" sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/sym/cal/EgovRestdeRegist.do}">
                    <i class="bi bi-plus-lg"></i> <span th:text="#{button.register}">등록</span></a>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr><th scope="col" style="width:120px;" th:text="#{cal.restde.col.de}">휴일일자</th><th scope="col" th:text="#{cal.restde.col.nm}">휴일명</th><th scope="col" style="width:120px;" th:text="#{cal.restde.col.se}">구분</th></tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td><a th:href="@{/sym/cal/EgovRestdeDetail.do(restdeNo=${item.restdeNo})}" th:text="${item.restdeDe}">일자</a></td>
                <td th:text="${item.restdeNm}">휴일명</td>
                <td th:text="${item.restdeSe}">구분</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="3" class="text-center text-muted py-4" th:text="#{cal.restde.empty.list}">데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sym/cal/EgovRestdeList.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>
    </div>
</main>
</body>
</html>
