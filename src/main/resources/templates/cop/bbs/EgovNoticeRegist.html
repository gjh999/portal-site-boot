<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{bbs.article.write}">게시물 작성</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/cop/bbs/selectBoardList.do(bbsId=${bdMstr != null ? bdMstr.bbsId : ''})}"
                   th:text="${bdMstr != null ? bdMstr.bbsNm : #messages.msg('bbs.default')}">게시판</a>
            </li>
            <li class="breadcrumb-item active" th:text="#{bbs.write}">글쓰기</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{bbs.article.write}">게시물 작성</span></h1>
        <form th:action="@{/cop/bbs/insertBoardArticle.do}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="bbsId" th:value="${bdMstr != null ? bdMstr.bbsId : ''}"/>
            <!-- 인증 사용자(비익명) validator(@EgovNullCheck) 처리를 위한 dummy 값 -->
            <input type="hidden" name="ntcrNm" value="dummy"/>
            <input type="hidden" name="password" value="dummy"/>
            <div class="mb-3"><label class="form-label" th:text="#{common.title}">제목</label>
                <input class="krds-input" type="text" name="nttSj" required/></div>
            <div class="mb-3"><label class="form-label" th:text="#{common.content}">내용</label>
                <textarea class="krds-input" rows="10" name="nttCn" required></textarea></div>
            <!-- 게시기간: 공지(BBSA01)는 입력, 그 외는 무기한(10000101~99991231) -->
            <div class="mb-3" th:if="${bdMstr != null and bdMstr.bbsAttrbCode == 'BBSA01'}">
                <label class="form-label" th:text="#{bbs.ntcePd}">게시기간</label>
                <div class="d-flex align-items-center gap-2">
                    <input class="krds-input" type="date" name="ntceBgnde" required/>
                    <span>~</span>
                    <input class="krds-input" type="date" name="ntceEndde" required/>
                </div>
            </div>
            <th:block th:unless="${bdMstr != null and bdMstr.bbsAttrbCode == 'BBSA01'}">
                <input type="hidden" name="ntceBgnde" value="10000101"/>
                <input type="hidden" name="ntceEndde" value="99991231"/>
            </th:block>
            <div class="mb-3" th:if="${bdMstr == null or bdMstr.fileAtchPosblAt == 'Y'}">
                <label class="form-label" th:text="#{bbs.attach}">첨부파일</label>
                <div th:replace="~{cmm/fms/EgovFileUploader ::
                     uploader(${bdMstr != null ? bdMstr.posblAtchFileNumber : null}, 0)}"></div>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary"
                   th:href="@{/cop/bbs/selectBoardList.do(bbsId=${bdMstr != null ? bdMstr.bbsId : ''})}" th:text="#{button.cancel}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.register}">등록</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
