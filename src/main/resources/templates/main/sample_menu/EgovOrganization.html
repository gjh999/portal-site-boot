<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>조직소개</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item"><a th:href="@{/EgovPageLink.do(linkIndex=3)}">사이트 소개</a></li>
                <li class="breadcrumb-item active">조직소개</li>
            </ol>
        </nav>

        <div class="intro-hero">
            <img th:src="@{/images/intro/main_visual.png}" alt="" class="intro-hero-bg" aria-hidden="true"/>
            <div class="intro-hero-text">
                <span class="intro-hero-eyebrow"><i class="bi bi-diagram-3"></i> 사이트 소개</span>
                <h1>조직소개</h1>
                <p>전자정부 표준프레임워크 경량환경 포털의 조직 구성을 소개합니다.</p>
            </div>
        </div>

        <div class="krds-panel">
            <div class="krds-panel-head fw-bold">조직소개</div>
            <div class="krds-panel-body">
                <p class="mb-0">오픈커뮤니티의 초기 정착을 위해 표준프레임워크 개발 참여자와 국내 주요 오픈커뮤니티의 운영자·전문가를 리딩
                    그룹(PMC, 커미터)으로 구성 오픈커뮤니티의 지속적인 확대·발전을 위해 프로젝트 활동에 적극적으로 참여하는
                    커뮤니티 회원이 리딩그룹의 역할을 획득할 수 있도록 투명하고 공정한 의사결정 체계를 수립</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
