<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>약관확인</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">이용약관 확인</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-file-earmark-text"></i> 회원가입 약관 확인</h1>
        <form th:action="@{/uss/umt/cmm/EgovMberSbscrbView.do}" method="post">
            <input type="hidden" name="sbscrbTy" th:value="${sbscrbTy}"/>
            <div class="alert alert-warning" th:if="${stplatList == null or #lists.isEmpty(stplatList)}">
                등록된 약관 정보가 없습니다. (약관 시드 데이터 확인 필요 — STPLAT_0000000000001)
            </div>
            <div th:each="stplat : ${stplatList}">
                <div class="card mb-3">
                    <div class="card-header"><strong>이용약관</strong></div>
                    <div class="card-body">
                        <div class="border p-3 mb-2" style="max-height:240px;overflow:auto;white-space:pre-wrap;"
                             th:text="${stplat.useStplatCn}">약관 내용</div>
                    </div>
                </div>
                <div class="card mb-3" th:if="${stplat.infoProvdAgeCn != null and !#strings.isEmpty(stplat.infoProvdAgeCn)}">
                    <div class="card-header"><strong>개인정보 제공 동의</strong></div>
                    <div class="card-body">
                        <div class="border p-3" style="max-height:200px;overflow:auto;white-space:pre-wrap;"
                             th:text="${stplat.infoProvdAgeCn}">개인정보 동의 내용</div>
                    </div>
                </div>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="agreeChk" required/>
                <label class="form-check-label" for="agreeChk">위 약관에 동의합니다.</label>
            </div>
            <div class="d-flex justify-content-between">
                <a class="btn btn-outline-secondary" th:href="@{/}">취소</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-arrow-right"></i> 가입신청으로 이동</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
