<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<!--
  페이지네이션 프래그먼트 (KRDS 네이티브: .krds-pagination — 이전/숫자/다음)
  심플(simple-home-boot)과 동일한 KRDS 공식 페이지네이션 스타일로 통일.
  사용법: th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl='/bbs/list', searchCnd='', searchWrd='')}"
  - baseUrl 에는 쿼리스트링 없이 '경로'만 전달. 검색조건은 searchCnd/searchWrd 로 전달하면 페이지 이동 시 유지된다.
  paginationInfo: org.egovframe.rte.ptl.mvc.tags.ui.pagination.PaginationInfo
-->
<nav th:fragment="pagination(paginationInfo, baseUrl, searchCnd, searchWrd)" aria-label="페이지 네비게이션"
     th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
    <div class="krds-pagination">
        <!-- 이전 페이지 그룹 -->
        <span th:if="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev disabled">이전</span>
        <a th:unless="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.firstPageNoOnPageList - 1}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">이전</a>

        <!-- 페이지 번호 -->
        <div class="page-links">
            <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                <a class="page-link" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                   th:href="@{${baseUrl}(pageIndex=${pageNo}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">
                    <span th:if="${pageNo == paginationInfo.currentPageNo}" class="sr-only">현재페이지 </span>
                    <span th:text="${pageNo}">1</span>
                </a>
            </th:block>
        </div>

        <!-- 다음 페이지 그룹 -->
        <span th:if="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next disabled">다음</span>
        <a th:unless="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.lastPageNoOnPageList + 1}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">다음</a>
    </div>
    <p class="text-center text-muted small" style="margin-top:.5rem;">
        전체 <strong th:text="${paginationInfo.totalRecordCount}">0</strong>건
        (<span th:text="${paginationInfo.currentPageNo}">1</span>/<span th:text="${paginationInfo.totalPageCount}">1</span> 페이지)
    </p>
</nav>

<!--
  게시판(bbsId 동반) 전용 — baseUrl + bbsId 를 함께 유지.
  사용법: th:replace="~{fragments/pagination :: paginationBbs(paginationInfo=${paginationInfo}, baseUrl='/cop/bbs/selectBoardList.do', bbsId=${searchVO.bbsId}, searchCnd=${searchVO.searchCnd}, searchWrd=${searchVO.searchWrd})}"
-->
<nav th:fragment="paginationBbs(paginationInfo, baseUrl, bbsId, searchCnd, searchWrd)" aria-label="페이지 네비게이션"
     th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
    <div class="krds-pagination">
        <span th:if="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev disabled">이전</span>
        <a th:unless="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev"
           th:href="@{${baseUrl}(bbsId=${bbsId}, pageIndex=${paginationInfo.firstPageNoOnPageList - 1}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">이전</a>
        <div class="page-links">
            <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                <a class="page-link" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                   th:href="@{${baseUrl}(bbsId=${bbsId}, pageIndex=${pageNo}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">
                    <span th:if="${pageNo == paginationInfo.currentPageNo}" class="sr-only">현재페이지 </span>
                    <span th:text="${pageNo}">1</span>
                </a>
            </th:block>
        </div>
        <span th:if="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next disabled">다음</span>
        <a th:unless="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next"
           th:href="@{${baseUrl}(bbsId=${bbsId}, pageIndex=${paginationInfo.lastPageNoOnPageList + 1}, searchCnd=${searchCnd}, searchWrd=${searchWrd})}">다음</a>
    </div>
    <p class="text-center text-muted small" style="margin-top:.5rem;">
        전체 <strong th:text="${paginationInfo.totalRecordCount}">0</strong>건
        (<span th:text="${paginationInfo.currentPageNo}">1</span>/<span th:text="${paginationInfo.totalPageCount}">1</span> 페이지)
    </p>
</nav>

<!--
  검색조건 파라미터명이 searchCondition/searchKeyword 인 모듈용 (uss/olh FAQ·QnA 등)
  사용법: th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/faq/FaqListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"
-->
<nav th:fragment="paginationSearch(paginationInfo, baseUrl, searchCondition, searchKeyword)" aria-label="페이지 네비게이션"
     th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">

        <span th:if="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev disabled">이전</span>
        <a th:unless="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.firstPageNoOnPageList - 1}, searchCondition=${searchCondition}, searchKeyword=${searchKeyword})}">이전</a>
        <div class="page-links">
            <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                <a class="page-link" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                   th:href="@{${baseUrl}(pageIndex=${pageNo}, searchCondition=${searchCondition}, searchKeyword=${searchKeyword})}">
                    <span th:if="${pageNo == paginationInfo.currentPageNo}" class="sr-only">현재페이지 </span>
                    <span th:text="${pageNo}">1</span>
                </a>
            </th:block>
        </div>
        <span th:if="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next disabled">다음</span>
        <a th:unless="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.lastPageNoOnPageList + 1}, searchCondition=${searchCondition}, searchKeyword=${searchKeyword})}">다음</a>
    </div>
    <p class="text-center text-muted small" style="margin-top:.5rem;">
        전체 <strong th:text="${paginationInfo.totalRecordCount}">0</strong>건
        (<span th:text="${paginationInfo.currentPageNo}">1</span>/<span th:text="${paginationInfo.totalPageCount}">1</span> 페이지)
    </p>
</nav>

<!--
  통합 약관 목록 전용 — termsType(유형필터) + searchKeyword 유지.
  사용법: th:replace="~{fragments/pagination :: paginationTerms(paginationInfo=${paginationInfo}, baseUrl='/uss/sam/terms/list.do', termsType=${termsType}, searchKeyword=${searchKeyword})}"
-->
<nav th:fragment="paginationTerms(paginationInfo, baseUrl, termsType, searchKeyword)" aria-label="페이지 네비게이션"
     th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
    <div class="krds-pagination">
        <span th:if="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev disabled">이전</span>
        <a th:unless="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.firstPageNoOnPageList - 1}, termsType=${termsType}, searchKeyword=${searchKeyword})}">이전</a>
        <div class="page-links">
            <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                <a class="page-link" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                   th:href="@{${baseUrl}(pageIndex=${pageNo}, termsType=${termsType}, searchKeyword=${searchKeyword})}">
                    <span th:if="${pageNo == paginationInfo.currentPageNo}" class="sr-only">현재페이지 </span>
                    <span th:text="${pageNo}">1</span>
                </a>
            </th:block>
        </div>
        <span th:if="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next disabled">다음</span>
        <a th:unless="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next"
           th:href="@{${baseUrl}(pageIndex=${paginationInfo.lastPageNoOnPageList + 1}, termsType=${termsType}, searchKeyword=${searchKeyword})}">다음</a>
    </div>
    <p class="text-center text-muted small" style="margin-top:.5rem;">
        전체 <strong th:text="${paginationInfo.totalRecordCount}">0</strong>건
        (<span th:text="${paginationInfo.currentPageNo}">1</span>/<span th:text="${paginationInfo.totalPageCount}">1</span> 페이지)
    </p>
</nav>
</body>
</html>
