<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qri.detail.title}">응답결과 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qri/EgovQustnrRespondInfoList.do}" th:text="#{survey.crumb.qri}">응답결과</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.detail}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-data"></i> <span th:text="#{survey.qri.detail.heading}">응답결과 상세</span></h1>
        <div class="text-muted" th:if="${r == null}" th:text="#{survey.empty.detail}">상세 데이터가 없습니다.</div>
        <div class="krds-table-wrap" th:if="${r != null}"><table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{survey.field.qestnrSj}">설문제목</th><td th:text="${r.qestnrsj}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.qestnCn}">질문내용</th><td th:text="${r.qestnCn}"></td></tr>
            <tr><th scope="row" th:text="#{survey.col.selectIem}">선택항목</th><td th:text="${r.iemCn}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.respondNm}">응답자명</th><td th:text="${r.respondNm}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.respondAnswerCn}">응답자답변내용</th><td style="white-space:pre-line;" th:text="${r.respondAnswerCn}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.etcAnswerCn}">기타답변내용</th><td style="white-space:pre-line;" th:text="${r.etcAnswerCn}"></td></tr>
            </tbody>
        </table></div>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/qri/EgovQustnrRespondInfoList.do}" th:text="#{survey.btn.list}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qri/EgovQustnrRespondInfoModify.do}" method="post">
                    <input type="hidden" name="qestnrQesrspnsId" th:value="${r.qestnrqesrspnsid}"/>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-pencil"></i> <span th:text="#{survey.btn.modify}">수정</span></button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qri/EgovQustnrRespondInfoDetail.do}" method="post"
                      th:onsubmit="'return confirm(\'' + #{survey.confirm.delete} + '\');'">
                    <input type="hidden" name="qestnrQesrspnsId" th:value="${r.qestnrqesrspnsid}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{survey.btn.delete}">삭제</span></button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
