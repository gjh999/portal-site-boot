spring.profiles.active=dev
spring.config.use-legacy-processing=true

# G4C 연결용 IP
Globals.LocalIp=127.0.0.1

# DB 타입(hsql,mysql,postgresql,oracle,altibase,tibero,cubrid) - DataSource 및 매퍼 파일 지정에 사용
# 개발: 내장 HSQL(별도 서버 불필요). 운영: postgresql 로 전환 후 DB 'pst' 생성.
Globals.DbType=hsql

# Page Config
Globals.pageUnit=10
Globals.pageSize=10

# File Config
Globals.posblAtchFileSize=10485760
Globals.fileStorePath=${user.dir}/files
Globals.addedOptions=false

# hsql (내장 임베디드)
Globals.hsql.DriverClassName=net.sf.log4jdbc.DriverSpy
Globals.hsql.Url=jdbc:log4jdbc:hsqldb:hsql://127.0.0.1/pstdb
Globals.hsql.UserName=sa
Globals.hsql.Password=

# mysql
Globals.mysql.DriverClassName=net.sf.log4jdbc.DriverSpy
Globals.mysql.Url=jdbc:log4jdbc:mysql://127.0.0.1:3306/pst
Globals.mysql.UserName=root
Globals.mysql.Password=

# postgresql (Globals.DbType=postgresql 로 전환 시 사용. DB 'pst' 생성 후 계정/비밀번호 설정)
Globals.postgresql.DriverClassName=org.postgresql.Driver
Globals.postgresql.Url=jdbc:postgresql://127.0.0.1:5432/pst
Globals.postgresql.UserName=postgres
Globals.postgresql.Password=

# oracle
Globals.oracle.DriverClassName=oracle.jdbc.driver.OracleDriver
Globals.oracle.Url=jdbc:oracle:thin:@127.0.0.1:1521:egovfrm
Globals.oracle.UserName=
Globals.oracle.Password=

# altibase
Globals.altibase.DriverClassName=Altibase.jdbc.driver.AltibaseDriver
Globals.altibase.Url=jdbc:Altibase://127.0.0.1:1721/egovfrm?encoding=UTF-8
Globals.altibase.UserName=
Globals.altibase.Password=

# tibero
Globals.tibero.DriverClassName=com.tmax.tibero.jdbc.TbDriver
Globals.tibero.Url=jdbc:tibero:thin:@127.0.0.1:1821:egovfrm
Globals.tibero.UserName=
Globals.tibero.Password=

# cubrid
Globals.cubrid.DriverClassName=cubrid.jdbc.driver.CUBRIDDriver
Globals.cubrid.Url=jdbc:cubrid:127.0.0.1:33000:pst:::?charset=utf-8
Globals.cubrid.UserName=
Globals.cubrid.Password=

# MainPage
Globals.MainPage=/

# 파일 확장자 화이트리스트
Globals.fileUpload.Extensions.Images=.gif.jpg.jpeg.png
Globals.fileUpload.Extensions=.gif.jpg.jpeg.png.xls.xlsx.pdf.doc.docx.ppt.pptx.hwp.hwpx.txt.zip

# CORS
Globals.Allow.Origin=http://localhost:3000,http://localhost:8080

# 파일 업로드 크기 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 암복호화 알고리즘 키 (운영 시 환경변수 EGOV_CRYPTO_KEY 로 교체, 16자 이상)
Globals.crypto.algoritm=${EGOV_CRYPTO_KEY:egovframe}

# 서버
server.servlet.context-path=/
server.port=18080
server.servlet.session.timeout=3600
spring.mvc.pathmatch.matching-strategy=ant-path-matcher

# Logging
logging.root.level=INFO
logging.file.name=backend
logging.file.path=./log
logging.rollingpolicy.maxFileSize=10MB
logging.rollingpolicy.maxHistory=30

# Swagger
springdoc.version=v5.0.0
springdoc.packages-to-scan=egovframework
springdoc.swagger-ui.doc-expansion=none
springdoc.api-docs.path=/v3/api-docs
