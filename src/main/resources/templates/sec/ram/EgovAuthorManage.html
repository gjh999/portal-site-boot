<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.author.title}">권한관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.author.title}">권한관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-check"></i> <span th:text="#{sec.author.title}">권한관리</span></h1>

        <!-- 검색 영역 (게시판 목록 표준) — 권한명 (searchCondition=1 고정) -->
        <form th:action="@{/sec/ram/EgovAuthorList.do}" method="get" class="search-bar krds-search mb-3">
            <input type="hidden" name="searchCondition" value="1"/>
            <div class="row g-2 align-items-end">
                <div class="col-md-9">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchKeyword" th:text="#{sec.author.name}">권한명</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                                   th:value="${authorManageVO != null ? authorManageVO.searchKeyword : ''}"
                                   th:placeholder="#{search.keyword.placeholder}" placeholder="검색어를 입력하세요" maxlength="35"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 + 등록 버튼(우측) -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted"><span th:text="#{common.total}">전체</span> <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong><span th:text="#{common.unit.case}">건</span></span>
            <a class="krds-btn primary small" th:href="@{/sec/ram/EgovAuthorInsertView.do}">
                <i class="bi bi-plus-lg"></i> <span th:text="#{sec.author.register}">권한 등록</span></a>
        </div>

        <form id="listForm" th:action="@{/sec/ram/EgovAuthorListDelete.do}" method="post">
            <input type="hidden" name="authorCodes" id="authorCodes"/>
            <div class="krds-table-wrap">
            <table class="tbl">
                <thead><tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll" th:title="#{sec.col.selectAll}" title="전체선택"/></th>
                    <th scope="col" th:text="#{sec.author.code}">권한코드</th><th scope="col" th:text="#{sec.author.name}">권한명</th><th scope="col" th:text="#{sec.author.desc}">설명</th><th scope="col" style="width:140px;" th:text="#{sec.col.creatDe}">생성일</th><th scope="col" style="width:120px;"></th>
                </tr></thead>
                <tbody>
                <tr th:each="item : ${authorList}">
                    <td><input type="checkbox" class="rowChk" th:attr="data-code=${item.authorCode}" th:title="#{sec.col.select}" title="선택"/></td>
                    <td th:text="${item.authorCode}">코드</td>
                    <td th:text="${item.authorNm}">권한명</td>
                    <td th:text="${item.authorDc}">설명</td>
                    <td class="text-center" th:text="${item.authorCreatDe}">생성일</td>
                    <td class="text-end">
                        <a class="krds-btn tertiary small" th:href="@{/sec/ram/EgovAuthor.do(authorCode=${item.authorCode})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(authorList)}"><td colspan="6" class="text-center text-muted py-4" th:text="#{sec.author.empty}">등록된 권한이 없습니다.</td></tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <button type="button" class="krds-btn danger small" onclick="deleteChecked()">
                    <i class="bi bi-trash"></i> <span th:text="#{sec.btn.deleteSelected}">선택 삭제</span></button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sec/ram/EgovAuthorRoleListView.do}">
                        <i class="bi bi-shield-lock"></i> <span th:text="#{sec.authorRole.title}">권한별 롤 관리</span></a>
                    <a class="krds-btn tertiary small" th:href="@{/sec/rgm/EgovAuthorGroupListView.do}">
                        <i class="bi bi-person-badge"></i> <span th:text="#{sec.authorGroup.title}">사용자별 권한 관리</span></a>
                    <a class="krds-btn primary small" th:href="@{/sec/ram/EgovAuthorInsertView.do}">
                        <i class="bi bi-plus-lg"></i> <span th:text="#{sec.author.register}">권한 등록</span></a>
                </div>
            </div>
        </form>
        <!-- (권한별 롤 / 사용자별 권한 관리는 보조 액션으로 표 하단 우측 유지) -->

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sec/ram/EgovAuthorList.do', searchCondition=${authorManageVO != null ? authorManageVO.searchCondition : ''}, searchKeyword=${authorManageVO != null ? authorManageVO.searchKeyword : ''})}"></div>
    </div>
    <script th:inline="javascript">
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function deleteChecked() {
            var codes = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                codes.push(c.getAttribute('data-code'));
            });
            if (codes.length === 0) { alert(/*[[#{sec.author.alert.selectDelete}]]*/ '삭제할 권한을 선택하세요.'); return; }
            if (!confirm(/*[[#{sec.author.confirm.delete}]]*/ '선택한 권한을 삭제하시겠습니까?')) return;
            document.getElementById('authorCodes').value = codes.join(';');
            document.getElementById('listForm').submit();
        }
    </script>
</main>
</body>
</html>
