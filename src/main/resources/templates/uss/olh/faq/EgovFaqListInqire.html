<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>FAQ</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item active">FAQ</li>
            </ol>
        </nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-question-circle"></i> 자주 묻는 질문</h1>
            <span class="text-muted small">총 <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</span>
        </div>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/faq/FaqListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="조회조건 선택">
                    <option value="">선택</option>
                    <option value="qestnSj" th:selected="${searchVO.searchCondition == 'qestnSj'}">질문제목</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <div class="accordion" id="faqAccordion">
            <div class="accordion-item" th:each="item, st : ${resultList}">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            th:data-bs-target="'#faq' + ${st.index}">
                        <span class="krds-badge bg-primary me-2">Q</span>
                        <span th:text="${item.qestnSj}">질문</span>
                    </button>
                </h2>
                <div class="accordion-collapse collapse" th:id="'faq' + ${st.index}"
                     data-bs-parent="#faqAccordion">
                    <div class="accordion-body">
                        <p class="text-muted" th:text="${item.qestnCn}">질문 내용</p>
                        <hr/>
                        <p class="mb-0"><span class="krds-badge bg-success me-2">A</span>
                            <span th:utext="${item.answerCn}">답변</span></p>
                        <div class="text-end mt-2">
                            <a class="krds-btn tertiary small"
                               th:href="@{/uss/olh/faq/FaqInqireCoUpdt.do(faqId=${item.faqId},pageIndex=${searchVO.pageIndex})}">
                                <i class="bi bi-box-arrow-up-right"></i> 상세보기</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center text-muted py-4" th:if="${#lists.isEmpty(resultList)}">
                등록된 FAQ가 없습니다.
            </div>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/faq/FaqListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end mt-3" sec:authorize="hasRole('ADMIN')">
            <a class="krds-btn primary small" th:href="@{/uss/olh/faq/FaqCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> FAQ 등록
            </a>
        </div>
    </div>
</main>
</body>
</html>
