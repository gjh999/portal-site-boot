<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.manage} + ' ' + #{qna.realnm.title}">Q&amp;A 작성 본인확인 (관리자)</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:560px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{qna.manage}">Q&amp;A 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.realnm.title}">본인확인</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-badge"></i> <span th:text="#{qna.realnm.heading}">질문 작성 본인확인</span></h1>
        <p class="text-muted" th:text="#{qna.realnm.intro}">질문을 작성하려면 로그인하거나 실명확인이 필요합니다.</p>
        <div class="d-grid gap-2">
            <a class="krds-btn primary" th:href="@{/uat/uia/egovLoginUsr.do}">
                <i class="bi bi-box-arrow-in-right"></i> <span th:text="#{qna.realnm.login}">로그인 후 작성</span></a>
            <a class="krds-btn secondary" th:href="@{/uss/olh/qna/admin/QnaCnRegistView.do}">
                <i class="bi bi-pencil"></i> <span th:text="#{qna.realnm.goWrite}">질문 작성으로 이동</span></a>
            <a class="krds-btn tertiary" th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{button.cancel}">취소</a>
        </div>
    </div>
</main>
</body>
</html>
