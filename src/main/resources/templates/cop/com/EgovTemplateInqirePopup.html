<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>템플릿 목록</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}"/>
</head>
<body class="p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h5 mb-0">템플릿 선택</h1>
        <button type="button" class="btn-close" aria-label="닫기" title="닫기" onclick="fn_egov_cancel_popup();"></button>
    </div>

    <form class="row g-2 mb-3" th:action="@{/cop/com/selectTemplateInfsPop.do}" method="get">
        <div class="col-auto">
            <select class="krds-form-select form-select-sm" name="searchCnd" title="검색조건">
                <option value="0" th:selected="${searchVO != null and searchVO.searchCnd == '0'}">템플릿명</option>
                <option value="1" th:selected="${searchVO != null and searchVO.searchCnd == '1'}">템플릿구분</option>
            </select>
        </div>
        <div class="col-auto">
            <input class="krds-input form-control-sm" type="text" name="searchWrd" maxlength="35" title="검색어"
                   th:value="${searchVO != null ? searchVO.searchWrd : ''}" placeholder="검색어"/>
        </div>
        <div class="col-auto">
            <button class="krds-btn secondary small" type="submit"><i class="bi bi-search"></i> 조회</button>
        </div>
        <div class="col-auto ms-auto">
            <span class="text-muted small">총 <strong th:text="${resultCnt ?: 0}">0</strong> 건</span>
        </div>
    </form>

    <div class="krds-table-wrap">
    <table class="tbl table-sm">
        <thead>
        <tr>
            <th scope="col">템플릿 명</th>
            <th scope="col">경로</th>
            <th scope="col" style="width:90px;">선택</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${resultList}">
            <td th:text="${item.tmplatNm}">명</td>
            <td class="small text-muted" th:text="${item.tmplatCours}">경로</td>
            <td class="text-center">
                <button type="button" class="krds-btn primary small"
                        th:attr="data-id=${item.tmplatId},data-nm=${item.tmplatNm}"
                        onclick="selectTmplat(this)">선택</button>
            </td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
            <td colspan="3" class="text-center text-muted">데이터가 없습니다.</td>
        </tr>
        </tbody>
    </table>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(paginationInfo=${paginationInfo}, baseUrl='/cop/com/selectTemplateInfsPop.do', searchCnd=${searchVO != null ? searchVO.searchCnd : ''}, searchWrd=${searchVO != null ? searchVO.searchWrd : ''})}"></div>

    <script>
        /* 부모창 콜백으로 "tmplatId|tmplatNm" 전달 */
        function selectTmplat(btn) {
            var id = btn.getAttribute('data-id');
            var nm = btn.getAttribute('data-nm');
            try {
                if (window.parent && typeof window.parent.showModalDialogCallback === 'function') {
                    window.parent.showModalDialogCallback(id + '|' + nm);
                } else if (window.opener && typeof window.opener.showModalDialogCallback === 'function') {
                    window.opener.showModalDialogCallback(id + '|' + nm);
                    window.close();
                }
            } catch (e) {
                // ignore cross-window errors
            }
        }

        function fn_egov_cancel_popup() {
            try {
                if (window.parent && typeof window.parent.fn_egov_modal_remove === 'function') {
                    window.parent.fn_egov_modal_remove();
                } else {
                    window.close();
                }
            } catch (e) { window.close(); }
        }
    </script>
</body>
</html>
