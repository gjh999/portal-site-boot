<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{cal.title}">일반달력</title></head>
<body>
<main layout:fragment="content">
    <div class="container"
         th:with="first=${resultList != null and !#lists.isEmpty(resultList) ? resultList[0] : null},
                  rows=${resultList != null ? (#lists.size(resultList) / 7) : 0}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{cal.title}">일반달력</li>
        </ol></nav>

        <div class="d-flex align-items-center justify-content-between mb-3" th:if="${first != null}"
             th:with="im=${#conversions.convert(first.month, 'java.lang.Integer')}">
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cmm/EgovselectNormalCalendar.do(year=${first.year}, month=${im - 1})}">
                <i class="bi bi-chevron-left"></i> <span th:text="#{cal.prevMonth}">이전달</span></a>
            <h1 class="h4 mb-0"><span th:text="${first.year}">2026</span><span th:text="#{cal.year.suffix}">년</span> <span th:text="${first.month}">6</span><span th:text="#{cal.month.suffix}">월</span></h1>
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cmm/EgovselectNormalCalendar.do(year=${first.year}, month=${im + 1})}">
                <span th:text="#{cal.nextMonth}">다음달</span> <i class="bi bi-chevron-right"></i></a>
        </div>

        <table class="tbl text-center align-middle" style="table-layout:fixed;">
            <thead>
            <tr>
                <th scope="col" class="text-danger" th:text="#{cal.dow.sun}">일</th><th scope="col" th:text="#{cal.dow.mon}">월</th><th scope="col" th:text="#{cal.dow.tue}">화</th><th scope="col" th:text="#{cal.dow.wed}">수</th><th scope="col" th:text="#{cal.dow.thu}">목</th><th scope="col" th:text="#{cal.dow.fri}">금</th>
                <th scope="col" class="text-primary" th:text="#{cal.dow.sat}">토</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${#numbers.sequence(0, rows - 1)}">
                <td th:each="c : ${#numbers.sequence(0, 6)}"
                    th:with="cell=${resultList[r * 7 + c]}"
                    th:classappend="${c == 0} ? ' text-danger' : (${c == 6} ? ' text-primary' : '')"
                    style="height:64px; vertical-align:top;">
                    <span th:text="${cell.day}"></span>
                </td>
            </tr>
            <tr th:if="${first == null}"><td colspan="7" class="text-muted py-4" th:text="#{cal.empty}">달력 데이터가 없습니다.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
