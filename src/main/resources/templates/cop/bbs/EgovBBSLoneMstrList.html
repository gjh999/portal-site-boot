<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>단독 게시판 마스터 목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">단독 게시판 마스터 목록</li>
        </ol></nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-grid-1x2"></i> 단독 게시판 마스터 목록</h1>
            <span class="text-muted small">총 <strong th:text="${resultCnt}">0</strong> 건</span>
        </div>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;">번호</th>
                <th scope="col">게시판명</th>
                <th scope="col" style="width:140px;">유형</th>
                <th scope="col" style="width:140px;">속성</th>
                <th scope="col" style="width:80px;">사용</th>
                <th scope="col" style="width:130px;">등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td class="text-center" th:text="${item.bbsId}">BBS_0001</td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/cop/bbs/selectBoardMaster.do(bbsId=${item.bbsId})}"
                       th:text="${item.bbsNm}">게시판명</a>
                </td>
                <td th:text="${item.bbsTyCodeNm}">유형</td>
                <td th:text="${item.bbsAttrbCodeNm}">속성</td>
                <td class="text-center">
                    <span class="krds-badge" th:classappend="${item.useAt == 'Y'} ? 'bg-success' : 'bg-secondary'"
                          th:text="${item.useAt == 'Y'} ? '사용' : '미사용'">사용</span>
                </td>
                <td class="text-center" th:text="${item.frstRegisterPnttm}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="6" class="text-center text-muted py-4">등록된 게시판 마스터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <div class="text-end" sec:authorize="isAuthenticated()">
            <a class="krds-btn primary small" th:href="@{/cop/bbs/addBoardMaster.do}">
                <i class="bi bi-plus-lg"></i> 등록
            </a>
        </div>
    </div>
</main>
</body>
</html>
