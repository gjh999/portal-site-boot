<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{zip.detail}">우편번호 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{zip.manage}">우편번호 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{zip.crumb.detail}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> <span th:text="#{zip.detail}">우편번호 상세</span></h1>

        <div th:if="${result == null}" class="alert alert-warning" th:text="#{zip.empty.detail}">상세 데이터가 없습니다.</div>

        <div class="krds-table-wrap" th:if="${result != null}"><table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{zip.col.zip}">우편번호</th><td th:text="${result.zip}">우편번호</td></tr>
            <tr><th scope="row" th:text="#{zip.label.sn}">일련번호</th><td th:text="${result.sn}">0</td></tr>
            <tr><th scope="row" th:text="#{zip.label.ctprvn}">시도명</th><td th:text="${result.ctprvnNm}">시도</td></tr>
            <tr><th scope="row" th:text="#{zip.label.signgu}">시군구명</th><td th:text="${result.signguNm}">시군구</td></tr>
            <tr><th scope="row" th:text="#{zip.label.emd}">읍면동명</th><td th:text="${result.emdNm}">읍면동</td></tr>
            <tr><th scope="row" th:text="#{zip.label.buld}">리/건물명</th><td th:text="${result.liBuldNm}">건물</td></tr>
            <tr><th scope="row" th:text="#{zip.label.lnbr}">번지/동호</th><td th:text="${result.lnbrDongHo}">번지</td></tr>
            </tbody>
        </table></div>

        <div class="d-flex gap-2" th:if="${result != null}">
            <a class="krds-btn tertiary" th:href="@{/sym/ccm/zip/EgovCcmZipList.do}"><i class="bi bi-list"></i> <span th:text="#{button.list}">목록</span></a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" class="krds-btn primary"
               th:href="@{/sym/ccm/zip/EgovCcmZipModify.do(zip=${result.zip}, sn=${result.sn})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" class="krds-btn danger"
               th:href="@{/sym/ccm/zip/EgovCcmZipRemove.do(zip=${result.zip}, sn=${result.sn})}"
               th:onclick="|return confirm('#{zip.confirm.delete}');|"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></a>
        </div>
    </div>
</main>
</body>
</html>
