<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qqm.list.title}">설문문항 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.qqm.list.heading}">설문문항 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-card-list"></i> <span th:text="#{survey.qqm.list.heading}">설문문항 관리</span></h1>
        <div class="krds-table-wrap"><table class="tbl">
            <thead><tr>
                <th scope="col" style="width:60px;" th:text="#{survey.label.no}">번호</th>
                <th scope="col" style="width:80px;" th:text="#{survey.col.qestnSn}">문항순서</th>
                <th scope="col" th:text="#{survey.col.qestnCn}">문항내용</th>
                <th scope="col" style="width:90px;" th:text="#{survey.col.qestnTy}">질문유형</th>
                <th scope="col" style="width:100px;" th:text="#{survey.col.mxmmChoise}">최대선택수</th>
                <th scope="col" style="width:120px;" th:text="#{survey.label.register}">등록자</th>
                <th scope="col" style="width:120px;" th:text="#{survey.label.regdate}">등록일</th>
            </tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td class="text-center" th:text="${item['qestnsn']}">1</td>
                <td><a th:href="@{/uss/olp/qqm/EgovQustnrQestnManageDetail.do(qestnrQesitmId=${item['qestnrqesitmid']})}" th:text="${item['qestncn']}">문항내용</a></td>
                <td class="text-center" th:text="${item['qestntycode']}">유형</td>
                <td class="text-center" th:text="${item['mxmmchoiseco']}">0</td>
                <td class="text-center" th:text="${item['frstregisternm']}">등록자</td>
                <td class="text-center" th:text="${item['frstregistpnttm']}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="7" class="text-center text-muted py-4" th:text="#{survey.empty.qqm}">등록된 설문문항이 없습니다.</td></tr>
            </tbody>
        </table></div>
        <div class="text-end"><a class="krds-btn primary small" th:href="@{/uss/olp/qqm/EgovQustnrQestnManageRegist.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{survey.btn.registQuestion}">문항 등록</span></a></div>
    </div>
</main>
</body>
</html>
