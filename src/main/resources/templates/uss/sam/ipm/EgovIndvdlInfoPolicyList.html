<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>개인정보처리방침</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">개인정보처리방침</li>
        </ol></nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-shield-lock"></i> 개인정보처리방침</h1>
            <span class="text-muted small">총 <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</span>
        </div>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/sam/ipm/listIndvdlInfoPolicy.do}" method="get">
            <div class="col-auto">
                <select class="form-select form-select-sm" name="searchCondition" title="검색조건 선택">
                    <option value="">선택</option>
                    <option value="INDVDL_INFO_POLICY_NM"
                            th:selected="${searchVO.searchCondition == 'INDVDL_INFO_POLICY_NM'}">개인정보보호정책명</option>
                    <option value="INDVDL_INFO_POLICY_CN"
                            th:selected="${searchVO.searchCondition == 'INDVDL_INFO_POLICY_CN'}">개인정보보호정책설명</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="form-control form-control-sm" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="btn btn-secondary btn-sm" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <table class="table table-hover align-middle">
            <caption class="visually-hidden">개인정보보호정책 목록</caption>
            <thead class="table-light">
            <tr>
                <th scope="col" style="width:70px;" class="text-center">순번</th>
                <th scope="col" style="width:110px;" class="text-center">동의여부</th>
                <th scope="col">개인정보보호정책명</th>
                <th scope="col" style="width:130px;" class="text-center">등록자</th>
                <th scope="col" style="width:120px;" class="text-center">등록일자</th>
            </tr>
            </thead>
            <tbody>
            <!-- egovMap 키: 언더스코어 없는 별칭은 전부 소문자 키가 된다 (indvdlinfoid 등) -->
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${paginationInfo.firstRecordIndex + st.count}">1</td>
                <td class="text-center">
                    <span class="badge"
                          th:classappend="${item.indvdlinfoyn == 'Y'} ? 'bg-success' : 'bg-secondary'"
                          th:text="${item.indvdlinfoyn == 'Y'} ? '예' : '아니오'">동의여부</span>
                </td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/sam/ipm/detailIndvdlInfoPolicy.do(indvdlInfoId=${item.indvdlinfoid},pageIndex=${searchVO.pageIndex})}"
                       th:text="${item.indvdlinfonm}">정책명</a>
                </td>
                <td class="text-center"
                    th:text="${item.frstregisternm != null ? item.frstregisternm : item.frstregisterid}">등록자</td>
                <td class="text-center" th:text="${item.frstregistpnttm}">등록일자</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4">등록된 개인정보처리방침이 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/sam/ipm/listIndvdlInfoPolicy.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end mt-3" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-primary btn-sm" th:href="@{/uss/sam/ipm/registIndvdlInfoPolicy.do}">
                <i class="bi bi-plus-lg"></i> 방침 등록
            </a>
        </div>
    </div>
</main>
</body>
</html>
