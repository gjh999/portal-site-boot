<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>배너 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/ion/bnr/selectBannerList.do}">배너관리</a></li>
            <li class="breadcrumb-item active">배너 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-image"></i> 배너 등록</h1>
        <form th:action="@{/uss/ion/bnr/addBanner.do}" th:object="${banner}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">배너명 <span class="text-danger">*</span></label>
                <input class="form-control" type="text" th:field="*{bannerNm}" maxlength="30" required autofocus/>
                <div class="text-danger small" th:if="${#fields.hasErrors('bannerNm')}" th:errors="*{bannerNm}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">링크 URL <span class="text-danger">*</span></label>
                <input class="form-control" type="text" th:field="*{linkUrl}" maxlength="255" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('linkUrl')}" th:errors="*{linkUrl}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">배너 이미지</label>
                <input class="form-control" type="file" name="file_1"/>
            </div>
            <div class="mb-3">
                <label class="form-label">배너 설명</label>
                <input class="form-control" type="text" th:field="*{bannerDc}" maxlength="100"/>
            </div>
            <div class="mb-3">
                <label class="form-label">정렬순서 <span class="text-danger">*</span></label>
                <input class="form-control" type="number" th:field="*{sortOrdr}" min="0" value="1" required/>
                <div class="text-danger small" th:if="${#fields.hasErrors('sortOrdr')}" th:errors="*{sortOrdr}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">반영여부</label>
                <select class="form-select" th:field="*{reflctAt}">
                    <option value="Y">Y</option>
                    <option value="N">N</option>
                </select>
            </div>
            <div class="d-flex justify-content-between">
                <a class="btn btn-outline-secondary" th:href="@{/uss/ion/bnr/selectBannerList.do}">목록</a>
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
