<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문템플릿 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}">설문템플릿</a></li>
            <li class="breadcrumb-item active">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-image"></i> 설문템플릿 상세</h1>
        <div class="text-muted" th:if="${r == null}">상세 데이터가 없습니다.</div>
        <div class="krds-table-wrap" th:if="${r != null}"><table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;">템플릿유형</th><td th:text="${r.qestnrtmplatty}"></td></tr>
            <tr><th scope="row">이미지</th><td><img style="max-height:60px;" th:src="@{/uss/olp/qtm/EgovQustnrTmplatManageImg.do(qestnrTmplatId=${r.qestnrtmplatid})}" alt="템플릿 이미지"/></td></tr>
            <tr><th scope="row">템플릿 설명</th><td style="white-space:pre-line;" th:text="${r.qestnrtmplatcn}"></td></tr>
            <tr><th scope="row">템플릿파일(경로)</th><td th:text="${r.qestnrtmplatcours}"></td></tr>
            </tbody>
        </table></div>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qtm/EgovQustnrTmplatManageModify.do}" method="post">
                    <input type="hidden" name="qestnrTmplatId" th:value="${r.qestnrtmplatid}"/>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-pencil"></i> 수정</button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qtm/EgovQustnrTmplatManageDetail.do}" method="post"
                      onsubmit="return confirm('삭제하시겠습니까?');">
                    <input type="hidden" name="qestnrTmplatId" th:value="${r.qestnrtmplatid}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> 삭제</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
