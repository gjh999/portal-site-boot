<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.manage} + ' ' + #{qna.pwd.confirm}">Q&amp;A 비밀번호 확인 (관리자)</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:520px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{qna.manage}">Q&amp;A 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.pwd.confirm}">비밀번호 확인</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-shield-lock"></i> <span th:text="#{qna.pwd.confirm.heading}">작성 비밀번호 확인</span></h1>
        <div class="alert alert-warning" th:if="${param.passwordConfirmAt != null and param.passwordConfirmAt[0] == 'N'}" th:text="#{qna.pwd.confirm.mismatch.retry}">
            비밀번호가 일치하지 않습니다. 다시 입력해 주세요.
        </div>
        <form th:action="@{/uss/olh/qna/admin/QnaPasswordConfirm.do}" method="post">
            <input type="hidden" name="qaId" th:value="${param.qaId}"/>
            <div class="mb-3">
                <label class="form-label" th:text="#{qna.pwd.input.label}">작성 시 입력한 비밀번호</label>
                <input class="krds-input" type="password" name="writngPassword" required autofocus/>
            </div>
            <div class="d-flex justify-content-between">
                <a class="krds-btn tertiary" th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{button.cancel}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.confirm}">확인</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
