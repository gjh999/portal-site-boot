<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qrm.detail.title}">응답자정보 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}" th:text="#{survey.crumb.qrm}">응답자관리</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.detail}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-lines-fill"></i> <span th:text="#{survey.qrm.detail.heading}">응답자정보 상세</span></h1>
        <div class="text-muted" th:if="${r == null}" th:text="#{survey.empty.detail}">상세 데이터가 없습니다.</div>
        <div class="krds-table-wrap" th:if="${r != null}">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{survey.field.qestnrSj}">설문제목</th><td th:text="${r.qestnrSj}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.sexdstn}">성별</th><td><span th:each="c : ${comCode014}" th:if="${c.code == r.sexdstnCode}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th scope="row" th:text="#{survey.field.occp}">직업</th><td><span th:each="c : ${comCode034}" th:if="${c.code == r.occpTyCode}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th scope="row" th:text="#{survey.col.brthdy}">생년월일</th><td th:text="${r.brthdy}"></td></tr>
            <tr><th scope="row" th:text="#{survey.col.respondNmFull}">응답자명</th><td th:text="${r.respondNm}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.telno}">전화번호</th><td><span th:text="${r.areaNo}"></span>-<span th:text="${r.middleTelno}"></span>-<span th:text="${r.endTelno}"></span></td></tr>
            </tbody>
        </table>
        </div>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/qrm/EgovQustnrRespondManageList.do}" th:text="#{survey.btn.list}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qrm/EgovQustnrRespondManageModify.do}" method="post">
                    <input type="hidden" name="qestnrRespondId" th:value="${r.qestnrrespondid}"/>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-pencil"></i> <span th:text="#{survey.btn.modify}">수정</span></button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qrm/EgovQustnrRespondManageDetail.do}" method="post"
                      th:onsubmit="'return confirm(\'' + #{survey.confirm.delete} + '\');'">
                    <input type="hidden" name="qestnrRespondId" th:value="${r.qestnrrespondid}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{survey.btn.delete}">삭제</span></button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
