<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>롤관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">롤(Role)관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> 롤(Role) 관리</h1>
        <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th>롤코드</th><th>롤명</th><th>설명</th><th style="width:120px;">유형</th><th style="width:120px;"></th></tr></thead>
            <tbody>
            <tr th:each="item : ${roleList}">
                <td th:text="${item.roleCode}">코드</td>
                <td th:text="${item.roleNm}">롤명</td>
                <td th:text="${item.roleDc}">설명</td>
                <td class="text-center" th:text="${item.roleTyp}">유형</td>
                <td class="text-end">
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/sec/rmt/EgovRole.do(roleCode=${item.roleCode})}"><i class="bi bi-pencil"></i> 수정</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(roleList)}"><td colspan="5" class="text-center text-muted py-4">등록된 롤이 없습니다.</td></tr>
            </tbody>
        </table>
        <div class="text-end"><a class="btn btn-primary btn-sm" th:href="@{/sec/rmt/EgovRoleInsertView.do}"><i class="bi bi-plus-lg"></i> 롤 등록</a></div>
    </div>
</main>
</body>
</html>
