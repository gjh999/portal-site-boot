<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{terms.stplat.detail.heading}">이용약관 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/sam/terms/list.do(termsType='stplat')}" th:text="#{terms.stplat.title}">이용약관</a></li>
            <li class="breadcrumb-item active" th:text="#{terms.stplat.detail.crumb}">약관 상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-file-text"></i> <span th:text="#{terms.stplat.detail.heading}">이용약관 상세</span></h1>
        <div class="text-muted text-center py-5" th:if="${result == null}" th:text="#{terms.stplat.detail.empty}">상세 데이터가 없습니다.</div>
        <div th:if="${result != null}">
            <div class="krds-table-wrap">
            <table class="tbl col">
                <tbody>
                <tr>
                    <th scope="row" style="width:190px;" th:text="#{terms.stplat.col.nm}">이용약관명</th>
                    <td th:text="${result.useStplatNm}">약관명</td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{terms.stplat.col.cn}">이용약관내용</th>
                    <td><div style="white-space:pre-wrap;" th:text="${result.useStplatCn}">내용</div></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{terms.infoProvdAgreCn}">정보제공동의내용</th>
                    <td><div style="white-space:pre-wrap;" th:text="${result.infoProvdAgreCn}">동의내용</div></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{policy.col.regDe}">등록일자</th>
                    <td th:text="${result.lastUpdusrPnttm}">일자</td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <form th:action="@{/uss/sam/stp/StplatCnDelete.do}" method="post"
                      sec:authorize="hasRole('ADMIN')"
                      th:onsubmit="|return confirm('[[#{bbs.confirm.delete}]]');|">
                    <input type="hidden" name="useStplatId" th:value="${result.useStplatId}"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                </form>
                <div class="d-flex gap-2">
                    <a class="krds-btn primary" sec:authorize="hasRole('ADMIN')"
                       th:href="@{/uss/sam/stp/StplatCnUpdtView.do(useStplatId=${result.useStplatId})}">
                        <i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
                    <a class="krds-btn tertiary" th:href="@{/uss/sam/terms/list.do(termsType='stplat')}" th:text="#{button.list}">목록</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
