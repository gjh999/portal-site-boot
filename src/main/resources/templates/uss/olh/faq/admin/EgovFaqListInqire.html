<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>FAQ 관리목록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">FAQ 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-question-circle"></i> FAQ 관리목록</h1>
        <p class="text-muted">총 <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</p>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/faq/admin/FaqListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="조회조건 선택">
                    <option value="">선택</option>
                    <option value="qestnSj" th:selected="${searchVO.searchCondition == 'qestnSj'}">질문제목</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th style="width:80px;">번호</th>
                <th>질문</th>
                <th style="width:110px;">조회수</th>
                <th style="width:130px;">등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${item['faqId']}">번호</td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/olh/faq/admin/FaqListDetailInqire.do(faqId=${item['faqId']})}"
                       th:text="${item['qestnSj']}">질문</a>
                </td>
                <td class="text-center" th:text="${item['inqireCo'] ?: 0}">0</td>
                <td class="text-center" th:text="${item['frstRegistPnttm']}">등록일</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="4" class="text-center text-muted py-4">등록된 FAQ가 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/faq/admin/FaqListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>

        <div class="text-end">
            <a class="krds-btn primary small" th:href="@{/uss/olh/faq/admin/FaqCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> FAQ 등록
            </a>
        </div>
    </div>
</main>
</body>
</html>
