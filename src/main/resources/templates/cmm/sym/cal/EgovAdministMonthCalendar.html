<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{cal.administ.month}">행정달력 월간</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{cal.administ.month}">행정달력 월간</li>
        </ol></nav>

        <div class="d-flex align-items-center justify-content-between mb-3 cal-page-head" th:if="${restde != null}"
             th:with="im=${#conversions.convert(restde.month, 'java.lang.Integer')}">
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cal/EgovAdministMonthCalendar.do(year=${restde.year}, month=${im - 1})}">
                <i class="bi bi-chevron-left"></i> <span th:text="#{cal.prevMonth}">이전달</span></a>
            <h1 class="h4 mb-0"><i class="bi bi-calendar-month"></i>
                <span th:text="#{cal.heading.monthly.administ(${restde.year},${restde.month})}">2026년 6월 행정달력</span></h1>
            <a class="krds-btn tertiary small"
               th:href="@{/sym/cal/EgovAdministMonthCalendar.do(year=${restde.year}, month=${im + 1})}">
                <span th:text="#{cal.nextMonth}">다음달</span> <i class="bi bi-chevron-right"></i></a>
        </div>

        <div class="cal-toolbar d-flex justify-content-end gap-2 mb-2" th:if="${restde != null}">
            <a class="krds-btn secondary small" th:href="@{/sym/cal/EgovRestdeList.do}"><i class="bi bi-list-task"></i> <span th:text="#{cal.holiday.manage}">휴일관리</span></a>
            <button type="button" class="krds-btn tertiary small" onclick="window.print()"><i class="bi bi-printer"></i> <span th:text="#{cal.print}">인쇄</span></button>
        </div>
        <table class="cal-table" th:if="${restde != null}">
            <thead>
            <tr><th scope="col" class="sun" th:text="#{cal.dow.sun}">일</th><th scope="col" th:text="#{cal.dow.mon}">월</th><th scope="col" th:text="#{cal.dow.tue}">화</th><th scope="col" th:text="#{cal.dow.wed}">수</th><th scope="col" th:text="#{cal.dow.thu}">목</th><th scope="col" th:text="#{cal.dow.fri}">금</th><th scope="col" class="sat" th:text="#{cal.dow.sat}">토</th></tr>
            </thead>
            <tbody>
            <tr th:each="r : ${#numbers.sequence(0, 5)}">
                <td th:each="c : ${#numbers.sequence(0, 6)}"
                    th:with="dd=${r * 7 + c + 2 - restde.startWeekMonth}, dstr=${(dd lt 10 ? '0' : '') + dd}"
                    th:classappend="${c == 0} ? 'sun' : (${c == 6} ? 'sat' : '')">
                    <div class="cal-day" th:if="${dd ge 1 and dd le restde.lastDayMonth}">
                        <span class="cal-daynum" th:text="${dd}"></span>
                        <th:block th:each="rd : ${RestdeList}" th:if="${rd.day == dstr}">
                            <span class="cal-holiday" th:text="${rd.restdeNm}" th:title="${rd.restdeNm}"></span>
                        </th:block>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${restde == null}" class="alert alert-secondary" th:text="#{cal.empty.data}">표시할 달력 데이터가 없습니다.</div>

        <h2 class="h6 mt-4 cal-print-hide" th:text="#{cal.holiday.list}">휴일 목록</h2>
        <ul class="list-group cal-print-hide">
            <li class="list-group-item d-flex justify-content-between" th:each="rd : ${RestdeList}">
                <span th:text="${rd.restdeDe}">일자</span>
                <span th:text="${rd.restdeNm}">휴일명</span>
            </li>
            <li class="list-group-item text-muted text-center" th:if="${RestdeList == null or #lists.isEmpty(RestdeList)}" th:text="#{cal.holiday.none}">휴일이 없습니다.</li>
        </ul>
    </div>
</main>
</body>
</html>
