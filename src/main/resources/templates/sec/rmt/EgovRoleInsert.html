<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.role.register}">롤 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sec/rmt/EgovRoleListView.do}" th:text="#{sec.role.title}">롤관리</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.role.register}">롤 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> <span th:text="#{sec.role.registerFull}">롤(Role) 등록</span></h1>

        <form th:action="@{/sec/rmt/EgovRoleInsert.do}" method="post">
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <label class="form-label" for="roleNm"><span th:text="#{sec.role.name}">롤 명</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="roleNm" name="roleNm" maxlength="50" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rolePtn"><span th:text="#{sec.role.pattern}">롤 패턴</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="rolePtn" name="rolePtn" maxlength="50" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleDc" th:text="#{sec.role.desc}">설명</label>
                        <input type="text" class="krds-input" id="roleDc" name="roleDc" maxlength="50"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleTyp"><span th:text="#{sec.role.type}">롤 타입</span> <span class="text-danger">*</span></label>
                        <select class="krds-form-select" id="roleTyp" name="roleTyp">
                            <option th:each="c : ${cmmCodeDetailList}" th:value="${c.code}" th:text="${c.codeNm}">타입</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roleSort"><span th:text="#{sec.role.sort}">롤 Sort</span> <span class="text-danger">*</span></label>
                        <input type="text" class="krds-input" id="roleSort" name="roleSort" maxlength="50" required/>
                    </div>
                </div>
            </div>
            <div class="text-end mt-3">
                <a class="krds-btn tertiary small" th:href="@{/sec/rmt/EgovRoleListView.do}" th:text="#{button.list}">목록</a>
                <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
