<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qtm.regist.title}">설문템플릿 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}" th:text="#{survey.qtm.crumb}">설문템플릿</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.regist}">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-images"></i> <span th:text="#{survey.qtm.regist.heading}">설문템플릿 등록</span></h1>
        <form th:action="@{/uss/olp/qtm/EgovQustnrTmplatManageRegistActor.do}" th:object="${qustnrTmplatManageVO}" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatType}">템플릿유형</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" th:field="*{qestnrTmplatTy}" maxlength="100" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatTy')}" th:errors="*{qestnrTmplatTy}"></div></div>
                <div class="col-12"><label class="form-label" th:text="#{survey.qtm.field.imageJpeg}">템플릿유형 이미지(JPEG, 65x50)</label>
                    <input class="krds-input" type="file" name="qestnrTmplatImage" accept="image/*"/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatCn}">템플릿 설명</span> <span class="text-danger">*</span></label>
                    <textarea class="krds-input" rows="4" th:field="*{qestnrTmplatCn}" required></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatCn')}" th:errors="*{qestnrTmplatCn}"></div></div>
                <div class="col-12"><label class="form-label"><span th:text="#{survey.qtm.field.tmplatPath}">템플릿파일(경로)</span> <span class="text-danger">*</span></label>
                    <input class="krds-input" type="text" th:field="*{qestnrTmplatCours}" maxlength="100" required/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('qestnrTmplatCours')}" th:errors="*{qestnrTmplatCours}"></div></div>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/olp/qtm/EgovQustnrTmplatManageList.do}" th:text="#{survey.btn.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{survey.btn.save}">저장</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
