<!--
  EgovFileList.html : 첨부파일 목록 화면(JSP 원본 WEB-INF/jsp/cmm/fms/EgovFileList.jsp 의 <c:import> 대체)
  - updateFlag == 'Y' : 파일명 + 삭제 버튼(deleteFileInfs.do POST, returnUrl로 복귀)
  - updateFlag != 'Y' : 다운로드 링크(FileDown.do, 세션 암호화된 atchFileId 사용)
  - 사용법 1(프래그먼트, 권장): 호출 측 템플릿에서
      <div th:replace="~{cmm/fms/EgovFileList :: fileList(${fileList}, 'N', null, null)}"></div>
      <div th:replace="~{cmm/fms/EgovFileList :: fileList(${fileList}, 'Y', ${atchFileIdEnc}, '/복귀URL')}"></div>
    * fileList : FileVO 목록(조회모드는 각 항목의 atchFileId 가 세션 암호화되어 있어야 함)
    * atchFileId : 삭제 폼 전송용 암호화 atchFileId (EgovFileMngController.encrypt)
    * 주의: 수정모드(삭제 버튼)는 <form>을 포함하므로 다른 <form> 안쪽에 포함하지 말 것(중첩 form 금지)
  - 사용법 2(독립 URL): /cmm/fms/selectFileInfs.do, /cmm/fms/selectFileInfsForUpdate.do 가
    이 템플릿 전체를 반환한다(모델에 동일한 이름의 속성 제공).
-->
<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="fileList(fileList, updateFlag, atchFileId, returnUrl)">
    <th:block th:each="fileVO : ${fileList}">
        <!-- 수정 모드: 삭제 버튼 -->
        <div th:if="${updateFlag == 'Y'}" class="d-flex align-items-center gap-2 mb-1">
            <i class="bi bi-paperclip"></i>
            <span th:text="${fileVO.orignlFileNm}">파일명</span>
            <span class="text-muted small">[<span th:text="${fileVO.fileMg}">0</span>&nbsp;byte]</span>
            <form th:action="@{/cmm/fms/deleteFileInfs.do}" method="post" class="d-inline m-0"
                  onsubmit="return confirm('첨부파일을 삭제하시겠습니까?');">
                <input type="hidden" name="atchFileId" th:value="${atchFileId}"/>
                <input type="hidden" name="fileSn" th:value="${fileVO.fileSn}"/>
                <input type="hidden" name="returnUrl" th:value="${returnUrl}"/>
                <button type="submit" class="krds-btn danger small py-0">삭제</button>
            </form>
        </div>
        <!-- 조회 모드: 다운로드 링크 -->
        <div th:unless="${updateFlag == 'Y'}" class="mb-1">
            <i class="bi bi-paperclip"></i>
            <a class="text-decoration-none" target="_blank"
               th:href="@{/cmm/fms/FileDown.do(atchFileId=${fileVO.atchFileId},fileSn=${fileVO.fileSn})}"
               th:text="${fileVO.orignlFileNm}">파일명</a>
            <span class="text-muted small">[<span th:text="${fileVO.fileMg}">0</span>&nbsp;byte]</span>
        </div>
    </th:block>
    <div th:if="${fileList == null or #lists.isEmpty(fileList)}" class="text-muted small">
        첨부된 파일이 없습니다.
    </div>
</div>
