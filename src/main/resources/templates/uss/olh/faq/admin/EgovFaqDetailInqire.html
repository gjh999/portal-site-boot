<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>FAQ 상세 (관리자)</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/faq/admin/FaqListInqire.do}">FAQ 관리</a></li>
            <li class="breadcrumb-item active">상세</li>
        </ol></nav>
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <span><span class="badge bg-primary me-2">Q</span>
                    <strong th:text="${result.qestnSj}">질문</strong></span>
                <span class="text-muted small">
                    등록일 <span th:text="${result.frstRegisterPnttm}">등록일</span>
                    · 조회 <span th:text="${result.inqireCo ?: 0}">0</span>
                </span>
            </div>
            <div class="card-body">
                <p class="text-muted" th:text="${result.qestnCn}">질문 내용</p>
                <hr/>
                <p><span class="badge bg-success me-2">A</span><span th:utext="${result.answerCn}">답변</span></p>
                <div class="mt-3" th:if="${fileList != null and !#lists.isEmpty(fileList)}">
                    <strong class="small text-muted"><i class="bi bi-paperclip"></i> 첨부파일</strong>
                    <ul class="list-unstyled small mb-0">
                        <li th:each="file : ${fileList}">
                            <a th:href="@{/cmm/fms/FileDown.do(atchFileId=${file.atchFileId},fileSn=${file.fileSn})}"
                               th:text="${file.orignlFileNm}">파일명</a>
                            <span class="text-muted" th:text="'[' + ${file.fileMg} + ' byte]'">[크기]</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/uss/olh/faq/admin/FaqListInqire.do}"><i class="bi bi-list"></i> 목록</a>
            <div sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-outline-primary btn-sm"
                   th:href="@{/uss/olh/faq/admin/FaqCnUpdtView.do(faqId=${result.faqId})}"><i class="bi bi-pencil"></i> 수정</a>
                <a class="btn btn-outline-danger btn-sm"
                   th:href="@{/uss/olh/faq/admin/FaqCnDelete.do(faqId=${result.faqId},atchFileId=${result.atchFileId})}"
                   onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> 삭제</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
