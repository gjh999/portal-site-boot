<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{faq.title}">FAQ</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
                <li class="breadcrumb-item active" th:text="#{faq.title}">FAQ</li>
            </ol>
        </nav>
        <h1 class="h4 mb-3"><i class="bi bi-question-circle"></i> <span th:text="#{faq.heading}">자주 묻는 질문</span></h1>

        <!-- 검색조건 (총건수/페이징 UI는 요청에 따라 제거) -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/faq/FaqListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" th:title="#{bbs.search.cnd.select}">
                    <option value="" th:text="#{bbs.select.action}">선택</option>
                    <option value="qestnSj" th:selected="${searchVO.searchCondition == 'qestnSj'}" th:text="#{faq.search.cnd.qestnSj}">질문제목</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" th:title="#{search.keyword}"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <!-- FAQ 아코디언 (KRDS 네이티브: 질문 클릭 시 답변 인라인 펼침) -->
        <div class="krds-accordion" data-type="multiOpen">
            <div class="accordion-item" th:each="item, st : ${resultList}">
                <h2 class="accordion-header">
                    <button type="button" class="btn-accordion"
                            th:id="'faqHeader' + ${st.index}" th:aria-controls="'faqCollapse' + ${st.index}">
                        <span class="krds-badge bg-primary me-2">Q</span>
                        <span th:text="${item.qestnSj}">질문</span>
                    </button>
                </h2>
                <div class="accordion-collapse collapse" th:id="'faqCollapse' + ${st.index}"
                     th:aria-labelledby="'faqHeader' + ${st.index}">
                    <div class="accordion-body">
                        <p class="text-muted" th:text="${item.qestnCn}" th:if="${item.qestnCn != null and item.qestnCn != ''}">질문 내용</p>
                        <p class="mb-0"><span class="krds-badge bg-success me-2">A</span>
                            <span th:utext="${item.answerCn}">답변</span></p>
                    </div>
                </div>
            </div>
            <div class="text-center text-muted py-4" th:if="${#lists.isEmpty(resultList)}" th:text="#{faq.empty}">
                등록된 FAQ가 없습니다.
            </div>
        </div>

        <div class="text-end mt-3" sec:authorize="hasRole('ADMIN')">
            <a class="krds-btn primary small" th:href="@{/uss/olh/faq/FaqCnRegistView.do}">
                <i class="bi bi-pencil-square"></i> <span th:text="#{faq.regist}">FAQ 등록</span>
            </a>
        </div>
    </div>
</main>
</body>
</html>
