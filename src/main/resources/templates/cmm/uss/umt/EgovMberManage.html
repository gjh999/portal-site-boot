<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>회원관리</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
                <li class="breadcrumb-item active">회원관리</li>
            </ol>
        </nav>
        <h1 class="h4 mb-3"><i class="bi bi-people"></i> 회원관리</h1>

        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.insert'}">등록되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.update'}">수정되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.delete'}">삭제되었습니다.</div>

        <!-- 검색 영역 (게시판 목록 표준) — 회원구분/상태/검색구분/검색어 -->
        <form th:action="@{/uss/umt/mber/EgovMberManage.do}" method="get" class="search-bar krds-search mb-3"
              th:with="sttusList=${entrprsMberSttus_result}, ss=${userSearchVO.sbscrbSttus}, sc=${userSearchVO.searchCondition}, ut=${userSearchVO.userTy}">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="userTy">회원구분</label></div>
                        <div class="form-conts">
                            <select id="userTy" name="userTy" class="krds-form-select" title="회원구분 선택">
                                <option value="0" th:selected="${ut == '0' or ut == null}">전체</option>
                                <option value="USR01" th:selected="${ut == 'USR01'}">일반회원</option>
                                <option value="USR02" th:selected="${ut == 'USR02'}">기업회원</option>
                                <option value="USR03" th:selected="${ut == 'USR03'}">업무사용자</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="form-tit"><label for="sbscrbSttus">회원상태</label></div>
                        <div class="form-conts">
                            <select id="sbscrbSttus" name="sbscrbSttus" class="krds-form-select" title="회원상태 선택">
                                <option value="0" th:selected="${ss == '0'}">상태 전체</option>
                                <option value="A" th:selected="${ss == 'A'}">신청중</option>
                                <option value="P" th:selected="${ss == 'P'}">가입승인</option>
                                <option value="D" th:selected="${ss == 'D'}">가입삭제</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchCondition">검색구분</label></div>
                        <div class="form-conts">
                            <select id="searchCondition" name="searchCondition" class="krds-form-select" title="검색구분 선택">
                                <option value="" th:selected="${sc == ''}">선택</option>
                                <option value="0" th:selected="${sc == '0'}">아이디</option>
                                <option value="1" th:selected="${sc == '1'}">이름</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="form-group">
                        <div class="form-tit"><label for="searchKeyword">검색어</label></div>
                        <div class="form-conts">
                            <input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                                   th:value="${userSearchVO.searchKeyword}" placeholder="검색어를 입력하세요" maxlength="35"/>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> 검색</button>
                </div>
            </div>
        </form>

        <!-- 목록 헤더: 전체 건수 + 등록 버튼(우측) -->
        <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
            <span class="text-muted">전체 <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>건</span>
            <a class="krds-btn primary small" th:href="@{/uss/umt/mber/EgovMberInsertView.do}">
                <i class="bi bi-person-plus"></i> 회원 등록
            </a>
        </div>

        <form id="listForm" th:action="@{/uss/umt/mber/EgovMberDelete.do}" method="post">
            <input type="hidden" name="checkedIdForDel" id="checkedIdForDel"/>
            <input type="hidden" name="checkedIdForApprove" id="checkedIdForApprove"/>
            <div class="krds-table-wrap"><table class="tbl">
                <thead>
                <tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll" title="전체선택"/></th>
                    <th scope="col" style="width:110px;">회원구분</th>
                    <th scope="col">아이디</th>
                    <th scope="col">이름</th>
                    <th scope="col">이메일</th>
                    <th scope="col" style="width:100px;">상태</th>
                    <th scope="col" style="width:130px;">가입일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${resultList}">
                    <td>
                        <input type="checkbox" class="rowChk"
                               th:attr="data-id=${item.userty} + ':' + ${item.uniqid}, data-sttus=${item.sttus}" title="선택"/>
                    </td>
                    <td class="text-center">
                        <span th:text="${item.userty == 'USR01'} ? '일반회원' : (${item.userty == 'USR02'} ? '기업회원' : (${item.userty == 'USR03'} ? '업무사용자' : ${item.userty}))">회원구분</span>
                    </td>
                    <td>
                        <!-- 회원구분(userTy)별 알맞은 수정 화면으로 라우팅 -->
                        <a th:if="${item.userty == 'USR01'}" class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovMberSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                        <a th:if="${item.userty == 'USR02'}" class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovEntrprsMberSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                        <a th:if="${item.userty == 'USR03'}" class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovEmplyrSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                        <span th:unless="${item.userty == 'USR01' or item.userty == 'USR02' or item.userty == 'USR03'}" th:text="${item.userid}">아이디</span>
                    </td>
                    <td th:text="${item.usernm}">이름</td>
                    <td th:text="${item.emailadres}">이메일</td>
                    <td class="text-center">
                        <span class="krds-badge"
                              th:classappend="${item.sttus == 'P'} ? 'bg-success' : (${item.sttus == 'D'} ? 'bg-danger' : 'bg-gray')"
                              th:text="${item.sttus == 'A'} ? '신청중' : (${item.sttus == 'P'} ? '승인' : (${item.sttus == 'D'} ? '삭제' : ${item.sttus}))">상태</span>
                    </td>
                    <td class="text-center" th:text="${item.sbscrbde}">가입일</td>
                </tr>
                <tr th:if="${#lists.isEmpty(resultList)}">
                    <td colspan="7" class="text-center text-muted py-4">등록된 회원이 없습니다.</td>
                </tr>
                </tbody>
            </table></div>

            <div class="d-flex justify-content-start gap-2">
                <button type="button" class="krds-btn primary small" onclick="approveChecked()">
                    <i class="bi bi-check2-circle"></i> 선택 승인
                </button>
                <button type="button" class="krds-btn danger small" onclick="deleteChecked()">
                    <i class="bi bi-trash"></i> 선택 삭제
                </button>
            </div>
        </form>

        <!-- 페이징 (KRDS, 검색조건 유지: sbscrbSttus/searchCondition/searchKeyword) -->
        <nav aria-label="페이지 네비게이션" class="mt-3"
             th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
            <div class="krds-pagination">
                <span th:if="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev disabled">이전</span>
                <a th:unless="${paginationInfo.firstPageNoOnPageList == 1}" class="page-navi prev"
                   th:href="@{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.firstPageNoOnPageList - 1},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}">이전</a>
                <div class="page-links">
                    <th:block th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}">
                        <a class="page-link" th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                           th:href="@{/uss/umt/mber/EgovMberManage.do(pageIndex=${pageNo},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}">
                            <span th:if="${pageNo == paginationInfo.currentPageNo}" class="sr-only">현재페이지 </span>
                            <span th:text="${pageNo}">1</span>
                        </a>
                    </th:block>
                </div>
                <span th:if="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next disabled">다음</span>
                <a th:unless="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount}" class="page-navi next"
                   th:href="@{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.lastPageNoOnPageList + 1},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}">다음</a>
            </div>
        </nav>
    </div>
    <script th:inline="javascript">
        var APPROVE_URL = /*[[@{/uss/umt/mber/EgovMberApprove.do}]]*/ '/uss/umt/mber/EgovMberApprove.do';
        var DELETE_URL = /*[[@{/uss/umt/mber/EgovMberDelete.do}]]*/ '/uss/umt/mber/EgovMberDelete.do';
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function deleteChecked() {
            var ids = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                ids.push(c.getAttribute('data-id'));
            });
            if (ids.length === 0) { alert('삭제할 회원을 선택하세요.'); return; }
            if (!confirm('선택한 ' + ids.length + '명의 회원을 삭제하시겠습니까?')) return;
            var form = document.getElementById('listForm');
            document.getElementById('checkedIdForDel').value = ids.join(',');
            form.action = DELETE_URL;
            form.submit();
        }
        function approveChecked() {
            var ids = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                if (c.getAttribute('data-sttus') === 'A') {
                    ids.push(c.getAttribute('data-id'));
                }
            });
            if (ids.length === 0) { alert('승인대기(신청중) 상태의 회원을 선택하세요.'); return; }
            if (!confirm('선택한 ' + ids.length + '명의 회원을 승인하시겠습니까?')) return;
            var form = document.getElementById('listForm');
            document.getElementById('checkedIdForApprove').value = ids.join(',');
            form.action = APPROVE_URL;
            form.submit();
        }
    </script>
</main>
</body>
</html>
