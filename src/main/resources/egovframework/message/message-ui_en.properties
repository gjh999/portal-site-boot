# KRDS component sample
krds.sample.title=KRDS Component Examples
krds.intro.heading=KRDS Component Usage Examples
krds.intro.desc=A reference page built solely with <strong>native classes (<code>krds-*</code>)</strong> of the Korea Design System (KRDS). Copy each section's markup as-is when converting other screens to KRDS. (Tabs and accordions are powered by <code>krds.min.js</code>.)
krds.intro.box.label=About KRDS
krds.intro.box.heading=What is KRDS?
krds.intro.box.p1=<strong>KRDS (Korea Design System)</strong> is the <strong>official government-wide design system</strong> created by the Ministry of the Interior and Safety. It provides design principles, colors, typography, components, and design tokens as standards so that Korea's digital government services (web and app) deliver a consistent user experience (UI/UX), high <strong>web accessibility</strong>, and usability.
krds.intro.box.p2=<strong>What is it for?</strong> By codifying design elements (design tokens), it reduces communication costs between designers and developers and enables fast, consistent building and operation of public services with reusable HTML components.
krds.intro.link.official=KRDS Official Site
krds.intro.link.guide=Component Guide
krds.sec1.heading=1. Board List
krds.sec1.desc=A board list example composed of a KRDS data table (<code>table.tbl</code> + <code>krds-table-wrap</code>).
