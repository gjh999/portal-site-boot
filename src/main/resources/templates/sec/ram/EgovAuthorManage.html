<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>권한관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">권한관리</li>
        </ol></nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-shield-check"></i> 권한관리</h1>
            <span class="text-muted small">총 <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> 건</span>
        </div>

        <!-- 검색 (searchCondition=1: 권한명) -->
        <form class="row g-2 mb-3" th:action="@{/sec/ram/EgovAuthorList.do}" method="get">
            <input type="hidden" name="searchCondition" value="1"/>
            <div class="col-auto"><label class="col-form-label col-form-label-sm">권한명</label></div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${authorManageVO != null ? authorManageVO.searchKeyword : ''}" maxlength="35"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <form id="listForm" th:action="@{/sec/ram/EgovAuthorListDelete.do}" method="post">
            <input type="hidden" name="authorCodes" id="authorCodes"/>
            <div class="krds-table-wrap">
            <table class="tbl">
                <thead><tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll" title="전체선택"/></th>
                    <th scope="col">권한코드</th><th scope="col">권한명</th><th scope="col">설명</th><th scope="col" style="width:140px;">생성일</th><th scope="col" style="width:120px;"></th>
                </tr></thead>
                <tbody>
                <tr th:each="item : ${authorList}">
                    <td><input type="checkbox" class="rowChk" th:attr="data-code=${item.authorCode}" title="선택"/></td>
                    <td th:text="${item.authorCode}">코드</td>
                    <td th:text="${item.authorNm}">권한명</td>
                    <td th:text="${item.authorDc}">설명</td>
                    <td class="text-center" th:text="${item.authorCreatDe}">생성일</td>
                    <td class="text-end">
                        <a class="krds-btn tertiary small" th:href="@{/sec/ram/EgovAuthor.do(authorCode=${item.authorCode})}"><i class="bi bi-pencil"></i> 수정</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(authorList)}"><td colspan="6" class="text-center text-muted py-4">등록된 권한이 없습니다.</td></tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-between">
                <button type="button" class="krds-btn danger small" onclick="deleteChecked()">
                    <i class="bi bi-trash"></i> 선택 삭제</button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sec/ram/EgovAuthorRoleListView.do}">
                        <i class="bi bi-shield-lock"></i> 권한별 롤 관리</a>
                    <a class="krds-btn tertiary small" th:href="@{/sec/rgm/EgovAuthorGroupListView.do}">
                        <i class="bi bi-person-badge"></i> 사용자별 권한 관리</a>
                    <a class="krds-btn primary small" th:href="@{/sec/ram/EgovAuthorInsertView.do}">
                        <i class="bi bi-plus-lg"></i> 권한 등록</a>
                </div>
            </div>
        </form>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sec/ram/EgovAuthorList.do', searchCondition=${authorManageVO != null ? authorManageVO.searchCondition : ''}, searchKeyword=${authorManageVO != null ? authorManageVO.searchKeyword : ''})}"></div>
    </div>
    <script>
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function deleteChecked() {
            var codes = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                codes.push(c.getAttribute('data-code'));
            });
            if (codes.length === 0) { alert('삭제할 권한을 선택하세요.'); return; }
            if (!confirm('선택한 ' + codes.length + '건의 권한을 삭제하시겠습니까?')) return;
            document.getElementById('authorCodes').value = codes.join(';');
            document.getElementById('listForm').submit();
        }
    </script>
</main>
</body>
</html>
