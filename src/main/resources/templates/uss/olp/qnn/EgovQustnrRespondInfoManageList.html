<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>설문조사 참여</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">설문조사 참여</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-ui-checks"></i> 설문조사 참여</h1>
        <div class="krds-table-wrap"><table class="tbl">
            <thead><tr>
                <th scope="col" style="width:60px;">번호</th>
                <th scope="col">설문제목</th>
                <th scope="col">설문목적</th>
                <th scope="col" style="width:200px;">설문기간</th>
                <th scope="col" style="width:120px;">등록자</th>
                <th scope="col" style="width:120px;">등록일</th>
            </tr></thead>
            <tbody>
            <tr th:each="item, st : ${resultList}">
                <td class="text-center" th:text="${st.count}">1</td>
                <td><a th:href="@{/uss/olp/qnn/EgovQustnrRespondInfoManageRegist.do(qestnrId=${item['qestnrid']},qestnrTmplatId=${item['qestnrtmplatid']})}" th:text="${item['qestnrsj']}">설문제목</a></td>
                <td th:text="${item['qestnrpurps']}">목적</td>
                <td class="text-center"><span th:text="${item['qestnrbeginde']}">시작</span> ~ <span th:text="${item['qestnrendde']}">종료</span></td>
                <td class="text-center" th:text="${item['frstregisternm']}">등록자</td>
                <td class="text-center" th:text="${item['frstregistpnttm']}">등록일</td>
            </tr>
            <tr th:if="${#lists.isEmpty(resultList)}"><td colspan="6" class="text-center text-muted py-4">진행 중인 설문조사가 없습니다.</td></tr>
            </tbody>
        </table></div>
    </div>
</main>
</body>
</html>
