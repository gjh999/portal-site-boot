<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>Q&amp;A</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active">Q&amp;A</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-dots"></i> 묻고 답하기 (Q&amp;A)</h1>
        <p class="text-muted mb-4">궁금한 점을 질문하고 답변을 받아보세요.</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5 class="card-title"><i class="bi bi-list-ul"></i> Q&amp;A 목록</h5>
                        <p class="card-text text-muted">등록된 질문과 답변을 조회합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/uss/olh/qna/QnaListInqire.do}">Q&amp;A 보기</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5 class="card-title"><i class="bi bi-pencil-square"></i> 질문 등록</h5>
                        <p class="card-text text-muted">새로운 질문을 등록합니다.</p>
                        <a class="krds-btn secondary small" th:href="@{/uss/olh/qna/QnaCnRegistView.do}">질문 등록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
