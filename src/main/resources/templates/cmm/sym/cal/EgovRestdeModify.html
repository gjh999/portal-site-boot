<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{cal.restde.modify}">휴일 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/cal/EgovRestdeList.do}" th:text="#{cal.restde.manage}">휴일 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{cal.restde.crumb.modify}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-calendar-x"></i> <span th:text="#{cal.restde.modify}">휴일 수정</span></h1>

        <div th:if="${restde == null}" class="alert alert-warning"><span th:text="#{cal.restde.empty.modify}">수정할 데이터가 없습니다.</span>
            <a class="alert-link" th:href="@{/sym/cal/EgovRestdeList.do}" th:text="#{cal.restde.link.tolist}">목록으로</a></div>

        <form th:if="${restde != null}" th:action="@{/sym/cal/EgovRestdeModify.do}" method="post" th:object="${restde}">
            <input type="hidden" name="cmd" value="Modify"/>
            <input type="hidden" th:field="*{restdeNo}"/>
            <div class="krds-table-wrap">
            <table class="tbl col">
                <caption th:text="#{cal.restde.modify}">휴일 수정</caption>
                <tbody>
                <tr>
                    <th scope="row" style="width:160px;" th:text="#{cal.restde.label.no}">휴일번호</th>
                    <td><input class="krds-input" type="text" th:value="*{restdeNo}" readonly/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{cal.restde.label.de}">휴일일자</th>
                    <td><input class="krds-input" type="text" th:field="*{restdeDe}" maxlength="8" placeholder="YYYYMMDD"/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{cal.restde.label.nm}">휴일명</th>
                    <td><input class="krds-input" type="text" th:field="*{restdeNm}" maxlength="60"/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{cal.restde.label.se}">휴일구분</th>
                    <td>
                        <select class="krds-form-select" th:field="*{restdeSeCode}">
                            <option value="" th:text="#{cal.restde.select}">선택</option>
                            <option th:each="code : ${restdeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{cal.restde.label.dc}">휴일설명</th>
                    <td><textarea class="krds-input" th:field="*{restdeDc}" rows="3"></textarea></td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
                <a class="krds-btn tertiary" th:href="@{/sym/cal/EgovRestdeList.do}" th:text="#{button.cancel}">취소</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
