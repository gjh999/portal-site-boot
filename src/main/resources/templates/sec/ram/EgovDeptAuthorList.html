<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.deptAuthor.title}">부서별 권한 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.deptAuthor.title}">부서별 권한 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-diagram-3"></i> <span th:text="#{sec.deptAuthor.title}">부서별 권한 관리</span></h1>
        <p class="text-muted mb-4" th:text="#{sec.deptAuthor.desc}">부서·사용자에 부여된 권한과 권한별 롤을 관리합니다. 아래 메뉴에서 작업을 선택하세요.</p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-shield-check"></i> <span th:text="#{sec.deptAuthor.authorList}">권한 목록</span></h5>
                        <p class="text-muted" th:text="#{sec.deptAuthor.authorList.desc}">시스템에 등록된 권한(Authority)을 조회하고 등록·수정·삭제합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/sec/ram/EgovAuthorListView.do}" th:text="#{sec.deptAuthor.authorList.go}">권한 목록 이동</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="krds-panel h-100 shadow-sm">
                    <div class="krds-panel-body">
                        <h5><i class="bi bi-shield-lock"></i> <span th:text="#{sec.authorRole.title}">권한별 롤 관리</span></h5>
                        <p class="text-muted" th:text="#{sec.deptAuthor.authorRole.desc}">각 권한에 할당된 롤(Role)을 조회하고 등록 여부를 변경합니다.</p>
                        <a class="krds-btn primary small" th:href="@{/sec/ram/EgovAuthorRoleListView.do}" th:text="#{sec.deptAuthor.authorRole.go}">권한별 롤 관리 이동</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
