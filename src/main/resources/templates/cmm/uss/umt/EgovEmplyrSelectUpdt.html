<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{mber.emplyr.update.title}">업무사용자 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{common.memberManage}">회원관리</a></li>
            <li class="breadcrumb-item active" th:text="#{mber.emplyr.update.title}">업무사용자 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-person-badge"></i> <span th:text="#{mber.emplyr.update.title}">업무사용자 수정</span></h1>

        <form th:action="@{/uss/umt/mber/EgovEmplyrSelectUpdt.do}" method="post" th:object="${mberManageVO}">
            <input type="hidden" th:field="*{uniqId}"/>

            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{mber.sec.basic}">기본 정보</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.id}">아이디</label>
                        <input class="krds-input" type="text" th:field="*{mberId}" maxlength="20" readonly/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.sttus}">회원상태</label>
                        <select class="krds-form-select" th:field="*{mberSttus}" th:title="#{mber.manage.sttus.select}" title="회원상태 선택">
                            <option value="A" th:text="#{mber.sttus.pending}">신청중</option>
                            <option value="P" th:text="#{mber.sttus.approved}">가입승인</option>
                            <option value="D" th:text="#{mber.sttus.deleted}">가입삭제</option>
                        </select></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.name}">이름</label>
                        <input class="krds-input" type="text" th:field="*{mberNm}" maxlength="60" required/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.email}">이메일</label>
                        <input class="krds-input" type="email" th:field="*{mberEmailAdres}" maxlength="50"/></div>
                </div>
            </fieldset>

            <fieldset class="krds-form-section">
                <legend class="krds-form-section-title" th:text="#{entrprs.sec.contact}">연락처·주소</legend>
                <div class="row g-3">
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.officeTel}">사무실전화</label>
                        <input class="krds-input" type="text" th:field="*{telno}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{mber.col.moblphon}">휴대전화</label>
                        <input class="krds-input" type="text" th:field="*{moblphonNo}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{entrprs.fxnum}">팩스번호</label>
                        <input class="krds-input" type="text" th:field="*{mberFxnum}" maxlength="20"/></div>
                    <div class="col-md-6 form-group"><label class="form-label" th:text="#{entrprs.zip}">우편번호</label>
                        <input class="krds-input" type="text" th:field="*{zip}" maxlength="6"/></div>
                    <div class="col-12 form-group"><label class="form-label" th:text="#{entrprs.adres}">주소</label>
                        <input class="krds-input" type="text" th:field="*{adres}" maxlength="100"/></div>
                    <div class="col-12 form-group"><label class="form-label" th:text="#{entrprs.detailAdres}">상세주소</label>
                        <input class="krds-input" type="text" th:field="*{detailAdres}" maxlength="100"/></div>
                </div>
            </fieldset>

            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{button.cancel}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
