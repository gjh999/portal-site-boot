<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>Q&amp;A 수정 (관리자)</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:760px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/admin/QnaListInqire.do}">Q&amp;A 관리</a></li>
            <li class="breadcrumb-item active">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 질문 수정</h1>
        <form th:action="@{/uss/olh/qna/admin/QnaCnUpdt.do}" method="post" th:object="${qnaManageVO}">
            <input type="hidden" th:field="*{qaId}"/>
            <input type="hidden" th:field="*{emailAdres}"/>
            <input type="hidden" th:field="*{emailAnswerAt}"/>
            <input type="hidden" th:field="*{qnaProcessSttusCode}"/>
            <!-- 매퍼 updateQnaCn 이 갱신하는 컬럼 보존(미전송 시 NULL 로 덮어씀) -->
            <input type="hidden" th:field="*{frstRegisterId}"/>
            <input type="hidden" th:field="*{areaNo}"/>
            <input type="hidden" th:field="*{middleTelno}"/>
            <input type="hidden" th:field="*{endTelno}"/>
            <!-- answerCn 은 @EgovNullCheck 대상: 기존 답변 보존, 없으면 검증통과용 공백 -->
            <input type="hidden" name="answerCn"
                   th:value="${qnaManageVO.answerCn != null and !#strings.isEmpty(qnaManageVO.answerCn)} ? ${qnaManageVO.answerCn} : ' '"/>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">작성자 <span class="text-muted small">(최대 4자)</span></label>
                    <input class="krds-input" type="text" th:field="*{wrterNm}" maxlength="4" required/></div>
                <div class="col-md-6"><label class="form-label">비밀번호(수정/삭제용)</label>
                    <input class="krds-input" type="password" th:field="*{writngPassword}" maxlength="20" required/></div>
                <div class="col-12"><label class="form-label">제목</label>
                    <input class="krds-input" type="text" th:field="*{qestnSj}" maxlength="250" required/></div>
                <div class="col-12"><label class="form-label">질문 내용</label>
                    <textarea class="krds-input" rows="6" th:field="*{qestnCn}" required></textarea></div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <a class="krds-btn tertiary" th:href="@{/uss/olh/qna/admin/QnaListInqire.do}">취소</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> 수정</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
