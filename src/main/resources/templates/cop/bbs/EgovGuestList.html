<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '방명록'}">방명록</title></head>
<body>
<main layout:fragment="content">
    <div class="container"
         th:with="bbsId=${boardVO != null ? boardVO.bbsId : ''}, editMode=${boardVO != null and boardVO.nttId != 0}">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item active" th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '방명록'}">방명록</li>
        </ol></nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-chat-left-text"></i> <span th:text="${brdMstrVO != null ? brdMstrVO.bbsNm : '방명록'}">방명록</span></h1>
            <span class="text-muted small">총 <strong th:text="${resultCnt}">0</strong> 건</span>
        </div>

        <!-- 작성/수정 폼 : 방명록은 목록 화면에서 바로 등록한다 -->
        <div class="krds-panel mb-4" sec:authorize="isAuthenticated()">
            <div class="krds-panel-head py-2">
                <i class="bi bi-pencil-square"></i>
                <span th:text="${editMode} ? '방명록 수정' : '방명록 작성'">방명록 작성</span>
            </div>
            <div class="krds-panel-body">
                <form th:action="${editMode} ? @{/cop/bbs/updateGuestList.do} : @{/cop/bbs/insertGuestList.do}"
                      method="post" onsubmit="return fnValidateGuest(this);">
                    <input type="hidden" name="bbsId" th:value="${bbsId}"/>
                    <input type="hidden" name="nttId" th:if="${editMode}" th:value="${boardVO.nttId}"/>
                    <!-- Board @EgovNullCheck(ntcrNm·password·ntceBgnde·ntceEndde·nttSj) 통과용 hidden -->
                    <input type="hidden" name="nttSj" value="방명록"/>
                    <input type="hidden" name="ntcrNm"
                           th:value="${boardVO != null and boardVO.ntcrNm != null and !#strings.isEmpty(boardVO.ntcrNm) ? boardVO.ntcrNm : 'dummy'}"/>
                    <input type="hidden" name="password" value="dummy"/>
                    <input type="hidden" name="ntceBgnde" value="10000101"/>
                    <input type="hidden" name="ntceEndde" value="99991231"/>

                    <textarea class="krds-input mb-2" name="nttCn" rows="3" maxlength="2400" required
                              placeholder="방명록 내용을 입력하세요."
                              th:text="${editMode} ? ${boardVO.nttCn} : ''"></textarea>
                    <div class="text-end">
                        <a class="krds-btn tertiary small" th:if="${editMode}"
                           th:href="@{/cop/bbs/selectGuestList.do(bbsId=${bbsId})}">취소</a>
                        <button class="krds-btn primary small" type="submit">
                            <i class="bi bi-check-lg"></i> <span th:text="${editMode} ? '수정' : '등록'">등록</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="vstack gap-2">
            <div class="krds-panel" th:each="item : ${resultList}">
                <div class="krds-panel-body py-2">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-semibold"><i class="bi bi-person-circle"></i>
                            <span th:text="${item.frstRegisterNm ?: item.ntcrNm}">작성자</span></span>
                        <small class="text-muted" th:text="${item.frstRegisterPnttm}">등록일</small>
                    </div>
                    <div class="text-body" style="white-space:pre-line;" th:text="${item.nttCn}">내용</div>
                    <div class="d-flex justify-content-end gap-1 mt-1" sec:authorize="isAuthenticated()"
                         th:if="${sessionUniqId != null and sessionUniqId == item.frstRegisterId}">
                        <a class="krds-btn tertiary small"
                           th:href="@{/cop/bbs/selectSingleGuestList.do(bbsId=${item.bbsId},nttId=${item.nttId})}">수정</a>
                        <form th:action="@{/cop/bbs/deleteGuestList.do}" method="post" class="d-inline"
                              onsubmit="return confirm('삭제하시겠습니까?');">
                            <input type="hidden" name="bbsId" th:value="${item.bbsId}"/>
                            <input type="hidden" name="nttId" th:value="${item.nttId}"/>
                            <button class="krds-btn danger small" type="submit">삭제</button>
                        </form>
                    </div>
                    <!-- 관리자는 타인 글도 삭제 가능 -->
                    <div class="d-flex justify-content-end mt-1" sec:authorize="hasRole('ROLE_ADMIN')"
                         th:if="${sessionUniqId == null or sessionUniqId != item.frstRegisterId}">
                        <form th:action="@{/cop/bbs/deleteGuestList.do}" method="post" class="d-inline"
                              onsubmit="return confirm('삭제하시겠습니까?');">
                            <input type="hidden" name="bbsId" th:value="${item.bbsId}"/>
                            <input type="hidden" name="nttId" th:value="${item.nttId}"/>
                            <button class="krds-btn danger small" type="submit">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="text-center text-muted py-4" th:if="${#lists.isEmpty(resultList)}">등록된 방명록이 없습니다.</div>
        </div>
    </div>
</main>
<th:block layout:fragment="body-js">
    <script>
        function fnValidateGuest(frm) {
            if (frm.nttCn.value.trim() === '') {
                alert('내용을 입력하세요.');
                return false;
            }
            return true;
        }
    </script>
</th:block>
</body>
</html>
